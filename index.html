function resize(){
  SCL=Math.min(innerWidth/W,innerHeight/H,IS_MOBILE?2.2:1.7);

    if(type==="shoot"){g.gain.setValueAtTime(.5,t);tone(380,80,"sawtooth",.13,.18);tone(1100,220,"square",.07,.08)}

    else if(type==="death"){g.gain.setValueAtTime(.4,t);tone(420,28,"sawtooth",.5,.5)}
    else if(type==="super"){[220,330,440,660,880,1100].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type=i%2?"triangle":"sine";o.frequency.value=f;og.gain.setValueAtTime(.2,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.28);o.start();o.stop(a2.currentTime+.3)}catch{}},i*45))}
    else if(type==="win"){[523,659,784,1046,784,1046,1318].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type="sine";o.frequency.value=f;og.gain.setValueAtTime(.28,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.22);o.start();o.stop(a2.currentTime+.25)}catch{}},i*130))}

  }catch{}

// Breakable crate HP map (per-tile, only tile 7 cells)
let SD_CRATE_HP={};
function sdCrateKey(r,c){return r*100+c}

function activeMap(){return MODE==="showdown"?SHOWDOWN_MAP:MAP}
function tileAt(x,y){const c=Math.floor(x/TS),r=Math.floor(y/TS);if(c<0||c>=COLS||r<0||r>=ROWS)return 1;const t=activeMap()[r][c];if(t===7){const k=sdCrateKey(r,c);if(SD_CRATE_HP[k]!==undefined&&SD_CRATE_HP[k]<=0)return 0;return 7;}return t;}
function tileRC(r,c){if(c<0||c>=COLS||r<0||r>=ROWS)return 1;const t=activeMap()[r][c];if(t===7){const k=sdCrateKey(r,c);if(SD_CRATE_HP[k]!==undefined&&SD_CRATE_HP[k]<=0)return 0;return 7;}return t;}
function blocked(x,y){const t=tileAt(x,y);return t===1||t===4||t===5||t===7}
function inBush(x,y){const t=tileAt(x,y);return t===2}



function updateShowdown(){
  if(!PL||PL.dead)return;
  const mapW=COLS*TS,mapH=ROWS*TS,cx=mapW/2,cy=mapH/2;
  if(SD_POISON_R>0)SD_POISON_R=Math.max(0,SD_POISON_R-SD_POISON_SPEED*DT);
  const pdist=Math.hypot(PL.x-cx,PL.y-cy);
  if(pdist>SD_POISON_R&&SD_POISON_R<SD_POISON_MAX*.98){
    const dm=200*DT*(1+(SD_POISON_MAX-SD_POISON_R)/SD_POISON_MAX*3);
    PL.hp=Math.max(0,PL.hp-dm);
    if(Math.random()<DT*4)spark(PL.x+(Math.random()-.5)*30,PL.y+(Math.random()-.5)*30,"#44FF88");
  }
  for(const e of ENM){
    if(e.dead)continue;
    if(Math.hypot(e.x-cx,e.y-cy)>SD_POISON_R&&SD_POISON_R<SD_POISON_MAX*.98){
      e.hp=Math.max(0,e.hp-150*DT*(1+(SD_POISON_MAX-SD_POISON_R)/SD_POISON_MAX*2));
    }
  }
  for(const p of SD_POWERUPS){
    if(p.collected)continue;
    p.sc=Math.min(1,(p.sc||0)+DT*4);p.bob=(p.bob||0)+DT*3;
    if(dst(p,PL)<PL.r+18){
      p.collected=true;PL.maxHp+=p.val;PL.hp=Math.min(PL.maxHp,PL.hp+p.val);
      spawnDmg(p.x,p.y-20,"+"+p.val+" HP","#FFD700",1.3);
      burst(p.x,p.y,"#FFD700","#FF8800",12,.6);snd("gem");earnCoins(5,p.x,p.y-18,"+5");
    }
    for(const e of ENM){
      if(e.dead||p.collected||dst(p,e)>e.r+18)continue;
      p.collected=true;e.maxHp=(e.maxHp||e.hp)+p.val;
      e.hp=Math.min(e.maxHp,e.hp+p.val);e.powerups=(e.powerups||0)+1;
    }
  }
}

function updateGemGrab(){
  if(MODE!=="gems")return;
  // Match timer
  GG_MATCH_TIMER-=DT;
  if(GG_MATCH_TIMER<=0){
    // Time up: most gems wins
    endGame(totalGemsBlue()>=totalGemsRed());return;
  }
  // Gem mine: spawn gem every 7s if <15 on map and total <29
  if(!GEM||!BUL)return;
  const onMap=GEM.filter(g=>!g.collected).length;
  if(onMap<15&&(totalGemsBlue()+totalGemsRed()+onMap)<GG_MAX_GEMS){
    GG_MINE_TIMER-=DT;
    if(GG_MINE_TIMER<=0){
      GG_MINE_TIMER=7;
      // Mine is at map center
      const mx=TS*16+TS/2,my=TS*11+TS/2;
      const a=Math.random()*6.28,r=20+Math.random()*30;
      GEM.push({x:mx+Math.cos(a)*r,y:my+Math.sin(a)*r,collected:false,bob:Math.random()*6.28,sc:0,team:-1});
    }
  }
  // Friendly AI collects gems (team 0 allies)
  for(const e of ENM){
    if(e.dead||e.team!==0||!e.friendly)continue;
    for(const g of GEM){
      if(g.collected)continue;
      if(dst(g,e)<e.r+16){
        g.collected=true;e.gems=(e.gems||0)+1;GG_GEMS_BLUE++;
        burst(g.x,g.y,"#00FFAA","#00CC77",8,.5);
      }
    }
  }
  // Red enemy AI collects gems
  for(const e of ENM){
    if(e.dead||e.team!==1)continue;
    for(const g of GEM){
      if(g.collected)continue;
      if(dst(g,e)<e.r+16){
        g.collected=true;e.gems=(e.gems||0)+1;GG_GEMS_RED++;
        burst(g.x,g.y,"#FF4444","#AA0000",8,.5);
      }
    }
  }
  const blue=totalGemsBlue(),red=totalGemsRed();
  // Countdown logic
  if(blue>=10||red>=10){
    const leading=blue>red?0:red>blue?1:-1;
    if(leading>=0&&blue!==red){
      if(GG_LEADING_TEAM!==leading){GG_LEADING_TEAM=leading;GG_COUNTDOWN=15;}
      else{
        GG_COUNTDOWN-=DT;
        if(GG_COUNTDOWN<=0){endGame(leading===0);return;}
      }
    } else { GG_COUNTDOWN=-1;GG_LEADING_TEAM=-1; }
  } else { GG_COUNTDOWN=-1;GG_LEADING_TEAM=-1; }
}

function updateKnockout(){
  if(MODE!=="knockout")return;
  KO_ROUND_TIMER+=DT;
  // Check round end (grace period: don't check first 2s of round)
  const blueAlive=KO_ALIVE_BLUE,redAlive=KO_ALIVE_RED;
  if(KO_ROUND_TIMER>2&&(redAlive<=0||blueAlive<=0)){
    const blueWon=redAlive<=0;
    if(blueWon)KO_WINS_BLUE++;else KO_WINS_RED++;
    if(KO_WINS_BLUE>=2){endGame(true);return;}
    if(KO_WINS_RED>=2){endGame(false);return;}
    // Start next round
    KO_ROUND++;KO_ALIVE_BLUE=3;KO_ALIVE_RED=3;
    KO_POISON_ACTIVE=false;KO_POISON_R=0;KO_ROUND_TIMER=0;
    WANNOUNCE=3;WTEXT=`RUNDE ${KO_ROUND}  —  ${KO_WINS_BLUE}:${KO_WINS_RED}`;
    // Respawn all with proper positions
    BUL=[];
    PL.dead=false;PL.hp=PL.maxHp;PL.gems=0;
    PL.x=TS*16+TS/2;PL.y=TS*17+TS/2; // bottom center
    PL.vx=0;PL.vy=0;PL.invT=3;PL.sup=0;PL.supCD=0;
    const redSpawns=[[TS*8+TS/2,TS*4+TS/2],[TS*24+TS/2,TS*4+TS/2],[TS*16+TS/2,TS*3+TS/2]];
    const blueSpawns=[[TS*13+TS/2,TS*17+TS/2],[TS*19+TS/2,TS*17+TS/2]];
    let ri=0,bi=0;
    for(const e of ENM){
      e.dead=false;e.hp=e.maxHp;e.deathT=0;e.invT=2;e.gems=0;e.vx=0;e.vy=0;
      if(e.team===1&&ri<redSpawns.length){e.x=redSpawns[ri][0];e.y=redSpawns[ri][1];ri++;}
      else if(e.friendly&&bi<blueSpawns.length){e.x=blueSpawns[bi][0];e.y=blueSpawns[bi][1];bi++;}
    }
    return;
  }
  // Tiebreaker: 1v1 or too long without ending → activate gas
  if(!KO_POISON_ACTIVE&&(KO_ROUND_TIMER>60||(blueAlive===1&&redAlive===1&&KO_ROUND_TIMER>20))){
    KO_POISON_ACTIVE=true;
    WANNOUNCE=2.5;WTEXT="☠  GAS STRÖMT EIN!  ☠";
  }
  if(KO_POISON_ACTIVE){
    // Gas comes from top and bottom (not center ring)
    KO_POISON_R=Math.min(ROWS*TS/2,(KO_POISON_R||0)+DT*30);
    // Damage anyone in gas zone (top/bottom strips)
    const gasTop=KO_POISON_R,gasBot=ROWS*TS-KO_POISON_R;
    const gasDmg=180*DT;
    if(PL&&!PL.dead){
      if(PL.y<gasTop||PL.y>gasBot){
        PL.hp=Math.max(0,PL.hp-gasDmg);
        if(Math.random()<DT*3)spark(PL.x,PL.y,"#44FF88");
      }
    }
    for(const e of ENM){
      if(e.dead)continue;
      if(e.y<gasTop||e.y>gasBot){
        e.hp=Math.max(0,e.hp-gasDmg);
      }
    }
  }
}

function updateStealth(){
  if(!PL||PL.dead){return}
  let inBush=false;
  for(const b of BUSHES){
    if(Math.abs(PL.x-b.x)<b.s/2&&Math.abs(PL.y-b.y)<b.s/2){inBush=true;break}
  }
  // Schießen macht kurzzeitig sichtbar
  PL.hidden=inBush&&PL.sTimer<=0;
  // Gegner verlieren Sichtkontakt wenn Spieler tief im Busch und weit weg
  for(const e of ENM){
    if(e.dead)continue;
    const dist=Math.hypot(PL.x-e.x,PL.y-e.y);
    e.targetVisible=!(PL.hidden&&dist>150);
  }
}
// Layered bush overlay drawn ON TOP of brawlers for immersion
function drawBushOverlay(){
  for(const b of BUSHES){
    // Draw two puff layers — bottom (dark) then top (lighter, more transparent)
    // Layer 1: base coverage (opaque-ish)
    X.fillStyle="rgba(38,100,28,.88)";
    X.beginPath();rr(b.x+1,b.y+8,b.w-2,b.h-8,8);X.fill();

    // Layer 2: puff tops
    const px=b.x,py=b.y;
    const puffs=[
      {dx:12,dy:14,r:11,light:false},{dx:36,dy:14,r:11,light:false},
      {dx:12,dy:34,r:11,light:false},{dx:36,dy:34,r:11,light:false},
      {dx:24,dy:24,r:12,light:true}
    ];
    for(const p of puffs){
      X.fillStyle=p.light?"rgba(72,160,50,.9)":"rgba(55,130,38,.9)";
      X.beginPath();X.arc(px+p.dx,py+p.dy,p.r,0,6.28);X.fill();

  }
}

const TC={};
function buildCache(){
  for(const t of[0,1,2,3,5,6,7])for(const dk of[false,true]){
    const cv=document.createElement("canvas");cv.width=TS;cv.height=TS;
    const cx=cv.getContext("2d");drawTile(cx,0,0,t,dk);TC[t+(dk?"d":"l")]=cv;
  }
}
function drawTile(cx,x,y,t,dk){
  if(t===1){
    // Base stone colour
    cx.fillStyle=dk?"#6A5445":"#7E6352";cx.fillRect(x,y,TS,TS);
    // Brick rows with mortar gaps
    const brickCols=[[0,15],[16,15],[0,15]]; // [offsetX, brickH]
    const brickW=[22,26];
    let yOff=y;
    for(let row=0;row<3;row++){
      const off=(row%2)*12,bH=15;
      cx.fillStyle=dk?"#7A5A48":"#8E6E5A";
      let bx=x+off;
      while(bx<x+TS){const bw=Math.min(22,x+TS-bx);
        cx.fillRect(bx+1,yOff+1,bw-2,bH-2);
        // Face shade (light upper-left, dark lower-right)
        cx.fillStyle="rgba(255,255,255,.09)";cx.fillRect(bx+1,yOff+1,bw-2,4);
        cx.fillStyle="rgba(0,0,0,.22)";cx.fillRect(bx+1,yOff+bH-4,bw-2,3);
        cx.fillStyle=dk?"#7A5A48":"#8E6E5A"; // reset for next brick
        bx+=22;
      }
      yOff+=bH+1;
    }
    // Mortar grid
    cx.fillStyle=dk?"#4A3422":"#5A4432";
    for(let i=1;i<3;i++)cx.fillRect(x,y+i*16,TS,2);
    // Top highlight
    cx.fillStyle="rgba(255,255,255,.14)";cx.fillRect(x,y,TS,3);
    // Ambient occlusion bottom
    const aoG=cx.createLinearGradient(0,y+TS-12,0,y+TS);aoG.addColorStop(0,"transparent");aoG.addColorStop(1,"rgba(0,0,0,.55)");
    cx.fillStyle=aoG;cx.fillRect(x,y+TS-12,TS,12);
    // Side shadow (left edge inner)
    const sG=cx.createLinearGradient(x,0,x+6,0);sG.addColorStop(0,"rgba(0,0,0,.3)");sG.addColorStop(1,"transparent");
    cx.fillStyle=sG;cx.fillRect(x,y,6,TS);
  }else if(t===0||t===6){
    cx.fillStyle=dk?"#5FA030":"#70B83A";cx.fillRect(x,y,TS,TS);
    cx.fillStyle=dk?"#68AA38":"#7AC044";
    for(let i=0;i<3;i++)cx.fillRect(x+i*16,y,8,TS);
    if(t===6){const fp=[[10,10],[38,16],[22,34],[42,38]];for(const[fx,fy]of fp){cx.fillStyle="#FFD700";cx.beginPath();cx.arc(x+fx,y+fy,3,0,6.28);cx.fill();cx.fillStyle="#FF6699";for(let a=0;a<5;a++){cx.beginPath();cx.arc(x+fx+Math.cos(a/5*6.28)*4,y+fy+Math.sin(a/5*6.28)*4,2,0,6.28);cx.fill()}}}
  }else if(t===2){
    cx.fillStyle=dk?"#5FA030":"#70B83A";cx.fillRect(x,y,TS,TS);
    cx.fillStyle="#396E1E";cx.fillRect(x+2,y+8,TS-4,TS-10);
    const puffs=[[12,15],[36,15],[12,35],[36,35],[24,25]];
    for(const[bx,by]of puffs){cx.fillStyle="#4A9028";cx.beginPath();cx.arc(x+bx,y+by,10,0,6.28);cx.fill();cx.fillStyle="#5BAF30";cx.beginPath();cx.arc(x+bx-2,y+by-3,7,0,6.28);cx.fill();cx.fillStyle="rgba(255,255,255,.1)";cx.beginPath();cx.arc(x+bx-2,y+by-4,4,0,6.28);cx.fill()}
  }else if(t===3){
    cx.fillStyle=dk?"#C8A050":"#D8B062";cx.fillRect(x,y,TS,TS);cx.fillStyle=dk?"#B89040":"#C8A050";
    for(let i=0;i<8;i++)cx.fillRect(x+(Math.sin(i*2.1)*.5+.5)*(TS-6),y+(Math.cos(i*3.7)*.5+.5)*(TS-6),4,2);
    cx.strokeStyle="rgba(0,0,0,.15)";cx.lineWidth=2;cx.strokeRect(x+1,y+1,TS-2,TS-2);
  }
}
function drawMap(T){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const tv=MAP[r][c],x=c*TS,y=r*TS,dk=(r+c)%2===0;
    if(tv===4){
      // Deep sand pit / skull zone
      const w=Math.sin(T*1.5+c*.5+r*.7)*.5+.5;
      X.fillStyle=dk?"#6A3808":"#7A4A14";X.fillRect(x,y,TS,TS);
      // Rough dirt texture
      X.fillStyle=`rgba(120,60,10,${.25+w*.12})`;X.fillRect(x,y,TS,TS);
      for(let di=0;di<5;di++){X.fillStyle="rgba(40,15,0,.35)";X.fillRect(x+(di*11+3)%TS,y+(di*9+7)%TS,4,2)}
      // Cracks
      X.strokeStyle=`rgba(40,15,0,${.6+w*.25})`;X.lineWidth=1.5;
      X.beginPath();X.moveTo(x+6,y+10);X.lineTo(x+22,y+26);X.lineTo(x+34,y+18);X.stroke();
      X.beginPath();X.moveTo(x+28,y+6);X.lineTo(x+18,y+30);X.stroke();
      // Skull marker
      if((r*COLS+c)%7===0){X.fillStyle="rgba(255,255,255,.12)";X.beginPath();X.arc(x+TS/2,y+TS/2,5,0,6.28);X.fill()}
    }else{const k=tv+(dk?"d":"l");if(TC[k])X.drawImage(TC[k],x,y,TS,TS)}
  }
}

C.addEventListener("touchend",e=>{

    const{x,y}=STATE==="play"?_wxy:_sxy;

    if(STATE==="home")    {handleHomeTap(x,y);continue}

    if(STATE==="select"||(STATE==="home"&&SHOW_SELECT)){handleSelectTap(x,y);continue}
    if(STATE==="settings"){handleSettingsClick(x,y);continue}
    if(STATE==="win"||STATE==="lose"){handleEndClick(x,y);continue}
    // ── In-game gear icon ──
    if(STATE==="play"&&Math.hypot(_sxy.x-(W-22),_sxy.y-22)<22){
      SETTINGS_FROM="play";STATE="settings";snd("select");continue;
    }
    // ── Super button tap ──
    if(STATE==="play"&&Math.hypot(_sxy.x-SUPER_BTN.x,_sxy.y-SUPER_BTN.y)<SUPER_BTN.r+14){
      if(PL&&PL.sup>=PL.supMax&&PL.supCD<=0){fireSuper();}

    if(t.identifier===RTOUCH_ID){RTOUCH_ID=null;TOUCH.right=null;MB=false}
    if(t.identifier===SUPER_JOY_ID){
      SUPER_JOY_ID=null;SUPER_JOY.active=false;
      // Fire super on release if dragged enough
      const sdx=SUPER_JOY.x-SUPER_JOY.sx,sdy=SUPER_JOY.y-SUPER_JOY.sy;
      if(Math.hypot(sdx,sdy)>12*SCL&&PL&&PL.sup>=PL.supMax&&PL.supCD<=0){

  }

function handleHomeTap(x,y){
  EDITING_NAME=false;
  // Name click (top bar)
  if(x>=8&&x<=8+200&&y>=8&&y<=8+42){EDITING_NAME=true;return}
  // Overlay open
  if(SHOW_SELECT){
    // Close
    if(Math.hypot(x-HOME.closeX,y-HOME.closeY)<24){SHOW_SELECT=false;snd("select");return}
    // Mode tabs
    if(HOME._tabY&&y>=HOME._tabY&&y<=HOME._tabY+HOME._tabH){
      const ti=Math.floor((x-20)/(HOME._tabW+HOME._tabGap));
      if(ti>=0&&ti<MODES.length){MODE_SEL=ti;MODE=MODES[ti].key;snd("select");return}
    }
    // Card taps + play button
    handleSelectTap(x,y);return;
  }
  // Brawler Creator button (bottom left) — matches drawn area
  const bbY2=H-HOME.bottomH+8;
  if(x>HOME.sideW+8&&x<HOME.sideW+156&&y>bbY2&&y<bbY2+HOME.bottomH-16){
    STATE="create";snd("select");return;
  }
  // Settings gear (top right)
  if(Math.hypot(x-(W-28),y-29)<22){SETTINGS_FROM="home";STATE="settings";snd("select");return}
  // Center brawler spotlight → open overlay
  const spX=HOME.sideW+(W-HOME.sideW-HOME.rightW)/2, spY=(H-HOME.topH-HOME.bottomH)/2+HOME.topH;
  if(Math.hypot(x-spX,y-spY)<90){SHOW_SELECT=true;SEL_OVERLAY_Y=800;snd("select");return}
  // Left sidebar brawler slots
  const slotH=(H-HOME.topH-HOME.bottomH)/HOME.sideSlots;
  if(x>=0&&x<=HOME.sideW){
    const slotIdx=Math.floor((y-HOME.topH)/slotH);
    if(slotIdx>=0&&slotIdx<HOME.sideSlots){
      const newSel=slotIdx<BD.length?slotIdx:0;
      if(SEL===newSel){SHOW_SELECT=true;SEL_OVERLAY_Y=800;snd("select")}
      else{SEL=newSel;snd("select")}
      return;
    }
  }
  // Mode cards (bottom center area)
  const mcW=170,mcH=64,mcGap=10;
  const mcTotalW=MODES.length*(mcW+mcGap)-mcGap;
  const mcStartX=HOME.sideW+(W-HOME.sideW-HOME.rightW-mcTotalW)/2-60;
  const mcY=H-HOME.bottomH+8;
  MODES.forEach((m,i)=>{
    const cx=mcStartX+i*(mcW+mcGap),cy=mcY;
    if(x>=cx&&x<=cx+mcW&&y>=cy&&y<=cy+mcH){
      if(MODE_SEL===i){MODE=m.key;SHOW_SELECT=true;SEL_OVERLAY_Y=800;snd("select")}
      else{MODE_SEL=i;MODE=m.key;snd("select")}
    }
  });
  // Play button
  if(Math.abs(x-HOME.playX)<HOME.playW/2+8&&Math.abs(y-HOME.playY)<HOME.playH/2+8){
    MODE=MODES[MODE_SEL].key;SHOW_SELECT=true;SEL_OVERLAY_Y=800;snd("select");return;
  }
}

  const playY2=SHOW_SELECT?(HOME.overlayPlayY||PLAY_BTN.y):PLAY_BTN.y;
  if(Math.abs(x-PLAY_BTN.x)<(SHOW_SELECT?120:PLAY_BTN.w/2)&&Math.abs(y-playY2)<26){
    if(isUnlocked(BD[SEL].key))init();
    else{if(!tryUnlock(SEL))snd("hit")}

  }
  for(let i=0;i<BD.length;i++){
    const{x:cx,y:cy}=cardRect(i);
    if(x>=cx&&x<=cx+CARD.w&&y>=cy&&y<=cy+CARD.h){
      if(SEL===i){if(isUnlocked(BD[i].key))init();else tryUnlock(i)}
      else{SEL=i;snd("select")}
      return;
    }
  }

function move(e){
  const cr=e.r*.78,nx=e.x+e.vx*DT,ny=e.y+e.vy*DT;let bx=false,by=false;
  const pts=[[0,-cr],[0,cr],[-cr,0],[cr,0],[-cr*.65,-cr*.65],[cr*.65,-cr*.65],[-cr*.65,cr*.65],[cr*.65,cr*.65]];
  for(const[ox,oy]of pts){if(blocked(nx+ox,e.y+oy))bx=true;if(blocked(e.x+ox,ny+oy))by=true}
  if(!bx)e.x=nx;if(!by)e.y=ny;
}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

/* ═══ UPDATE PLAYER ═══ */
function updatePlayer(){
  if(PL.dead)return;
  let dx=0,dy=0;
  if(TOUCH.left){const jdx=TOUCH.left.x-TOUCH.left.sx,jdy=TOUCH.left.y-TOUCH.left.sy,jm=Math.hypot(jdx,jdy);const JRS=JR*SCL;if(jm>8*SCL){dx=jdx/Math.max(jm,JRS);dy=jdy/Math.max(jm,JRS)}}
  else{if(K["a"]||K["arrowleft"])dx--;if(K["d"]||K["arrowright"])dx++;if(K["w"]||K["arrowup"])dy--;if(K["s"]||K["arrowdown"])dy++;if(dx&&dy){dx*=.707;dy*=.707}}
  if(TOUCH.right){
    const jdx=TOUCH.right.x-TOUCH.right.sx,jdy=TOUCH.right.y-TOUCH.right.sy,jm=Math.hypot(jdx,jdy);
    if(jm>14*SCL){MX=PL.x+(jdx/SCL)*200;MY=PL.y+(jdy/SCL)*200;MB=true}
    else{
      // Auto-aim: snap to nearest visible enemy within 380px
      let best=null,bd2=999;
      for(const e of ENM){if(e.dead||e.hidden)continue;const ed=dst(e,PL);if(ed<380&&ed<bd2){bd2=ed;best=e}}
      if(best){MX=best.x;MY=best.y;MB=true}else MB=false;
    }
  }
  const spd=185+(PL.spdBoost>0?135:0);
  PL.vx=dx*spd;PL.vy=dy*spd;
  if(dx||dy)PL.walkT+=DT*8;
  PL.angle=Math.atan2(MY-PL.y,MX-PL.x);
  move(PL);
  // Camera: smoothly follow player, clamped to map bounds
  const mapW=COLS*TS,mapH=ROWS*TS;
  const tarX=PL.x-W/2, tarY=PL.y-H/2;
  const clampX=Math.max(0,Math.min(mapW-W,tarX));
  const clampY=Math.max(0,Math.min(mapH-H,tarY));
  CAM_X+=(clampX-CAM_X)*Math.min(1,DT*10);
  CAM_Y+=(clampY-CAM_Y)*Math.min(1,DT*10);
  if(PL.spdBoost>0)PL.spdBoost-=DT;if(PL.shield>0)PL.shield-=DT;if(PL.stealth>0)PL.stealth-=DT;if(PL.invT>0)PL.invT-=DT;if(PL.supCD>0)PL.supCD-=DT;if(PL.bushTimer>0)PL.bushTimer-=DT;if(PL.flashT>0)PL.flashT-=DT;if(PL.supDecayT>0){PL.supDecayT-=DT}else if(PL.sup>0&&PL.sup<PL.supMax){PL.sup=Math.max(0,PL.sup-1*DT);}

    if(e.hp<=0){

/* ═══ BULLETS ═══ */
function fireBul(x,y,angle,spd,dmg,color,glow,owner,r,sc=1,life=1.8,ignWalls=false,isRocket=false,heals=false,sniper=false){
  const _b={x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,dmg,color,glow,owner,r,sc,life,ignWalls,isRocket,heals,sniper,trail:[]};
  BUL.push(_b);return _b;
}
function updateBullets(){
  for(let i=BUL.length-1;i>=0;i--){
    const b=BUL[i];
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>9)b.trail.shift();
    b.x+=b.vx*DT;b.y+=b.vy*DT;b.life-=DT;
    const wallHit=!b.ignWalls&&blocked(b.x,b.y);
    if(b.life<=0||wallHit){
        if(wallHit&&MODE==="showdown"){// damage breakable crate
          const cr=Math.floor(b.y/TS),cc=Math.floor(b.x/TS);const ck=sdCrateKey(cr,cc);
          if(SD_CRATE_HP[ck]!==undefined&&SD_CRATE_HP[ck]>0){SD_CRATE_HP[ck]-=b.dmg*.5;
            spark(b.x,b.y,"#AA7733");
            if(SD_CRATE_HP[ck]<=0){burst(b.x,b.y,"#CC8833","#FF8800",10,.5);snd("hit");
              const drops=1+Math.floor(Math.random()*2);
              for(let _i=0;_i<drops;_i++){const _a=Math.random()*6.28,_r=15+Math.random()*25;
                SD_POWERUPS.push({x:cc*TS+TS/2+Math.cos(_a)*_r,y:cr*TS+TS/2+Math.sin(_a)*_r,sc:0,bob:Math.random()*6.28,val:80+Math.floor(Math.random()*120),collected:false});}
            }
          }
        }
        if(b.isRocket)rocketExplode(b);else wallSpark(b.x,b.y,b.color);BUL.splice(i,1);continue}
    if(b.owner==="ally"){
      // Ally bullets damage red team
      let hit2=false;
      for(const e of ENM){if(e.dead||e.invT>0||e.team!==1)continue;if(dst(b,e)<e.r+b.r){
        e.hp-=b.dmg;e.invT=.1;e.flashT=.07;
        spark(e.x,e.y,"#FFAA22");BUL.splice(i,1);hit2=true;break;}}
      if(hit2)continue;
    }
    if(b.owner==="enemy"){
      if(!PL.dead&&PL.invT<=0&&PL.shield<=0&&dst(b,PL)<PL.r+b.r){
        let d2=b.dmg;PL.hp-=d2;PL.invT=.22;PL.flashT=.07;FLASH=.45;SHK=.25;
        spark(PL.x,PL.y,"#FF4444");spawnDmg(PL.x+(Math.random()-.5)*28,PL.y-30,`-${Math.round(d2)}`,"#FF5555");snd("hitplayer");BUL.splice(i,1);
      }
      // Also damage blue allies OR in showdown damage other bots
      else{
        for(const ae of ENM){
          if(ae.dead||ae.invT>0)continue;
          // In showdown: hit any other entity; in team modes: only hit team 0 allies
          if(MODE!=="showdown"&&ae.team!==0)continue;
          if(MODE==="showdown"&&b.ownerRef&&ae===b.ownerRef)continue; // no self-hit
          if(dst(b,ae)<ae.r+b.r){
            ae.hp-=b.dmg;ae.invT=.15;ae.flashT=.07;
            spark(ae.x,ae.y,"#FF6644");spawnDmg(ae.x,ae.y-28,`-${Math.round(b.dmg)}`,"#FF9955");
            BUL.splice(i,1);break;
          }
        }
      }
    }else{
      let hit=false;
      for(const e of ENM){if(e.dead||e.invT>0)continue;if(MODE!=="showdown"&&e.team===0)continue;if(dst(b,e)<e.r+b.r){
        let d2=b.dmg;if(b.sniper)d2*=Math.min(2,Math.hypot(e.x-b.x,e.y-b.y)/200+.5);
        e.hp-=d2;e.invT=.1;e.flashT=.07;PL.sup=Math.min(PL.supMax,PL.sup+10);PL.supDecayT=3;
        // Knockback: push enemy away from bullet direction
        const kba=Math.atan2(b.vy,b.vx),kbs=55+b.dmg*.015;
        e.vx+=Math.cos(kba)*kbs;e.vy+=Math.sin(kba)*kbs;
        if(b.heals)PL.hp=Math.min(PL.maxHp,PL.hp+65);
        if(b.isRocket)rocketExplode(b);
        spark(e.x,e.y,"#FFAA22");spawnDmg(e.x+(Math.random()-.5)*22,e.y-32,`${Math.round(d2)}`,"#FFEE44");snd("hit");BUL.splice(i,1);hit=true;break;
      }}
    }
  }
}
function rocketExplode(b){snd("boom");SHK=Math.max(SHK,.35);burst(b.x,b.y,b.color||"#FF8800","#FFFF00",28,1.0);for(const e of ENM){if(e.dead)continue;if(dst(b,e)<95){e.hp-=b.dmg*.6;e.invT=.12;spark(e.x,e.y,"#FF8800")}}}

/* ═══ DRAW HELPERS ═══ */
function rr(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath()}

/* ═══ SVG ICON SYSTEM ═══ */
// Draw icons as canvas paths — no emoji dependency
function svgIcon(name,cx,cy,sz,col){
  X.save();X.translate(cx,cy);const s=sz/16;X.scale(s,s);
  X.fillStyle=col||"#FFF";X.strokeStyle=col||"#FFF";
  if(name==="heart"){
    // ❤ heart
    X.beginPath();X.moveTo(0,4);X.bezierCurveTo(-1,0,-8,-1,-8,4);
    X.bezierCurveTo(-8,9,0,14,0,14);X.bezierCurveTo(0,14,8,9,8,4);
    X.bezierCurveTo(8,-1,1,0,0,4);X.closePath();X.fill();
  }else if(name==="skull"){
    // 💀 skull
    X.beginPath();X.arc(0,-2,7,0,Math.PI*2);X.fill();

  }else if(name==="wave"){
    // wave indicator
    X.lineWidth=2.5;X.strokeStyle=col||"#FFF";X.lineCap="round";
    X.beginPath();X.moveTo(-8,0);
    X.bezierCurveTo(-4,-6,0,-6,4,0);X.bezierCurveTo(8,6,12,6,8,0);X.stroke();
  }else if(name==="shield"){
    X.beginPath();X.moveTo(0,-8);X.lineTo(7,-4);X.lineTo(7,2);
    X.quadraticCurveTo(7,8,0,10);X.quadraticCurveTo(-7,8,-7,2);
    X.lineTo(-7,-4);X.closePath();X.fill();
  }else if(name==="gear"){
    // ⚙ gear
    const ir=5,or2=8,teeth=8;
    for(let i=0;i<teeth;i++){
      const a=i/teeth*Math.PI*2,a2=a+Math.PI/teeth*.5;

    }
    X.beginPath();X.arc(0,0,ir,0,Math.PI*2);X.fill();
    X.fillStyle="#000";X.beginPath();X.arc(0,0,ir*.5,0,Math.PI*2);X.fill();
  }else if(name==="star"){
    // ★ star
    X.beginPath();
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2-Math.PI/2;
      const ai=a+Math.PI/5;
      if(i===0)X.moveTo(Math.cos(a)*8,Math.sin(a)*8);
      else X.lineTo(Math.cos(a)*8,Math.sin(a)*8);
      X.lineTo(Math.cos(ai)*3.5,Math.sin(ai)*3.5);
    }
    X.closePath();X.fill();
  }else if(name==="plant"){
    // 🌿 bush/plant indicator
    X.fillStyle=col||"#88FF66";
    X.beginPath();X.arc(-4,-2,5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(4,-2,5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(0,-5,5,0,Math.PI*2);X.fill();
    X.fillStyle="rgba(255,255,255,.2)";
    X.beginPath();X.arc(-5,-3,2.5,0,Math.PI*2);X.fill();
    X.strokeStyle=col||"#44AA22";X.lineWidth=1.5;
    X.beginPath();X.moveTo(0,8);X.lineTo(0,0);X.stroke();
  }else if(name==="sword"){
    // kill feed icon
    X.lineWidth=2;X.strokeStyle=col||"#FFF";X.lineCap="round";
    X.beginPath();X.moveTo(-6,-6);X.lineTo(6,6);X.stroke();
    X.beginPath();X.moveTo(-2,-8);X.lineTo(2,-4);X.stroke();
  }
  X.restore();
}

  else if(wt==="rocket"){X.fillStyle=lc(b.body,10);X.fillRect(r*.3,-7,r*.55,14);gl(b.color,8);X.fillStyle="#774422";X.beginPath();X.arc(r*.9,0,11,0,6.28);X.fill();ng();X.strokeStyle="#331A08";X.lineWidth=2;X.stroke()}
  else if(wt==="thrower"||wt==="mortar"){X.fillStyle="#886633";X.fillRect(r*.22,-7,r*.6,14);gl("#AACCFF",10);X.fillStyle="#AAC4EE";X.beginPath();X.ellipse(r*.84,0,11,7,0,0,6.28);X.fill();ng();X.strokeStyle="#443311";X.lineWidth=2;X.stroke()}
  else if(wt==="sniper"){X.fillStyle=lc(b.body,20);X.fillRect(r*.25,-3,r*.85,6);X.fillStyle="#888";X.fillRect(r*.95,-2.5,30,5);gl(b.color,6);X.fillStyle=b.color;X.beginPath();X.arc(r*.95+30,0,3,0,6.28);X.fill();ng()}
  else if(wt==="spike"){X.fillStyle=lc(b.body,15);X.fillRect(r*.3,-5,r*.5,10);for(let i=-1;i<=1;i++){gl(b.color,8);X.fillStyle=b.color;X.beginPath();X.moveTo(r*.8,i*7);X.lineTo(r*.8+16,i*6-4);X.lineTo(r*.8+14,i*6+4);X.closePath();X.fill();ng()}}
  else{X.fillStyle=lc(b.body,15);X.fillRect(r*.3,-5,r*.7,10);X.fillStyle="#555";X.fillRect(r*.9,-4,20,8)}

/* ═══ DRAW BRAWLER ═══ */
function drawBrawler(b,isPlayer){
  if(b.dead&&b.deathT>.85)return;
  const{x,y,r,color,dark,angle,invT,walkT,type}=b;
  const flash=invT>0&&Math.floor(invT*32)%2===0;
  const S=r/21;
  const walk=walkT||0;
  const legSwing=Math.sin(walk*6)*0.32;
  const armSwing=Math.sin(walk*6)*0.38;
  const bodyBob=Math.abs(Math.sin(walk*6))*2.5;
  const stealthed=isPlayer&&PL&&PL.stealth>0;
  const hiddenInBush=isPlayer&&PL&&PL.hidden;
  const enemyHidden=!isPlayer&&b.hidden===true;
  const facingR=Math.cos(angle)>=0;
  const flip=facingR?1:-1;

  // ── OUTER SAVE: position + alpha ────────────────────────────────
  X.save();
  X.translate(x, y+bodyBob);
  if(stealthed)X.globalAlpha=.32;
  else if(hiddenInBush)X.globalAlpha=.45;
  else if(enemyHidden){X.restore();return;}

  // Ground shadow
  X.fillStyle="rgba(0,0,0,.25)";
  X.beginPath();X.ellipse(0,r+3,r*.78,r*.2,0,0,6.28);X.fill();

  // Status rings (before flip scale so they're symmetric)
  if(isPlayer&&PL){
    if(PL.sup>=PL.supMax){
      gl("#FF8800",14);X.strokeStyle=`rgba(255,160,0,${.7+Math.sin(T*7)*.25})`;
      X.lineWidth=3.5*S;X.beginPath();X.arc(0,-r*.35,r+5*S,0,6.28);X.stroke();ng();
    }
    if(PL.shield>0){
      gl("#44FF88",16);X.strokeStyle=`rgba(50,255,140,${.6+Math.sin(T*5)*.25})`;
      X.lineWidth=4*S;X.beginPath();X.arc(0,-r*.35,r+7*S,0,6.28);X.stroke();ng();
    }
  }

  // ── FLIP SAVE: mirror for left-facing ────────────────────────────
  X.save();
  X.scale(flip,1);

  const fc=flash?"#FFF":color, fd=flash?"#DDD":dark;
  const leg=lc(dark,-8), boot=lc(dark,-20);
  const lW=5*S, lH=12*S, lY=2*S, lSp=5*S;
  const bW=15*S, bH=15*S, bY=-11*S;
  const hR=8*S, hY=bY-hR+2*S;
  const aW=4*S, aH=10*S, aY=bY+2*S;

  // ── LEGS ──
  X.save();X.translate(-lSp,lY);X.rotate(legSwing);
  X.fillStyle=flash?"#EEE":leg;
  X.beginPath();X.ellipse(0,lH/2,lW/2,lH/2,0,0,6.28);X.fill();
  X.fillStyle=flash?"#CCC":boot;X.fillRect(-lW/2-1,lH-4,lW+3,6);
  X.restore();

  X.save();X.translate(lSp,lY);X.rotate(-legSwing);
  X.fillStyle=flash?"#EEE":leg;
  X.beginPath();X.ellipse(0,lH/2,lW/2,lH/2,0,0,6.28);X.fill();
  X.fillStyle=flash?"#CCC":boot;X.fillRect(-lW/2-1,lH-4,lW+3,6);
  X.restore();

  // ── BACK ARM ──
  X.save();X.translate(bW/2-2*S,aY);X.rotate(-armSwing-.18);
  X.fillStyle=flash?"#EEE":lc(color,10);
  X.beginPath();X.ellipse(0,aH/2,aW/2,aH/2,0,0,6.28);X.fill();
  X.fillStyle=flash?"#DDD":lc(color,18);X.beginPath();X.arc(0,aH,aW*.5,0,6.28);X.fill();
  X.restore();

  // ── BODY ──
  const glowCol=isPlayer&&PL&&PL.spdBoost>0?"#00CCFF":color;
  gl(flash?"#FFF":glowCol,flash?18:8);
  X.fillStyle=fc;X.fillRect(-bW/2,bY,bW,bH);ng();
  X.fillStyle=flash?"rgba(0,0,0,.05)":"rgba(0,0,0,.18)";X.fillRect(bW/4,bY+2,bW/4,bH);
  X.fillStyle="rgba(255,255,255,.2)";X.fillRect(-bW/2+1,bY+1,bW*.55,bH*.3);
  X.fillStyle=fd;X.fillRect(-bW/2,lY-2,bW,3*S);
  if(b.flashT>0){
    const fa=Math.min(1,b.flashT/.07)*.6;
    X.globalCompositeOperation="lighter";
    X.fillStyle=`rgba(255,255,255,${fa})`;X.fillRect(-bW/2,bY,bW,bH);
    X.globalCompositeOperation="source-over";
  }

  // ── HEAD ──
  gl(flash?"#FFF":color,flash?14:10);
  X.fillStyle=fc;X.beginPath();X.arc(0,hY,hR,0,6.28);X.fill();ng();
  X.fillStyle="rgba(255,210,160,.45)";X.beginPath();X.arc(0,hY+hR*.1,hR*.82,0,Math.PI);X.closePath();X.fill();
  X.fillStyle="rgba(255,255,255,.18)";X.beginPath();X.ellipse(-hR*.2,hY-hR*.28,hR*.38,hR*.26,-.4,0,6.28);X.fill();

  // hat/helmet
  if(isPlayer){
    X.fillStyle=fd;
    X.beginPath();X.ellipse(0,hY-hR+1,hR*.9,hR*.25,0,Math.PI,0);X.fill();
    X.fillRect(-hR*.9,hY-hR-hR*.42,hR*1.8,hR*.48);
    X.fillStyle="rgba(255,255,255,.12)";X.fillRect(-hR*.85,hY-hR-hR*.38,hR*.9,hR*.16);
  }else if(type==="tank"||type==="aggressive"){
    X.fillStyle=fd;X.beginPath();X.arc(0,hY,hR+1,Math.PI,0);X.fill();
    X.fillStyle=lc(dark,8);X.fillRect(-hR,hY-2,hR*2,3);
  }else if(type==="agile"||type==="shooter"){
    X.fillStyle=lc(color,-10);X.fillRect(-hR,hY-hR*.35,hR*2,hR*.28);
  }

  // ── EYES ──
  const eY=hY-hR*.06,eSpX=hR*.36,eR=hR*.2;
  X.fillStyle="#FAFFF8";
  X.beginPath();X.ellipse(-eSpX,eY,eR,eR*.82,0,0,6.28);X.fill();
  X.beginPath();X.ellipse(eSpX,eY,eR,eR*.82,0,0,6.28);X.fill();
  // pupils look toward aim
  const lookA=angle+(flip<0?Math.PI:0);
  const lox=Math.cos(lookA)*eR*.4,loy=Math.sin(lookA)*eR*.4;
  X.fillStyle=isPlayer?"#1A3A7A":"#330011";
  X.beginPath();X.arc(-eSpX+lox*.5,eY+loy*.5,eR*.52,0,6.28);X.fill();
  X.beginPath();X.arc(eSpX+lox*.5,eY+loy*.5,eR*.52,0,6.28);X.fill();
  X.fillStyle="rgba(255,255,255,.88)";
  X.beginPath();X.arc(-eSpX+lox*.3-eR*.12,eY+loy*.3-eR*.16,eR*.26,0,6.28);X.fill();
  X.beginPath();X.arc(eSpX+lox*.3-eR*.12,eY+loy*.3-eR*.16,eR*.26,0,6.28);X.fill();
  // eyebrows
  X.strokeStyle=fd;X.lineWidth=2*S;X.lineCap="round";
  const browY=eY-eR-1.5*S;
  if(type==="tank"||type==="aggressive"){
    X.beginPath();X.moveTo(-eSpX-eR*.6,browY-2*S);X.lineTo(-eSpX+eR*.4,browY+S);X.stroke();
    X.beginPath();X.moveTo(eSpX+eR*.6,browY-2*S);X.lineTo(eSpX-eR*.4,browY+S);X.stroke();
  }else{
    X.beginPath();X.moveTo(-eSpX-eR*.5,browY);X.lineTo(-eSpX+eR*.5,browY-S);X.stroke();
    X.beginPath();X.moveTo(eSpX-eR*.5,browY);X.lineTo(eSpX+eR*.5,browY-S);X.stroke();
  }
  X.lineCap="butt";
  // mouth
  X.strokeStyle="rgba(0,0,0,.7)";X.lineWidth=1.8*S;X.lineCap="round";
  X.beginPath();
  if(isPlayer)X.arc(0,hY+hR*.3,hR*.2,.12,Math.PI-.12);
  else X.arc(0,hY+hR*.42,hR*.2,Math.PI+.22,-.22);
  X.stroke();X.lineCap="butt";

  // ── FRONT ARM ──
  X.save();X.translate(-bW/2+2*S,aY);X.rotate(armSwing+.18);
  X.fillStyle=flash?"#EEE":lc(color,10);
  X.beginPath();X.ellipse(0,aH/2,aW/2,aH/2,0,0,6.28);X.fill();
  X.fillStyle=flash?"#DDD":lc(color,18);X.beginPath();X.arc(0,aH,aW*.5,0,6.28);X.fill();
  X.restore();

  X.restore(); // ── END FLIP SAVE ──

  // Weapon drawn after flip restore, in original orientation
  if(facingR)drawWeapon(b,isPlayer);

  X.globalAlpha=1;
  X.restore(); // ── END OUTER SAVE ──

  drawBrawlerUI(b,isPlayer,x,y+bodyBob+bY-hR*2);
}

function drawBrawlerUI(b,isPlayer,bx,topY){
  const{hp,maxHp,name,ammo,maxAmmo,color}=b;
  const BAR_W=64, UI_Y=topY-16;

  // ── Name tag (Brawl Stars style pill) ──
  X.save();
  const ntW2=Math.max(60,name.length*7+20),ntH2=18,ntY2=UI_Y-26;
  X.fillStyle=isPlayer?"rgba(50,120,255,.85)":b.team===0?"rgba(40,80,200,.82)":"rgba(60,60,80,.82)";
  rr(bx-ntW2/2,ntY2,ntW2,ntH2,ntH2/2);X.fill();
  X.strokeStyle=isPlayer?"rgba(100,180,255,.7)":b.team===0?"rgba(80,140,255,.6)":"rgba(255,80,80,.5)";X.lineWidth=1.5;
  rr(bx-ntW2/2,ntY2,ntW2,ntH2,ntH2/2);X.stroke();
  X.fillStyle="#FFF";X.font=`bold 10px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(name,bx,ntY2+ntH2/2);
  X.restore();

  // ── Health bar background ──
  X.fillStyle="rgba(0,0,0,0.55)";
  X.fillRect(bx-BAR_W/2-1,UI_Y-1,BAR_W+2,12);

  // Background track
  X.fillStyle="rgba(0,0,0,0.4)";
  X.fillRect(bx-BAR_W/2,UI_Y,BAR_W,10);

  // Filled portion
  const hpRatio=Math.max(0,hp/maxHp);
  const hpC=hpRatio>0.6?"#33FF33":hpRatio>0.4?"#AAEE00":"#FF3333";
  if(hpRatio>0){
    X.fillStyle=hpC;
    X.fillRect(bx-BAR_W/2,UI_Y,BAR_W*hpRatio,10);
    // shine
    X.fillStyle="rgba(255,255,255,0.22)";
    X.fillRect(bx-BAR_W/2,UI_Y,BAR_W*hpRatio,4);
  }

  // Segmented dividers (4 segments)
  X.fillStyle="rgba(0,0,0,0.55)";
  for(let s=1;s<4;s++)X.fillRect(bx-BAR_W/2+BAR_W*s/4-1,UI_Y,1,10);

  // Black border
  X.strokeStyle="#000";X.lineWidth=2;
  X.strokeRect(bx-BAR_W/2,UI_Y,BAR_W,10);

  // HP number inside bar
  X.font=`bold 7px "Lilita One"`;
  X.textAlign="center";X.textBaseline="middle";
  X.fillStyle="rgba(0,0,0,0.7)";X.fillText(Math.ceil(Math.max(0,hp)),bx+1,UI_Y+6);
  X.fillStyle="#FFF";X.fillText(Math.ceil(Math.max(0,hp)),bx,UI_Y+5);

  // ── Ammo bars ──

    const aw=(BAR_W-(gap*(slots-1)))/slots;

function updateCreateColor(){
  CREATE.color=hslToHex(CREATE.hue,CREATE.sat,CREATE.bri);
  CREATE.dark=hslToHex(CREATE.hue,CREATE.sat,Math.max(10,CREATE.bri-22));

function hslToHex(h,s,l){
  s/=100;l/=100;const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(-1,Math.min(k-3,9-k,1));return Math.round(255*c).toString(16).padStart(2,"0")}
  return"#"+f(0)+f(8)+f(4);
}

function drawCard(cx,cy,bd,selected,idx){
  try{
  const{w:cw,h:ch}=CARD;const R=RARITY[bd.rarity];const locked=!isUnlocked(bd.key);
  const isUL=bd.rarity==="ULTRA_LEGENDARY";
  const sc=selected?1.05:1;
  X.save();X.translate(cx+cw/2,cy+ch/2);X.scale(sc,sc);X.translate(-cw/2,-ch/2);

  // ── Card background ──
  const grad=X.createLinearGradient(0,0,0,ch);
  if(selected&&!locked){
    grad.addColorStop(0,lc(bd.color,18));grad.addColorStop(.6,bd.dark);grad.addColorStop(1,"rgba(5,2,18,1)");
  }else{
    grad.addColorStop(0,"rgba(20,12,40,.97)");grad.addColorStop(1,"rgba(8,4,22,.97)");
  }
  X.fillStyle=grad;rr(0,0,cw,ch,13);X.fill();

  // ── Border (rainbow loops for UL) ──
  if(isUL&&selected){
    for(let i=0;i<3;i++){const ang=T*1.5+i*2.1;const hue=(T*80+i*45)%360;
      gl(`hsl(${hue},100%,65%)`,18-i*4);X.strokeStyle=`hsl(${hue},100%,${60+i*8}%)`;X.lineWidth=3.5-i;rr(-i,-i,cw+i*2,ch+i*2,13+i);X.stroke();ng()}
  }else if(selected){
    gl(rarCol(bd.rarity,T),26);X.strokeStyle=rarCol(bd.rarity,T);X.lineWidth=3;rr(0,0,cw,ch,13);X.stroke();ng();
  }else if(!locked){
    const rc=rarCol(bd.rarity,T);X.strokeStyle=rc+"55";X.lineWidth=1.8;rr(0,0,cw,ch,13);X.stroke();ng();
  }else{
    ng();X.strokeStyle="rgba(70,60,100,.4)";X.lineWidth=1.5;rr(0,0,cw,ch,13);X.stroke();
  }

  // ── Rarity stripe at top ──
  const stripeGr=X.createLinearGradient(0,0,cw,0);
  if(isUL){
    stripeGr.addColorStop(0,"transparent");
    for(let i=0;i<=4;i++)stripeGr.addColorStop(i/4,`hsla(${((T*80+i*72)%360)},100%,65%,.65)`);
    stripeGr.addColorStop(1,"transparent");

    stripeGr.addColorStop(0,"transparent");stripeGr.addColorStop(.3,R.color+"99");stripeGr.addColorStop(.7,R.color+"99");stripeGr.addColorStop(1,"transparent");
  }

  // ── Top-surface sheen ──

  X.fillStyle=sheen;rr(0,0,cw,ch*.5,13);X.fill();

    // Outer ambient glow
    const glowR=X.createRadialGradient(fx,fy,fr*.8,fx,fy,fr*2.2);

    // Pupil highlight
    X.fillStyle="rgba(255,255,255,.9)";X.beginPath();X.arc(fx-fr*.24,fy-fr*.15,pupR*.42,0,6.28);X.fill();
    X.beginPath();X.arc(fx+fr*.36,fy-fr*.15,pupR*.42,0,6.28);X.fill();
    // Coloured iris
    X.fillStyle=bd.color+"CC";X.beginPath();X.arc(fx-fr*.26,fy-fr*.11,pupR*.7,0,6.28);X.fill();
    X.beginPath();X.arc(fx+fr*.34,fy-fr*.11,pupR*.7,0,6.28);X.fill();
    X.fillStyle="#101030";X.beginPath();X.arc(fx-fr*.26,fy-fr*.11,pupR*.45,0,6.28);X.fill();
    X.beginPath();X.arc(fx+fr*.34,fy-fr*.11,pupR*.45,0,6.28);X.fill();
    X.fillStyle="rgba(255,255,255,.9)";X.beginPath();X.arc(fx-fr*.24,fy-fr*.15,pupR*.38,0,6.28);X.fill();
    X.beginPath();X.arc(fx+fr*.36,fy-fr*.15,pupR*.38,0,6.28);X.fill();
    // Mouth
    X.strokeStyle="rgba(0,0,0,.75)";X.lineWidth=1.8;X.lineCap="round";
    X.beginPath();X.arc(fx,fy+fr*.28,fr*.22,.1,Math.PI-.1);X.stroke();
    // Cheek flush
    X.fillStyle=bd.color+"44";X.beginPath();X.ellipse(fx-fr*.46,fy+fr*.04,fr*.16,fr*.09,-.3,0,6.28);X.fill();
    X.beginPath();X.ellipse(fx+fr*.46,fy+fr*.04,fr*.16,fr*.09,.3,0,6.28);X.fill();
  }else{
    // Locked silhouette
    const lkg=X.createRadialGradient(fx,fy,4,fx,fy,fr*1.2);
    lkg.addColorStop(0,"rgba(50,35,80,.95)");lkg.addColorStop(1,"rgba(20,12,40,.95)");
    X.fillStyle=lkg;X.beginPath();X.arc(fx,fy,fr,0,6.28);X.fill();
    X.strokeStyle=isUL?`hsl(${(T*80)%360},80%,55%)`:R.color+"55";X.lineWidth=2;X.stroke();
    X.font="22px serif";X.textAlign="center";X.textBaseline="middle";X.fillStyle="rgba(200,180,255,.6)";X.fillText("🔒",fx,fy);
    // Cost with gem icon for high rarities
    const hasGems=R.gems>0;
    gl(R.glow,6);X.fillStyle=isUL?`hsl(${(T*80)%360},100%,65%)`:R.color;
    X.font=`bold 9px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
    X.fillText(hasGems?`🪙${R.cost} + 💎${R.gems}`:`🪙 ${R.cost}`,fx,fy+fr+11);ng();
  }

  // ── Rarity label ──
  const rly=ch*.70;
  if(isUL){
    gl(`hsl(${(T*80)%360},100%,65%)`,selected?12:4);
    X.fillStyle=`hsl(${(T*80)%360},100%,72%)`;
  }else{
    gl(selected?R.glow:"transparent",selected?8:0);
    X.fillStyle=selected?R.color:R.color+"99";
  }
  X.font=`bold 8px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";X.fillText(R.label.toUpperCase(),cw/2,rly);ng();

  // ── Name ──
  X.fillStyle=selected?"#FFF":"rgba(255,255,255,.84)";
  X.font=`bold ${locked?9:10}px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(bd.name.toUpperCase(),cw/2,ch*.82);

  // ── Mini stat bars ──
  if(!locked){
    const stC=["#FF5555","#FFD700","#FF8800"],stV=[bd.sHp,bd.sSp,bd.sDm];
    const tbw=cw-18,bw2=(tbw-6)/3;
    for(let s=0;s<3;s++){
      const bx=9+s*(bw2+3),by=ch-15;
      X.fillStyle="rgba(0,0,0,.45)";rr(bx,by,bw2,4,2);X.fill();
      if(stV[s]>0){
        const sg=X.createLinearGradient(bx,0,bx+bw2,0);sg.addColorStop(0,stC[s]);sg.addColorStop(1,lc(stC[s],30));
        X.fillStyle=sg;rr(bx,by,bw2*stV[s]/5,4,2);X.fill();
      }
    }
  }
  // Selected tint
  if(selected){X.fillStyle="rgba(255,230,80,.1)";rr(0,0,cw,ch,13);X.fill()}
  X.restore();
  }catch(e){X.restore();ng();X.globalAlpha=1}
}

/* ═══ SETTINGS SCREEN ═══ */
function drawSettings(){
  // Dim background
  X.fillStyle="rgba(0,0,0,.82)";X.fillRect(0,0,W,H);

  const pw=440,ph=360,panx=W/2-pw/2,pany=H/2-ph/2;
  // Panel
  const pb=X.createLinearGradient(panx,pany,panx,pany+ph);
  pb.addColorStop(0,"rgba(14,6,40,.98)");pb.addColorStop(1,"rgba(6,2,18,.98)");
  X.fillStyle=pb;rr(panx,pany,pw,ph,26);X.fill();
  gl("#FFD700",22);X.strokeStyle="#FFD700";X.lineWidth=3;rr(panx,pany,pw,ph,26);X.stroke();ng();
  // Shine
  X.fillStyle="rgba(255,255,255,.06)";rr(panx,pany,pw,ph*.44,26);X.fill();

  // Title
  X.fillStyle="rgba(0,0,0,.5)";X.font=`bold 34px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText("⚙  "+t("settingsTitle"),W/2+2,pany+48+2);
  gl("#FFD700",18);X.fillStyle="#FFE566";X.fillText("⚙  "+t("settingsTitle"),W/2,pany+48);ng();

  // Divider
  X.strokeStyle="rgba(255,200,50,.25)";X.lineWidth=1;
  X.beginPath();X.moveTo(panx+40,pany+78);X.lineTo(panx+pw-40,pany+78);X.stroke();

  const rowH=78,row1Y=pany+118,row2Y=row1Y+rowH;

  // ── SOUND toggle ──
  X.fillStyle="rgba(255,255,255,.7)";X.font=`bold 20px "Lilita One"`;X.textAlign="left";X.textBaseline="middle";
  X.fillText(t("sound"),panx+52,row1Y);
  // Toggle pill
  const txOn=panx+pw-52-90,txW=90,txH=38,txR=19;
  const isOn=SAVE.sound;
  X.fillStyle=isOn?"rgba(255,140,0,.25)":"rgba(80,80,120,.3)";rr(txOn,row1Y-txH/2,txW,txH,txR);X.fill();
  gl(isOn?"#FF8800":"#5566AA",isOn?14:8);
  X.strokeStyle=isOn?"#FF8800":"#5566AA";X.lineWidth=2.5;rr(txOn,row1Y-txH/2,txW,txH,txR);X.stroke();ng();
  const knobX=isOn?txOn+txW-txR-2:txOn+txR+2;
  const knobGr=X.createRadialGradient(knobX-3,row1Y-4,2,knobX,row1Y,txR-4);
  knobGr.addColorStop(0,isOn?"#FFDD88":"#8899CC");knobGr.addColorStop(1,isOn?"#FF8800":"#445588");
  gl(isOn?"#FF8800":"#334466",12);X.fillStyle=knobGr;X.beginPath();X.arc(knobX,row1Y,txR-5,0,6.28);X.fill();ng();
  X.fillStyle=isOn?"#FFE":"rgba(200,210,255,.7)";X.font=`bold 14px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(isOn?t("soundOn"):t("soundOff"),txOn+txW/2,row1Y);

  // ── LANGUAGE toggle ──
  X.fillStyle="rgba(255,255,255,.7)";X.font=`bold 20px "Lilita One"`;X.textAlign="left";X.textBaseline="middle";
  X.fillText(t("lang"),panx+52,row2Y);
  // Two-button toggle DE / EN
  [["DE","🇩🇪"],["EN","🇬🇧"]].forEach(([lk,flag],i)=>{
    const btx=panx+pw-52-90+i*50,bty=row2Y-18,btw=44,bth=36,btr=8;
    const active=SAVE.lang===lk;
    if(active){gl("#FFD700",14);X.fillStyle="rgba(255,200,0,.28)"}
    else{ng();X.fillStyle="rgba(60,50,100,.5)"}
    rr(btx,bty,btw,bth,btr);X.fill();
    X.strokeStyle=active?"#FFD700":"rgba(150,150,200,.4)";X.lineWidth=2;
    rr(btx,bty,btw,bth,btr);X.stroke();ng();
    X.font="18px serif";X.textAlign="center";X.textBaseline="middle";X.fillText(flag,btx+btw/2,bty+bth/2-1);
    X.fillStyle=active?"#FFE":"rgba(200,210,255,.6)";X.font=`bold 9px "Lilita One"`;X.fillText(lk,btx+btw/2,bty+bth-8);
  });

  // ── BACK button ──
  const backY=pany+ph-50;
  const bp=.97+Math.sin(T*2.8)*.03;
  X.save();X.translate(W/2,backY);X.scale(bp,bp);
  const bg2=X.createLinearGradient(0,-22,0,22);bg2.addColorStop(0,"#FFE566");bg2.addColorStop(1,"#FF9900");
  gl("#FFAA00",18);X.fillStyle=bg2;rr(-90,-22,180,44,22);X.fill();
  X.strokeStyle="#AA6600";X.lineWidth=3;rr(-90,-22,180,44,22);X.stroke();ng();
  X.fillStyle="rgba(255,255,255,.22)";rr(-90,-22,180,24,22);X.fill();
  X.fillStyle="#3D1A00";X.font=`bold 18px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(t("back"),0,1);
  X.restore();

  // Hit areas stored for click handler
  drawSettings._row1={y:row1Y,txOn,txW,txH};
  drawSettings._row2={y:row2Y};
  drawSettings._langBtns=[-90,-45].map((ox,i)=>({lk:["DE","EN"][i],btx:panx+pw-52-90+i*50,bty:row2Y-18,btw:44,bth:36}));
  drawSettings._backY=backY;
  drawSettings._panx=panx;drawSettings._pw=pw;
}

function handleSettingsClick(x,y){
  const d=drawSettings;
  if(!d._row1)return;
  // Sound toggle
  const{y:ry,txOn,txW,txH}=d._row1;
  if(x>=txOn&&x<=txOn+txW&&Math.abs(y-ry)<txH/2+4){SAVE.sound=!SAVE.sound;persist();snd("select");return}
  // Language buttons
  for(const{lk,btx,bty,btw,bth}of(d._langBtns||[])){
    if(x>=btx&&x<=btx+btw&&y>=bty&&y<=bty+bth){SAVE.lang=lk;persist();snd("select");if(PL)annWave(WAVE+1);return}
  }
  // Back button
  if(d._backY&&Math.abs(x-W/2)<92&&Math.abs(y-d._backY)<25){snd("select");STATE=SETTINGS_FROM;return}
}

/* ═══ END SCREEN ═══ */
function drawEnd(won){
  X.fillStyle="rgba(0,0,0,.84)";X.fillRect(0,0,W,H);
  if(won){for(let i=0;i<70;i++){const cf=(T*.32+i*.75)%1,cx=(Math.sin(i*57.3)*.5+.5)*W,cy=cf*(H+50)-25;X.fillStyle=["#FFD700","#FF4444","#4488FF","#44FF44","#FF44FF","#44FFFF"][i%6];X.save();X.translate(cx,cy);X.rotate(T*3+i);X.globalAlpha=.82;X.fillRect(-(3+i%5),-3,6+i%5*2,6);X.restore();X.globalAlpha=1}}
  const pw=490,ph=END.ph,panx=W/2-pw/2,pany=END.pany;
  const pb2=X.createLinearGradient(panx,pany,panx,pany+ph);
  if(won){pb2.addColorStop(0,"rgba(4,16,7,.98)");pb2.addColorStop(1,"rgba(1,6,2,.98)")}else{pb2.addColorStop(0,"rgba(18,3,3,.98)");pb2.addColorStop(1,"rgba(6,1,1,.98)")}
  // Pop animation: 0.7 → 1.06 → 1.0 over ~0.45s
  const popT=Math.min(END_SHOW_T/.45,1);
  const popSc=popT<.7?(0.7+popT/.7*.36):(1.06-(popT-.7)/.3*.06);
  X.save();X.translate(W/2,H/2);X.scale(popSc,popSc);X.translate(-W/2,-H/2);
  X.fillStyle=pb2;rr(panx,pany,pw,ph,26);X.fill();
  const bc=won?"#44FF66":"#FF4444";gl(bc,26);X.strokeStyle=bc;X.lineWidth=3.8;rr(panx,pany,pw,ph,26);X.stroke();ng();
  // Title
  X.fillStyle="rgba(0,0,0,.55)";X.font=`bold 58px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(won?t("victory"):t("defeat"),W/2+3,pany+78+3);
  gl(won?"#88FF99":"#FF8888",22);X.fillStyle=won?"#88FF99":"#FF8888";
  X.fillText(won?t("victory"):t("defeat"),W/2,pany+78);ng();
  X.fillStyle=won?"#AAFFBB":"#FFAAAA";X.font=`18px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(won?t("victoryMsg"):t("defeatMsg"),W/2,pany+135);
  // Currencies earned
  X.save();X.translate(W/2,pany+158);const csc=1+Math.sin(T*3)*.04;X.scale(csc,csc);
  gl("#FFD700",14);X.fillStyle="#FFD700";X.font=`bold 19px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(t("coinsEarned",SESSION_COINS),0,0);ng();X.restore();
  // Trophies
  X.save();X.translate(W/2,pany+200);X.scale(csc,csc);
  gl("#FFD700",12);X.fillStyle="#FFD700";X.font=`bold 15px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(`🏆 ${(window._trophiesWon||0)>0?"+":" "}${window._trophiesWon||0}  Trophäen  (Gesamt: ${SAVE.trophies})`,0,0);ng();X.restore();
  if(won){
    X.save();X.translate(W/2,pany+180);X.scale(csc,csc);
    gl("#44FFDD",14);X.fillStyle="#44FFDD";X.font=`bold 16px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
    X.fillText(t("gemsEarned",3+KILLS,SAVE.gems),0,0);ng();X.restore();
  }
  // Stats box
  X.fillStyle="rgba(255,255,255,.07)";rr(W/2-190,pany+196,380,68,14);X.fill();
  const statLabels=SAVE.lang==="DE"?["💎 Gems","👾 Besiegt","🌊 Welle"]:["💎 Gems","👾 Defeated","🌊 Wave"];
  [statLabels[0],statLabels[1],statLabels[2]].forEach((lb,i)=>{
    const val=[PL.gems,KILLS,WAVE+1][i],sx=W/2-140+i*140;
    X.fillStyle="rgba(255,255,255,.5)";X.font=`11px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";X.fillText(lb,sx,pany+212);
    X.fillStyle="#FFF";X.font=`bold 26px "Lilita One"`;X.fillText(val,sx,pany+238);
  });
  // ── Buttons ──
  const bY=END.bY;
  [[W/2-120,t("playAgain")],[W/2+120,t("mainMenu")]].forEach(([bx,label])=>{
    const p2=.97+Math.sin(T*2.5+bx*.01)*.03;
    X.save();X.translate(bx,bY);X.scale(p2,p2);
    const bg3=X.createLinearGradient(0,-22,0,22);bg3.addColorStop(0,"#FFE566");bg3.addColorStop(1,"#FF9900");
    gl("#FFAA00",20);X.fillStyle=bg3;rr(-90,-22,180,44,22);X.fill();
    X.strokeStyle="#AA6600";X.lineWidth=3;rr(-90,-22,180,44,22);X.stroke();ng();
    X.fillStyle="rgba(255,255,255,.22)";rr(-90,-22,180,24,22);X.fill();
    X.fillStyle="#3D1A00";X.font=`bold 16px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
    X.fillText(label,0,1);
    X.restore();
  });
  X.restore(); // end pop scale
}

/* ═══ MAIN LOOP ═══ */
function update(){
  T+=DT;
  if(STATE==="win"||STATE==="lose")END_SHOW_T+=DT;
  if(STATE==="play"){
    updatePlayer();if(PL)updateEnemies();updateBullets();updatePar();updateDmg();updateStealth();if(MODE==="showdown")updateShowdown();if(MODE==="gems")updateGemGrab();if(MODE==="knockout")updateKnockout();
    if(SHK>0){SHK=Math.max(0,SHK-DT*3.5);SHX=(Math.random()-.5)*11*SHK;SHY=(Math.random()-.5)*11*SHK}else{SHX=0;SHY=0}
  }
}
function render(){
  X.clearRect(0,0,W,H);
  X.imageSmoothingEnabled=true;X.imageSmoothingQuality="high";
  if(STATE==="home"){drawHomeScreen();return}
  if(STATE==="create"){drawCreateScreen();return}
  // select state merged into home overlay
  if(STATE==="settings"){
    // draw the background state first
    if(SETTINGS_FROM==="home"){drawHomeScreen()}
    else if(SETTINGS_FROM==="play"&&PL){
      X.save();X.translate(SHX-Math.round(CAM_X),SHY-Math.round(CAM_Y));
      drawMap(T);drawBushes();drawShowdown();drawGems();drawPar();
      for(const e of ENM)if(e.dead&&e.deathT<.9){X.globalAlpha=Math.max(0,1-e.deathT*1.4);drawBrawler(e,false);X.globalAlpha=1}
      for(const e of ENM)if(!e.dead)drawBrawler(e,false);
      if(PL&&!PL.dead){if(PL.invT>0&&Math.floor(T*10)%2===0){}else drawBrawler(PL,true);}
      drawBullets();drawDmg();X.restore();drawHUD();
    }
    drawSettings();return;
  }
  X.save();X.translate(SHX-Math.round(CAM_X),SHY-Math.round(CAM_Y));
  drawMap(T);drawBushes();drawGems();drawPar();
  for(const e of ENM)if(e.dead&&e.deathT<.9){X.globalAlpha=Math.max(0,1-e.deathT*1.4);drawBrawler(e,false);X.globalAlpha=1}
  for(const e of ENM)if(!e.dead)drawBrawler(e,false);
  if(PL&&!PL.dead){if(PL.invT>0&&Math.floor(T*10)%2===0){}else drawBrawler(PL,true);}
  drawBullets();drawDmg();X.restore();
  drawHUD();
  if(STATE==="win")drawEnd(true);
  if(STATE==="lose")drawEnd(false);
}
function loop(ts){
  DT=Math.min((ts-LT)/1000,.05);LT=ts;
  try{update()}catch(err){console.error("UPDATE CRASH:",err.message,"\nStack:",err.stack);if(!window._errShown){window._errShown=1;alert("Update error: "+err.message)}}
  try{render()}catch(err){console.error("RENDER CRASH:",err.message,"\nStack:",err.stack);if(!window._errShown){window._errShown=1;alert("Render error: "+err.message)}}
  requestAnimationFrame(loop)
}
buildCache();requestAnimationFrame(loop);
</script>
