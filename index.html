/* ═══ DRAW WEAPON ═══ */
function drawWeapon(b,isPlayer){
  const r=b.r;const S=r/21;X.save();
  // Translate to hand position (front arm tip)
  const handX=Math.cos(b.angle)*(r*.6);
  const handY=Math.sin(b.angle)*(r*.6)-r*.25;
  X.translate(handX,handY);
  X.rotate(b.angle);
  const wt=isPlayer?PL.wType:b.type==="tank"?"heavy":b.type==="mortar"?"thrower":"rifle";
  if(wt==="shotgun"||wt==="heavy"||wt==="hammer"){X.fillStyle=lc(b.body,15);X.fillRect(r*.28,-6,r*.7,12);X.fillStyle="#444";X.fillRect(r*.85,-5,22,10);if(wt==="hammer"){X.fillStyle=lc(b.color,20);X.fillRect(r*.75,-10,8,20)}}
  else if(wt==="rifle"||wt==="blades"||wt==="cards"){X.fillStyle=lc(b.body,15);X.fillRect(r*.28,-4,r*.6,8);X.fillStyle="#666";X.fillRect(r*.8,-3,26,6);X.fillStyle="#444";X.fillRect(r*.88,-2,24,4)}
  else if(wt==="rocket"){X.fillStyle=lc(b.body,10);X.fillRect(r*.3,-7,r*.55,14);gl(b.color,8);X.fillStyle="#774422";X.beginPath();X.arc(r*.9,0,11,0,6.28);X.fill();ng();X.strokeStyle="#331A08";X.lineWidth=2;X.stroke()}
  else if(wt==="thrower"||wt==="mortar"){X.fillStyle="#886633";X.fillRect(r*.22,-7,r*.6,14);gl("#AACCFF",10);X.fillStyle="#AAC4EE";X.beginPath();X.ellipse(r*.84,0,11,7,0,0,6.28);X.fill();ng();X.strokeStyle="#443311";X.lineWidth=2;X.stroke()}
  else if(wt==="sniper"){X.fillStyle=lc(b.body,20);X.fillRect(r*.25,-3,r*.85,6);X.fillStyle="#888";X.fillRect(r*.95,-2.5,30,5);gl(b.color,6);X.fillStyle=b.color;X.beginPath();X.arc(r*.95+30,0,3,0,6.28);X.fill();ng()}
  else if(wt==="spike"){X.fillStyle=lc(b.body,15);X.fillRect(r*.3,-5,r*.5,10);for(let i=-1;i<=1;i++){gl(b.color,8);X.fillStyle=b.color;X.beginPath();X.moveTo(r*.8,i*7);X.lineTo(r*.8+16,i*6-4);X.lineTo(r*.8+14,i*6+4);X.closePath();X.fill();ng()}}
  else{X.fillStyle=lc(b.body,15);X.fillRect(r*.3,-5,r*.7,10);X.fillStyle="#555";X.fillRect(r*.9,-4,20,8)}
  X.restore();
}

/* ═══ DRAW BUSHES ═══ */
function drawBushes(alpha){
  if(!BUSHES||!BUSHES.length)return;
  X.save();
  for(const b of BUSHES){
    const sway=Math.sin(T*1.2+b.phase)*1.5;
    X.save();X.translate(b.x,b.y);X.rotate(sway*0.015);
    // Schatten
    X.fillStyle="rgba(0,0,0,.18)";rr(-b.s/2+3,b.s/4,b.s-6,b.s/3,6);X.fill();
    // Haupt-Busch-Körper
    const bg=X.createRadialGradient(-b.s*.15,-b.s*.2,2,0,0,b.s*.58);
    bg.addColorStop(0,"#3aaa3c");bg.addColorStop(.5,"#26822a");bg.addColorStop(1,"#194d1a");
    X.fillStyle=bg;
    X.beginPath();
    // Abgerundete unregelmäßige Form
    X.ellipse(0,b.s*.06,b.s*.48,b.s*.38,0,0,Math.PI*2);X.fill();
    // Highlights
    X.fillStyle="rgba(100,220,80,.35)";
    X.beginPath();X.ellipse(-b.s*.12,-b.s*.08,b.s*.22,b.s*.15,-.4,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(b.s*.16,-b.s*.04,b.s*.16,b.s*.11,.3,0,Math.PI*2);X.fill();
    // Blatt-Detail
    X.strokeStyle="rgba(80,180,60,.5)";X.lineWidth=1.5;
    X.beginPath();X.moveTo(0,b.s*.1);X.bezierCurveTo(-b.s*.1,-b.s*.1,-b.s*.3,-b.s*.05,-b.s*.38,-b.s*.18);X.stroke();

    X.restore();
  }
  X.restore();
}

/* ═══ DRAW BRAWLER ═══ */
function drawBrawler(b,isPlayer){
  if(b.dead&&b.deathT>.85)return;
  const{x,y,r,color,dark,angle,invT,walkT,type}=b;
  const flash=invT>0&&Math.floor(invT*32)%2===0;
  const S=r/21;
  const walk=walkT||0;
  const legSwing=Math.sin(walk*6)*0.32;
  const armSwing=Math.sin(walk*6)*0.38;
  const bodyBob=Math.abs(Math.sin(walk*6))*2.5;
  const stealthed=isPlayer&&PL&&PL.stealth>0;
  const hiddenInBush=isPlayer&&PL&&PL.hidden;
  const enemyHidden=!isPlayer&&b.hidden===true;
  const facingR=Math.cos(angle)>=0;
  const flip=facingR?1:-1;

  // ── OUTER SAVE: position + alpha ────────────────────────────────
  X.save();
  X.translate(x, y+bodyBob);
  if(stealthed)X.globalAlpha=.32;
  else if(hiddenInBush)X.globalAlpha=.45;
  else if(enemyHidden){X.restore();return;}

  // Ground shadow
  X.fillStyle="rgba(0,0,0,.25)";
  X.beginPath();X.ellipse(0,r+3,r*.78,r*.2,0,0,6.28);X.fill();

  // Status rings (before flip scale so they're symmetric)
  if(isPlayer&&PL){
    if(PL.sup>=PL.supMax){
      gl("#FF8800",14);X.strokeStyle=`rgba(255,160,0,${.7+Math.sin(T*7)*.25})`;
      X.lineWidth=3.5*S;X.beginPath();X.arc(0,-r*.35,r+5*S,0,6.28);X.stroke();ng();
    }
    if(PL.shield>0){
      gl("#44FF88",16);X.strokeStyle=`rgba(50,255,140,${.6+Math.sin(T*5)*.25})`;
      X.lineWidth=4*S;X.beginPath();X.arc(0,-r*.35,r+7*S,0,6.28);X.stroke();ng();
    }
  }

  // ── FLIP SAVE: mirror for left-facing ────────────────────────────
  X.save();
  X.scale(flip,1);

  const fc=flash?"#FFF":color, fd=flash?"#DDD":dark;
  const leg=lc(dark,-8), boot=lc(dark,-20);
  const lW=5*S, lH=12*S, lY=2*S, lSp=5*S;
  const bW=15*S, bH=15*S, bY=-11*S;
  const hR=8*S, hY=bY-hR+2*S;
  const aW=4*S, aH=10*S, aY=bY+2*S;

  X.fillStyle="rgba(255,255,255,.18)";X.beginPath();X.ellipse(-hR*.2,hY-hR*.28,hR*.38,hR*.26,-.4,0,6.28);X.fill();

  }

  // ── EYES ──
  const eY=hY-hR*.06,eSpX=hR*.36,eR=hR*.2;
  X.fillStyle="#FAFFF8";
  X.beginPath();X.ellipse(-eSpX,eY,eR,eR*.82,0,0,6.28);X.fill();
  X.beginPath();X.ellipse(eSpX,eY,eR,eR*.82,0,0,6.28);X.fill();
  // pupils look toward aim
  const lookA=angle+(flip<0?Math.PI:0);
  const lox=Math.cos(lookA)*eR*.4,loy=Math.sin(lookA)*eR*.4;
  X.fillStyle=isPlayer?"#1A3A7A":"#330011";
  X.beginPath();X.arc(-eSpX+lox*.5,eY+loy*.5,eR*.52,0,6.28);X.fill();
  X.beginPath();X.arc(eSpX+lox*.5,eY+loy*.5,eR*.52,0,6.28);X.fill();
  X.fillStyle="rgba(255,255,255,.88)";
  X.beginPath();X.arc(-eSpX+lox*.3-eR*.12,eY+loy*.3-eR*.16,eR*.26,0,6.28);X.fill();
  X.beginPath();X.arc(eSpX+lox*.3-eR*.12,eY+loy*.3-eR*.16,eR*.26,0,6.28);X.fill();
  // eyebrows

    X.beginPath();X.moveTo(eSpX+eR*.6,browY-2*S);X.lineTo(eSpX-eR*.4,browY+S);X.stroke();
  }else{
    X.beginPath();X.moveTo(-eSpX-eR*.5,browY);X.lineTo(-eSpX+eR*.5,browY-S);X.stroke();
    X.beginPath();X.moveTo(eSpX-eR*.5,browY);X.lineTo(eSpX+eR*.5,browY-S);X.stroke();
  }
  X.lineCap="butt";
  // mouth
  X.strokeStyle="rgba(0,0,0,.7)";X.lineWidth=1.8*S;X.lineCap="round";
  X.beginPath();
  if(isPlayer)X.arc(0,hY+hR*.3,hR*.2,.12,Math.PI-.12);
  else X.arc(0,hY+hR*.42,hR*.2,Math.PI+.22,-.22);
  X.stroke();X.lineCap="butt";

  // ── FRONT ARM ──
  X.save();X.translate(-bW/2+2*S,aY);X.rotate(armSwing+.18);
  X.fillStyle=flash?"#EEE":lc(color,10);
  X.beginPath();X.ellipse(0,aH/2,aW/2,aH/2,0,0,6.28);X.fill();
  X.fillStyle=flash?"#DDD":lc(color,18);X.beginPath();X.arc(0,aH,aW*.5,0,6.28);X.fill();
  X.restore();

  X.restore(); // ── END FLIP SAVE ──

  // Weapon drawn after flip restore, in original orientation
  if(facingR)drawWeapon(b,isPlayer);

  X.globalAlpha=1;
  X.restore(); // ── END OUTER SAVE ──

  // ── STATUS EFFECTS overlay ──
  // ── HYPERCHARGE golden aura ──
  if(isPlayer&&PL&&PL._hyperActive){
    const hprog=PL._hyperT/4;
    const ha=0.35+Math.sin(T*8)*.15;
    // Pulsing gold ring
    for(let ring=0;ring<3;ring++){
      const rr2=r*(1.4+ring*.25+Math.sin(T*6+ring)*.1);

      X.strokeStyle=`rgba(255,215,0,${ha*(1-ring*.25)})`;X.lineWidth=3-ring*.5;
      X.beginPath();X.arc(x,y,rr2,0,6.28);X.stroke();ng();
    }
    // Sparkling particles around body
    for(let sp=0;sp<6;sp++){
      const sa=T*5+sp/6*6.28;
      gl("#FFD700",6);
      X.fillStyle=`rgba(255,220,50,${0.6+Math.sin(T*7+sp)*.4})`;
      X.beginPath();X.arc(x+Math.cos(sa)*r*1.3,y+Math.sin(sa)*r*1.3,2.5+Math.sin(T*4+sp)*1.5,0,6.28);X.fill();ng();
    }
    // HYPERCHARGE label
    X.save();const hs=0.85+Math.sin(T*10)*.08;X.translate(x,y-r*2.2);X.scale(hs,hs);
    gl("#FFD700",10);X.fillStyle="#FFE040";X.font='bold 8px "Lilita One"';X.textAlign="center";X.textBaseline="middle";X.fillText("⚡ HYPERCHARGE",0,0);ng();X.restore();
  }
  if(b._stunT>0){
    // Yellow stars circling head when stunned
    const stunProg=b._stunT;
    for(let s=0;s<5;s++){
      const sa=T*4+s/5*6.28,sr=r*.7;
      gl("#FFD700",6);X.fillStyle="#FFD700";X.font='10px serif';X.textAlign="center";X.textBaseline="middle";
      X.fillText("★",x+Math.cos(sa)*sr,y-r*1.5+Math.sin(sa)*sr*.4);ng();
    }
  }
  if(b._slowT>0){
    // Blue frost effect
    const sa=(b._slowT%1)*6.28;
    X.save();X.globalAlpha=0.35;
    X.fillStyle="#88CCFF";X.beginPath();X.arc(x,y,r*1.15,0,6.28);X.fill();
    X.globalAlpha=1;X.restore();
    // Ice crystals
    for(let s=0;s<4;s++){const a=sa+s/4*6.28;gl("#88AAFF",4);X.fillStyle="#AADDFF";X.font='8px serif';X.textAlign="center";X.textBaseline="middle";X.fillText("❄",x+Math.cos(a)*r*.9,y+Math.sin(a)*r*.9);ng()}
  }
  if(isPlayer&&PL&&PL.shield>0){
    // Animated shield ring
    const sf=PL.shield/3,sa2=T*3;
    gl("#44FF88",12+Math.sin(T*6)*4);
    X.strokeStyle=`rgba(68,255,136,${0.4+Math.sin(T*4)*.2})`;X.lineWidth=4;
    X.beginPath();X.arc(x,y,r*1.35,sa2,sa2+sf*6.28);X.stroke();ng();
  }
  if(isPlayer&&PL&&PL.stealth>0&&Math.floor(T*8)%2===0){
    // Shimmer effect for stealth
    X.save();X.globalAlpha=0.25;
    const stGr=X.createRadialGradient(x,y,0,x,y,r*1.3);
    stGr.addColorStop(0,"rgba(100,200,255,.6)");stGr.addColorStop(1,"transparent");
    X.fillStyle=stGr;X.beginPath();X.arc(x,y,r*1.3,0,6.28);X.fill();
    X.globalAlpha=1;X.restore();
  }

  drawBrawlerUI(b,isPlayer,x,y+bodyBob+bY-hR*2);
}

function drawBrawlerUI(b,isPlayer,bx,topY){
  const{hp,maxHp,name,ammo,maxAmmo,color}=b;
  const BAR_W=64, UI_Y=topY-16;

  // ── Name tag (Brawl Stars style pill) ──
  X.save();
  const ntW2=Math.max(60,name.length*7+20),ntH2=18,ntY2=UI_Y-26;
  X.fillStyle=isPlayer?"rgba(50,120,255,.85)":b.team===0?"rgba(40,80,200,.82)":"rgba(60,60,80,.82)";
  rr(bx-ntW2/2,ntY2,ntW2,ntH2,ntH2/2);X.fill();
  X.strokeStyle=isPlayer?"rgba(100,180,255,.7)":b.team===0?"rgba(80,140,255,.6)":"rgba(255,80,80,.5)";X.lineWidth=1.5;
  rr(bx-ntW2/2,ntY2,ntW2,ntH2,ntH2/2);X.stroke();
  X.fillStyle="#FFF";X.font=`bold 10px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(name,bx,ntY2+ntH2/2);
  X.restore();

  // ── Health bar background ──
  X.fillStyle="rgba(0,0,0,0.55)";
  X.fillRect(bx-BAR_W/2-1,UI_Y-1,BAR_W+2,12);

  // Background track
  X.fillStyle="rgba(0,0,0,0.4)";
  X.fillRect(bx-BAR_W/2,UI_Y,BAR_W,10);

  // Filled portion
  const hpRatio=Math.max(0,hp/maxHp);
  const hpC=hpRatio>0.6?"#33FF33":hpRatio>0.4?"#AAEE00":"#FF3333";
  if(hpRatio>0){
    X.fillStyle=hpC;
    X.fillRect(bx-BAR_W/2,UI_Y,BAR_W*hpRatio,10);
    // shine
    X.fillStyle="rgba(255,255,255,0.22)";
    X.fillRect(bx-BAR_W/2,UI_Y,BAR_W*hpRatio,4);
  }

  // Segmented dividers (4 segments)
  X.fillStyle="rgba(0,0,0,0.55)";
  for(let s=1;s<4;s++)X.fillRect(bx-BAR_W/2+BAR_W*s/4-1,UI_Y,1,10);

  // Black border
  X.strokeStyle="#000";X.lineWidth=2;
  X.strokeRect(bx-BAR_W/2,UI_Y,BAR_W,10);

  // HP number inside bar
  X.font=`bold 7px "Lilita One"`;
  X.textAlign="center";X.textBaseline="middle";
  X.fillStyle="rgba(0,0,0,0.7)";X.fillText(Math.ceil(Math.max(0,hp)),bx+1,UI_Y+6);
  X.fillStyle="#FFF";X.fillText(Math.ceil(Math.max(0,hp)),bx,UI_Y+5);

  // ── Ammo bars ──
  if(isPlayer&&maxAmmo){
    const AMMO_Y=UI_Y+13;
    const slots=Math.min(maxAmmo,6);
    const gap=3;
    const aw=(BAR_W-(gap*(slots-1)))/slots;
    const ammoF=isPlayer&&PL?PL.ammoF:ammo;
    for(let i=0;i<slots;i++){
      const ax=bx-BAR_W/2+i*(aw+gap);
      X.fillStyle="rgba(0,0,0,0.5)";X.fillRect(ax,AMMO_Y,aw,5);
      const fill=Math.max(0,Math.min(1,ammoF-i));
      if(fill>0){
        X.fillStyle="#FF8800";X.fillRect(ax,AMMO_Y,aw*fill,5);
        X.fillStyle="rgba(255,255,255,0.35)";X.fillRect(ax,AMMO_Y,aw*fill,2);
      }
      X.strokeStyle="rgba(0,0,0,0.6)";X.lineWidth=1;X.strokeRect(ax,AMMO_Y,aw,5);
    }
    // Reload arc for slot being refilled
    if(ammo<maxAmmo&&PL&&PL.ammoR){
      const ri=ammo;
      const ax=bx-BAR_W/2+ri*(aw+gap)+aw/2;
      const ay=AMMO_Y+2.5;
      X.strokeStyle="#FFD700";X.lineWidth=1.5;
      X.beginPath();X.arc(ax,ay,3.5,-Math.PI/2,-Math.PI/2+(PL.ammoT/PL.ammoR)*6.28);X.stroke();
    }
  }
}

function drawShowdown(){
  if(MODE==="knockout"&&KO_POISON_ACTIVE&&KO_POISON_R>0){
    // Gas from top
    const mapH=ROWS*TS;
    const gasGr1=X.createLinearGradient(0,0,0,KO_POISON_R);
    gasGr1.addColorStop(0,"rgba(30,120,20,.85)");gasGr1.addColorStop(1,"rgba(30,120,20,.0)");
    X.fillStyle=gasGr1;X.fillRect(0,0,COLS*TS,KO_POISON_R);
    // Gas from bottom
    const gasGr2=X.createLinearGradient(0,mapH,0,mapH-KO_POISON_R);
    gasGr2.addColorStop(0,"rgba(30,120,20,.85)");gasGr2.addColorStop(1,"rgba(30,120,20,.0)");
    X.fillStyle=gasGr2;X.fillRect(0,mapH-KO_POISON_R,COLS*TS,KO_POISON_R);
    // Bubble particles
    for(let _i=0;_i<8;_i++){
      const bx=(_i/7)*COLS*TS;
      const by1=KO_POISON_R*(0.5+Math.sin(T*2+_i)*.4);
      const by2=mapH-KO_POISON_R*(0.5+Math.sin(T*2.5+_i)*.4);
      const ba=Math.sin(T*3+_i)*.4;
      X.fillStyle=`rgba(60,255,80,${.4+ba*.2})`;
      X.beginPath();X.arc(bx,by1,5+ba*3,0,6.28);X.fill();
      X.beginPath();X.arc(bx,by2,5+ba*3,0,6.28);X.fill();
    }
  }
  if(MODE!=="showdown")return;
  const mapW=COLS*TS,mapH=ROWS*TS,cx=mapW/2,cy=mapH/2;
  // ── Poison zone overlay — draw dark fog OUTSIDE the safe circle ──
  if(SD_POISON_R<SD_POISON_MAX*.98){
    const pulsate=Math.sin(T*4)*.04+.96;
    const pr=SD_POISON_R*pulsate;
    // Use clipping path: clip to OUTSIDE the safe circle
    X.save();
    X.beginPath();
    // Full map rect as outer boundary
    X.rect(0,0,mapW,mapH);
    // Safe circle cut-out (evenodd fills the ring between rect and circle)
    X.arc(cx,cy,pr,0,6.28,false);
    X.clip("evenodd");
    // Now fill only hits the area OUTSIDE the circle
    X.fillStyle="rgba(0,60,20,.55)";
    X.fillRect(0,0,mapW,mapH);
    X.restore();
    // Glowing edge ring (no clipping needed)
    const edgeGr=X.createRadialGradient(cx,cy,Math.max(0,pr-32),cx,cy,pr+12);
    edgeGr.addColorStop(0,"transparent");
    edgeGr.addColorStop(.5,`rgba(40,255,100,${.35+Math.sin(T*6)*.1})`);
    edgeGr.addColorStop(1,"rgba(0,80,20,.55)");
    X.fillStyle=edgeGr;
    X.beginPath();
    X.arc(cx,cy,pr+12,0,6.28);
    X.arc(cx,cy,Math.max(0,pr-32),0,6.28,true);
    X.fill();
    // Bubble particles on edge
    for(let i=0;i<12;i++){
      const ba=i/12*6.28+T*.8;
      const bx=cx+Math.cos(ba)*pr,by=cy+Math.sin(ba)*pr;
      const ba2=Math.sin(T*3+i)*.4;
      gl("rgba(60,255,100,.6)",6);
      X.fillStyle=`rgba(80,255,120,${.5+Math.sin(T*4+i)*.3})`;
      X.beginPath();X.arc(bx,by,4+Math.sin(T*5+i)*2,0,6.28);X.fill();ng();
    }
  }
  // ── Powerup (fuel tanks) ──
  for(const p of SD_POWERUPS){
    if(p.collected)continue;
    const sc=p.sc||0;
    if(sc<0.05)continue;
    const bob=Math.sin((p.bob||0))*5;
    X.save();X.translate(p.x,p.y+bob);X.scale(sc,sc);
    // Shadow
    X.fillStyle="rgba(0,0,0,.3)";X.beginPath();X.ellipse(0,18,12,4,0,0,6.28);X.fill();
    // Tank body
    gl("#FFD700",14);
    X.fillStyle="#CC8800";
    X.beginPath();X.ellipse(0,0,9,14,0,0,6.28);X.fill();
    X.fillStyle="#FFCC00";
    X.beginPath();X.ellipse(-2,-3,5,8,-.2,0,6.28);X.fill();
    // Red cross
    X.fillStyle="#FF3333";
    X.fillRect(-6,-2,12,4);X.fillRect(-2,-6,4,12);
    // Shine
    X.fillStyle="rgba(255,255,255,.4)";X.beginPath();X.ellipse(-3,-5,4,5,-.3,0,6.28);X.fill();
    ng();
    // HP value
    X.fillStyle="#FFF";X.font='bold 9px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
    X.fillText("+"+p.val,0,25);
    X.restore();
  }
}

function updateCreateColor(){
  CREATE.color=hslToHex(CREATE.hue,CREATE.sat,CREATE.bri);
  CREATE.dark=hslToHex(CREATE.hue,CREATE.sat,Math.max(10,CREATE.bri-22));
}
function hslToHex(h,s,l){
  s/=100;l/=100;const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(-1,Math.min(k-3,9-k,1));return Math.round(255*c).toString(16).padStart(2,"0")}
  return"#"+f(0)+f(8)+f(4);
}

function drawHeist(){
  if(MODE!=="heist")return;
  for(let ti=0;ti<2;ti++){

    const dark=isBlue?"#1144AA":"#AA1111";

    if(s.invT>0){
      const ip=Math.sin(T*14)*.5+.5;

    }

    X.save();X.translate(sx,sy);

    const vGr=X.createRadialGradient(-s.r*.3,-s.r*.3,4,0,0,s.r*1.4);

    X.strokeStyle="rgba(255,255,255,.5)";X.lineWidth=3;X.beginPath();X.arc(0,0,s.r*.6,0,6.28);X.stroke();

function handleSettingsClick(x,y){
  const d=drawSettings;
  if(!d._row1)return;
  // Sound toggle
  const{y:ry,txOn,txW,txH}=d._row1;
  if(x>=txOn&&x<=txOn+txW&&Math.abs(y-ry)<txH/2+4){SAVE.sound=!SAVE.sound;persist();snd("select");return}
  // Language buttons
  for(const{lk,btx,bty,btw,bth}of(d._langBtns||[])){
    if(x>=btx&&x<=btx+btw&&y>=bty&&y<=bty+bth){SAVE.lang=lk;persist();snd("select");if(PL)annWave(WAVE+1);return}
  }
  // Back button
  if(d._backY&&Math.abs(x-W/2)<92&&Math.abs(y-d._backY)<25){snd("select");STATE=SETTINGS_FROM;return}
}

    MM_LINEUP.redDef=[_pool[2]||"BULL",_pool[3]||"FRANK",_pool[4]||"ROSA"];
    MM_LINEUP.redAtt=[_pool[5]||"BROCK",_pool[6]||"COLT"];

  }

    slotAllys=Array(9).fill(false);
  } else if(curM.key==="brawlball"){
    slotKeys=[...MM_LINEUP.allies,...MM_LINEUP.redDef,...MM_LINEUP.redAtt].slice(0,5);
    slotAllys=[true,true,false,false,false];
  } else {
    // allies first, then enemies
    slotKeys=[...MM_LINEUP.allies,...MM_LINEUP.enemies];
    slotAllys=[true,true,false,false,false];
  }
  for(let i=0;i<slotCount;i++){
    MM_PLAYERS.push({
      name:null,tag:null,trophies:null,rank:null,color:null,rarity:null,
      bdKey:slotKeys[i]||BD[i%BD.length].key,

function updateMatchmaking(){
  MM_T+=DT;
  MM_DOTS=Math.floor(MM_T*2)%4;
  const key=BD[SEL].key;
  const p2=isPrestige2(key);
  const bt=SAVE.brawlerTrophies[key]||0;
  // Fill player slots progressively
  MM_PLAYERS.forEach(p=>{
    if(!p.name&&MM_T>=p.fillAt){
      // At Prestige 2: hide player names (show ??? instead)
      p.name=p2?"???":MM_NAMES[Math.floor(Math.random()*MM_NAMES.length)];
      p.tag=p2?"#????":MM_TAGS();
      // Trophy spread: close to player's brawler trophies (tighter at Prestige 2)
      const spread=p2?0.15:0.5;
      p.trophies=Math.max(0,Math.floor(bt*(1-spread+Math.random()*spread*2)));
      p.rank=Math.floor(Math.random()*20)+1;
      p.color=BD[Math.floor(Math.random()*BD.length)].color;
      p.rarity=["COMMON","RARE","SUPER_RARE","EPIC","MYTHIC"][Math.floor(Math.random()*5)];
      snd("select");
    }
  });
  // Phase 1: all filled → "Match found"
  if(MM_PHASE===0&&MM_PLAYERS.every(p=>p.name)&&MM_T>1.5){
    MM_PHASE=1;MM_T=0;
  }
  // Phase 2: after 1s on "found" → loading bar
  if(MM_PHASE===1&&MM_T>1.0){MM_PHASE=2;MM_T=0;}
  // Phase 3: after loading bar → start game
  if(MM_PHASE===2&&MM_T>1.8){init();}
}

    // Team mode: allies on left, enemies on right
    // Team label
    if(allies.length>0){
      X.fillStyle="rgba(68,136,255,.18)";X.strokeStyle="rgba(68,136,255,.35)";X.lineWidth=1;
      rr(myX-370,myY-slotR-30,240,slotR*2+90,14);X.fill();X.stroke();
      gl("#4488FF",6);X.fillStyle="#4488FF";X.font=`bold 10px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
      X.fillText("🔵 DEIN TEAM",myX-250,myY-slotR-18);ng();
    }
    if(enemies.length>0){
      X.fillStyle="rgba(255,68,68,.18)";X.strokeStyle="rgba(255,68,68,.35)";X.lineWidth=1;
      rr(myX+130,myY-slotR-30,240,slotR*2+90,14);X.fill();X.stroke();
      gl("#FF4444",6);X.fillStyle="#FF4444";X.font=`bold 10px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
      X.fillText("🔴 GEGNER",myX+250,myY-slotR-18);ng();
    }
    // Ally positions: 1 or 2 on the left
    const allySpacing=90;
    allies.forEach((p,i)=>{
      const ox=(i-(allies.length-1)/2)*allySpacing;
      drawSlot(p,myX-260+ox,myY);
    });
    // Enemy positions: up to 5 on the right, 2 rows
    enemies.forEach((p,i)=>{
      const col=i%3,row=Math.floor(i/3);
      const ex=myX+180+col*88;
      const ey=myY+(row-0.5)*allySpacing;
      drawSlot(p,ex,ey);
    });
  }

  // ── STATUS TEXT ──
  const statusY=H*.82;
  // Prestige 2 badge
  const _mmKey=BD[SEL].key;
  const _mmP2=isPrestige2(_mmKey);
  if(_mmP2){
    const p2W=220,p2H=22,p2X=W/2-p2W/2;
    X.fillStyle="rgba(255,180,0,.15)";rr(p2X,statusY-38,p2W,p2H,11);X.fill();
    X.strokeStyle="rgba(255,180,0,.4)";X.lineWidth=1;rr(p2X,statusY-38,p2W,p2H,11);X.stroke();
    gl("#FFD700",4);X.fillStyle="#FFD700";X.font=`bold 10px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
    X.fillText("⭐ PRESTIGE 2 — Echte Spieler, Namen verborgen",W/2,statusY-27);ng();
  }
  if(MM_PHASE===0){
    const dots=".".repeat(MM_DOTS);
    const filled=slots.filter(p=>p.name).length;
    gl("#8866FF",10);X.fillStyle="#AA88FF";X.font=`bold 20px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
    X.fillText(`Suche nach Spielern${dots}`,W/2,statusY);ng();
    X.fillStyle="rgba(180,160,255,.6)";X.font=`bold 12px "Lilita One"`;
    X.fillText(`${filled+1} / ${slots.length+1} Spieler gefunden`,W/2,statusY+28);
    // Progress bar
    const pbW=280,pbH=8,pbX=W/2-pbW/2;
    X.fillStyle="rgba(0,0,0,.4)";rr(pbX,statusY+44,pbW,pbH,4);X.fill();
    const pbFill=((filled+1)/(slots.length+1));
    const pbGr=X.createLinearGradient(pbX,0,pbX+pbW,0);
    pbGr.addColorStop(0,"#8844FF");pbGr.addColorStop(1,"#AA66FF");
    X.fillStyle=pbGr;rr(pbX,statusY+44,pbW*pbFill,pbH,4);X.fill();
  } else if(MM_PHASE===1){
    const pulse2=.97+Math.sin(MM_T*8)*.03;
    X.save();X.translate(W/2,statusY);X.scale(pulse2,pulse2);
    gl("#44FF88",20);
    X.fillStyle="#44FF88";X.font=`bold 26px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
    X.fillText("✓ MATCH GEFUNDEN!",0,0);ng();
    X.restore();
  } else if(MM_PHASE===2){
    gl("#FFD700",10);X.fillStyle="#FFD700";X.font=`bold 20px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
    X.fillText("Lade Spiel...",W/2,statusY);ng();
    const lbW=320,lbH=10,lbX=W/2-lbW/2;
    X.fillStyle="rgba(0,0,0,.4)";rr(lbX,statusY+20,lbW,lbH,5);X.fill();
    const lbFill=Math.min(1,MM_T/1.8);
    const lbGr=X.createLinearGradient(lbX,0,lbX+lbW,0);
    lbGr.addColorStop(0,"#FFCC00");lbGr.addColorStop(1,"#FF8800");
    X.fillStyle=lbGr;rr(lbX,statusY+20,lbW*lbFill,lbH,5);X.fill();
    // Flash effect near end
    if(lbFill>.85){X.globalAlpha=((lbFill-.85)/.15)*(.5+Math.sin(T*20)*.3);X.fillStyle="#FFF";X.fillRect(0,0,W,H);X.globalAlpha=1;}
  }

  // ── CANCEL BUTTON ──
  X.fillStyle="rgba(255,255,255,.1)";rr(W/2-60,H-52,120,34,17);X.fill();
  X.strokeStyle="rgba(255,255,255,.2)";X.lineWidth=1.5;rr(W/2-60,H-52,120,34,17);X.stroke();
  X.fillStyle="rgba(255,255,255,.6)";X.font=`bold 12px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText("✕  ABBRECHEN",W/2,H-35);
}

function handleMatchmakingClick(x,y){
  // Cancel button
  if(Math.abs(x-W/2)<70&&y>H-60){STATE="home";snd("select");}
}

/* ═══ BRAWLER COLLECTION ═══ */
function drawBrawlerCollection(){
  const bd=BD[BRAWLER_SEL]||BD[0];
  const R=RARITY[bd.rarity];

  // ── Full-screen BG ──
  const bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,"#1A0848");bg.addColorStop(1,"#0A0424");
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  // Brawler color glow behind right panel
  const glowGr=X.createRadialGradient(W*.72,H*.45,30,W*.72,H*.45,300);
  glowGr.addColorStop(0,ca(bd.color,"28"));glowGr.addColorStop(1,"transparent");
  X.fillStyle=glowGr;X.fillRect(0,0,W,H);

  // ── TOP BAR ──
  const topH=52;
  X.fillStyle="rgba(0,0,20,.9)";X.fillRect(0,0,W,topH);
  X.strokeStyle="rgba(255,160,0,.25)";X.lineWidth=1.5;
  X.beginPath();X.moveTo(0,topH);X.lineTo(W,topH);X.stroke();
  // Back
  X.fillStyle="rgba(255,255,255,.15)";rr(8,10,44,32,16);X.fill();
  X.fillStyle="#FFF";X.font='bold 22px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
  X.fillText("‹",30,topH/2);
  // Title
  gl(R.color,12);
  X.fillStyle=R.color;X.strokeStyle="rgba(0,0,0,.8)";X.lineWidth=3;
  X.font='bold 22px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
  X.strokeText("BRAWLER",W/2,topH/2);X.fillText("BRAWLER",W/2,topH/2);ng();
  // Unlocked count
  const unlockedCount=BD.filter(b=>isUnlocked(b.key)).length;
  X.fillStyle="rgba(200,190,255,.7)";X.font='bold 11px "Lilita One"';X.textAlign="right";X.textBaseline="middle";
  X.fillText(`${unlockedCount} / ${BD.length} freigeschaltet`,W-16,topH/2);

  // ── LEFT GRID: brawler cards ──
  const gridX=8,gridY=topH+8;
  const cols=4,cardW=92,cardH=76,gap=5;
  const gridW=cols*(cardW+gap)-gap;
  const gridH=H-gridY-8;

  X.save();X.beginPath();X.rect(gridX,gridY,gridW,gridH);X.clip();

  BD.forEach((b,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const cx=gridX+col*(cardW+gap);
    const cy=gridY+row*(cardH+gap)-BRAWLER_SCROLL;
    if(cy+cardH<gridY-10||cy>H+10)return;

    const isSel=i===BRAWLER_SEL;
    const owned=isUnlocked(b.key);
    const Ri=RARITY[b.rarity];

    // Card bg
    const cg=X.createLinearGradient(cx,cy,cx,cy+cardH);
    if(isSel){cg.addColorStop(0,ca(b.color,"44"));cg.addColorStop(1,ca(b.dark||b.color,"88"))}
    else if(owned){cg.addColorStop(0,"rgba(25,15,55,.9)");cg.addColorStop(1,"rgba(12,8,30,.9)")}
    else{cg.addColorStop(0,"rgba(15,10,30,.7)");cg.addColorStop(1,"rgba(8,5,18,.8)")}
    X.fillStyle=cg;rr(cx,cy,cardW,cardH,10);X.fill();

    // Border
    if(isSel){gl(b.color,10);X.strokeStyle=b.color;X.lineWidth=2.5;}
    else if(owned){X.strokeStyle=ca(Ri.color,"66");X.lineWidth=1.5;}
    else{X.strokeStyle="rgba(60,50,100,.4)";X.lineWidth=1;}
    rr(cx,cy,cardW,cardH,10);X.stroke();ng();

    // Rarity strip top
    X.fillStyle=Ri.color;rr(cx+2,cy+2,cardW-4,4,3);X.fill();

    // Brawler portrait
    const aR=28,aX2=cx+cardW/2,aY2=cy+cardH*.48;
    if(!owned){
      X.fillStyle="rgba(0,0,0,.6)";X.beginPath();X.arc(aX2,aY2,aR,0,6.28);X.fill();
      X.fillStyle="rgba(100,90,150,.5)";X.font='20px serif';X.textAlign="center";X.textBaseline="middle";
      X.fillText("🔒",aX2,aY2);
    } else {
      drawBrawlerImage(b,aX2,aY2,aR);
    }

    // Name
    X.fillStyle=owned?(isSel?"#FFF":"rgba(210,200,255,.9)"):"rgba(100,90,140,.6)";
    X.font=`bold 8px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
    X.fillText(b.name.toUpperCase(),cx+cardW/2,cy+cardH-12);

    // Trophy count badge
    if(owned){
      const bt=SAVE.brawlerTrophies?.[b.key]||0;
      X.fillStyle="rgba(0,0,0,.6)";rr(cx+4,cy+cardH-26,cardW-8,12,6);X.fill();
      X.fillStyle="#FFD700";X.font='bold 7px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
      X.fillText(`🏆 ${bt}`,cx+cardW/2,cy+cardH-20);
    }

    // Power level badge (top-right corner)
    if(owned){
      const pl=getPowerLevel(b.key)||1;
      const plC=pl>=9?"#FFD700":pl>=7?"#FF8800":"#4488FF";
      X.fillStyle=plC;rr(cx+cardW-22,cy+6,18,12,6);X.fill();
      X.fillStyle="#FFF";X.font='bold 7px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
      X.fillText(`P${pl}`,cx+cardW-13,cy+12);
    }

    // Class badge (top-left corner)
    {
      const BC=getBrawlerClass(b);
      X.fillStyle="rgba(0,0,0,.72)";rr(cx+3,cy+5,32,13,4);X.fill();
      X.strokeStyle=ca(BC.color,"99");X.lineWidth=1;rr(cx+3,cy+5,32,13,4);X.stroke();
      drawClassIcon(BC.iconKey,cx+12,cy+11.5,10,BC.color);
      X.fillStyle=BC.color;X.font='bold 6px "Lilita One"';X.textAlign="left";X.textBaseline="middle";
      X.fillText(BC.short,cx+18,cy+11.5);
    }
  });
  X.restore();

  drawBrawlerCollection._maxScroll=Math.max(0,Math.ceil(BD.length/cols)*(cardH+gap)-gridH);
  drawBrawlerCollection._gridX=gridX;drawBrawlerCollection._gridY=gridY;
  drawBrawlerCollection._cardW=cardW;drawBrawlerCollection._cardH=cardH;
  drawBrawlerCollection._gap=gap;drawBrawlerCollection._cols=cols;

  // Show custom brawler slots info at bottom
  const customCount=(SAVE.customBrawlers||[]).length;
  const slotsY=H-22;
  X.fillStyle="rgba(180,140,255,.7)";X.font='bold 9px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
  X.fillText(`✏ Eigene Brawler: ${customCount} / ${MAX_CUSTOM}  (${BD.length} / ${MAX_BRAWLERS} gesamt)`,gridX+gridW/2,slotsY);

  // Scroll bar
  const maxS=drawBrawlerCollection._maxScroll;
  if(maxS>0){
    const sbH=(gridH/(maxS+gridH))*gridH;
    const sbY=gridY+(BRAWLER_SCROLL/maxS)*(gridH-sbH);
    X.fillStyle="rgba(255,255,255,.1)";rr(gridX+gridW+2,gridY,5,gridH,3);X.fill();
    X.fillStyle="rgba(255,200,50,.5)";rr(gridX+gridW+2,sbY,5,sbH,3);X.fill();
  }

  // ── RIGHT PANEL: selected brawler details ──
  const panX=gridX+gridW+12,panW=W-panX-8,panY=topH+8;

  // Panel bg
  const panGr=X.createLinearGradient(panX,panY,panX,H-8);
  panGr.addColorStop(0,"rgba(25,12,60,.95)");panGr.addColorStop(1,"rgba(12,6,30,.98)");
  X.fillStyle=panGr;rr(panX,panY,panW,H-panY-8,16);X.fill();
  X.strokeStyle=ca(R.color,"55");X.lineWidth=1.5;rr(panX,panY,panW,H-panY-8,16);X.stroke();

  const owned=isUnlocked(bd.key);
  const cx2=panX+panW/2;

  // Rarity color strip
  const rstGr=X.createLinearGradient(panX,panY,panX+panW,panY);
  rstGr.addColorStop(0,"transparent");rstGr.addColorStop(.3,R.color);rstGr.addColorStop(.7,R.color);rstGr.addColorStop(1,"transparent");
  X.fillStyle=rstGr;rr(panX,panY,panW,5,3);X.fill();

  // Big brawler avatar
  const bigAR=55,bigAY=panY+72;
  if(owned){
    const bob=Math.abs(Math.sin(T*1.2*6))*3;
    drawBrawlerImage(bd,cx2,bigAY+bob,bigAR);
  } else {
    X.fillStyle="rgba(0,0,0,.5)";X.beginPath();X.arc(cx2,bigAY,bigAR,0,6.28);X.fill();
    X.strokeStyle=ca(R.color,"44");X.lineWidth=2;X.stroke();
    X.font='40px serif';X.textAlign="center";X.textBaseline="middle";X.fillText("🔒",cx2,bigAY);
  }

  let ry=panY+148;

  // Name
  gl(R.color,8);X.fillStyle="#FFF";X.font=`bold 16px "Lilita One"`;X.textAlign="center";X.textBaseline="middle";
  X.fillText(bd.name.toUpperCase(),cx2,ry);ng();ry+=18;

  // Rarity stars
  const stars=R.stars||1;
  for(let s=0;s<stars;s++){
    const sx=cx2+(s-(stars-1)/2)*14;
    gl(R.color,4);X.fillStyle=R.color;X.font='10px serif';X.textAlign="center";X.textBaseline="middle";
    X.fillText("★",sx,ry);ng();
  }
  ry+=20;

  // ── CLASS BADGE ──
  {
    const CL=getBrawlerClass(bd);
    const badgeW=panW-24, badgeH=30;
    const bx=panX+12, by=ry;
    // Badge background
    const clGr=X.createLinearGradient(bx,by,bx,by+badgeH);
    clGr.addColorStop(0,ca(CL.color,"33"));clGr.addColorStop(1,ca(CL.color,"18"));
    X.fillStyle=clGr;rr(bx,by,badgeW,badgeH,14);X.fill();
    gl(CL.color,8);X.strokeStyle=ca(CL.color,"CC");X.lineWidth=1.5;rr(bx,by,badgeW,badgeH,14);X.stroke();ng();
    // Canvas icon left
    drawClassIcon(CL.iconKey,bx+16,by+badgeH/2,18,CL.color);
    // Class name center
    gl(CL.color,6);X.fillStyle=CL.color;X.font='bold 11px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
    X.fillText(CL.nameDE.toUpperCase(),cx2+6,by+badgeH/2);ng();
    ry+=36;

    // Beschreibungstext (mehrzeilig)
    const descText=CL.desc;
    const descWords=descText.split(" ");
    X.fillStyle="rgba(210,200,255,.75)";X.font='bold 7px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
    let dLine2="";
    for(const w of descWords){
      const test=dLine2?dLine2+" "+w:w;
      if(test.length>32){X.fillText(dLine2,cx2,ry);ry+=11;dLine2=w;}
      else dLine2=test;
    }
    if(dLine2){X.fillText(dLine2,cx2,ry);ry+=13;}
    ry+=4;

    // Stärken / Schwächen Zeile mit Canvas-Icons
    const strKeys=CL.strong||[],wkKeys=CL.weak||[];
    const swBadgeH=20,swBadgeW=(panW-24)/2-3;
    if(strKeys.length>0||wkKeys.length>0){
      // Stärken
      X.fillStyle="rgba(68,255,136,.15)";rr(panX+12,ry,swBadgeW,swBadgeH,9);X.fill();
      X.strokeStyle="rgba(68,255,136,.4)";X.lineWidth=1;rr(panX+12,ry,swBadgeW,swBadgeH,9);X.stroke();
      X.fillStyle="#44FF88";X.font='bold 7px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
      // Draw small icons for strong classes
      const strCls=strKeys.slice(0,2).map(k=>CLASS[k]).filter(Boolean);
      const strLbl=strCls.map(c=>c.short).join(", ");
      let siX=panX+12+10;
      for(const sc of strCls){drawClassIcon(sc.iconKey,siX,ry+swBadgeH/2,10,"#44FF88");siX+=12;}
      X.fillStyle="#44FF88";X.textAlign="left";
      X.fillText("💪 "+strLbl,siX+2,ry+swBadgeH/2);
      // Schwächen
      X.fillStyle="rgba(255,80,80,.15)";rr(panX+12+swBadgeW+6,ry,swBadgeW,swBadgeH,9);X.fill();
      X.strokeStyle="rgba(255,80,80,.4)";X.lineWidth=1;rr(panX+12+swBadgeW+6,ry,swBadgeW,swBadgeH,9);X.stroke();
      const wkCls=wkKeys.slice(0,2).map(k=>CLASS[k]).filter(Boolean);
      const wkLbl=wkCls.map(c=>c.short).join(", ");
      let wiX=panX+12+swBadgeW+6+10;
      for(const wc of wkCls){drawClassIcon(wc.iconKey,wiX,ry+swBadgeH/2,10,"#FF6666");wiX+=12;}
      X.fillStyle="#FF6666";X.textAlign="left";
      X.fillText("⚠ "+wkLbl,wiX+2,ry+swBadgeH/2);
      ry+=26;
    }
    // Tip-Text
    X.fillStyle="rgba(180,170,230,.55)";X.font='bold 7px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
    const tipWords=CL.tip.split(" ");let tLine="";
    for(const w of tipWords){const t2=tLine?tLine+" "+w:w;if(t2.length>34){X.fillText(tLine,cx2,ry);ry+=10;tLine=w;}else tLine=t2;}
    if(tLine){X.fillText(tLine,cx2,ry);ry+=12;}
    ry+=4;
  }

  if(!owned){
    // Unlock button
    const unlockCost=R.cost||100;
    const pulse=.97+Math.sin(T*3)*.03;
    X.save();X.translate(cx2,ry+18);X.scale(pulse,pulse);
    const uGr=X.createLinearGradient(0,-18,0,18);
    uGr.addColorStop(0,lc(R.color,40));uGr.addColorStop(1,R.color);
    gl(R.color,14);X.fillStyle=uGr;rr(-panW/2+10,-18,panW-20,36,18);X.fill();
    X.strokeStyle="#FFD700";X.lineWidth=2;rr(-panW/2+10,-18,panW-20,36,18);X.stroke();ng();
    X.fillStyle="rgba(255,255,255,.2)";rr(-panW/2+10,-18,panW-20,18,18);X.fill();
    X.fillStyle="#FFF";X.font='bold 12px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
    const cStr=R.gems>0?`🪙${R.cost} + 💎${R.gems}`:`🪙${R.cost}`;
    X.fillText(`🔓 FREISCHALTEN  ${cStr}`,0,1);
    X.restore();
    drawBrawlerCollection._unlockBtn={x:panX+10,y:ry,w:panW-20,h:36};
    ry+=52;
  } else {
    drawBrawlerCollection._unlockBtn=null;
    // ── STATS ──
    const pl=getPowerLevel(bd.key)||1;
    const plC=pl>=9?"#FFD700":pl>=7?"#FF8800":"#4488FF";
    const plMult=getBrawlerMultiplier(bd.key);
    const bt=SAVE.brawlerTrophies?.[bd.key]||0;
    const pp=getPowerPoints(bd.key)||0;
    const ppNeeded=getPPNeeded(bd.key);

    // Power level bar
    X.fillStyle="rgba(0,0,0,.5)";rr(panX+8,ry,panW-16,18,9);X.fill();
    const plFrac=(pl-1)/10;
    const plGr=X.createLinearGradient(panX+8,0,panX+panW-8,0);
    plGr.addColorStop(0,"#4488FF");plGr.addColorStop(.6,"#FF8800");plGr.addColorStop(1,"#FFD700");
    X.fillStyle=plGr;rr(panX+8,ry,Math.max(12,(panW-16)*plFrac),18,9);X.fill();
    X.strokeStyle=ca(plC,"88");X.lineWidth=1;rr(panX+8,ry,panW-16,18,9);X.stroke();
    gl(plC,6);X.fillStyle="#FFF";X.font='bold 9px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
    X.fillText(`⚡ POWER ${pl}`,cx2,ry+9);ng();
    ry+=24;

    // PP progress
    if(ppNeeded){
      X.fillStyle="rgba(0,0,0,.4)";rr(panX+8,ry,panW-16,10,5);X.fill();
      const ppFrac=Math.min(1,pp/ppNeeded);
      if(ppFrac>0){X.fillStyle="#FF8800";rr(panX+8,ry,Math.max(4,(panW-16)*ppFrac),10,5);X.fill()}
      X.fillStyle="rgba(180,160,255,.7)";X.font='bold 7px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
      X.fillText(`${pp} / ${ppNeeded} PP`,cx2,ry+5);
      ry+=16;
    }

    // Stat grid
    const stats=[
      {label:"HP",       val:Math.round(bd.hp*(plMult||1)),   icon:"❤",  col:"#FF4444"},
      {label:"SCHADEN",  val:Math.round(bd.dmg*(plMult||1)),  icon:"⚔",  col:"#FF8800"},
      {label:"SPEED",    val:bd.spd,                           icon:"💨", col:"#44CCFF"},
      {label:"TROPHÄEN", val:bt,                               icon:"🏆", col:"#FFD700"},
    ];
    const sw2=(panW-16)/2-4;
    stats.forEach((s,i)=>{
      const sx=panX+8+(i%2)*(sw2+8),sy=ry+Math.floor(i/2)*38;

function handleBrawlerCollectionClick(x,y){
  const d=drawBrawlerCollection;
  const topH=52;
  // Back
  if(x<60&&y<topH){SHOW_BRAWLERS=false;snd("select");return}
  // Grid card click
  if(d._gridX!==undefined&&x<d._gridX+(d._cols||4)*(d._cardW+d._gap)){
    const col=Math.floor((x-d._gridX)/(d._cardW+d._gap));
    const row=Math.floor((y-d._gridY+BRAWLER_SCROLL)/(d._cardH+d._gap));
    const idx=row*(d._cols||4)+col;
    if(idx>=0&&idx<BD.length){BRAWLER_SEL=idx;snd("select");return}
  }
  // Unlock button
  if(d._unlockBtn&&x>=d._unlockBtn.x&&x<d._unlockBtn.x+d._unlockBtn.w&&y>=d._unlockBtn.y&&y<d._unlockBtn.y+d._unlockBtn.h){
    tryUnlock(BRAWLER_SEL);return;
  }
  // UPGRADE button
  if(d._upgBtn&&x>=d._upgBtn.x&&x<d._upgBtn.x+d._upgBtn.w&&y>=d._upgBtn.y&&y<d._upgBtn.y+d._upgBtn.h){
    SEL=BRAWLER_SEL;SHOW_BRAWLERS=false;STATE="upgrade";UPGRADE_TAB=0;snd("select");return;
  }
  // Select (set as active) button
  if(d._selBtn&&x>=d._selBtn.x&&x<d._selBtn.x+d._selBtn.w&&y>=d._selBtn.y&&y<d._selBtn.y+d._selBtn.h){
    if(isUnlocked(BD[BRAWLER_SEL].key)){SEL=BRAWLER_SEL;persist();snd("unlock");SHOW_BRAWLERS=false;}
    return;
  }
  // Brawler Maker button
  if(d._mkBtn&&x>=d._mkBtn.x&&x<d._mkBtn.x+d._mkBtn.w&&y>=d._mkBtn.y&&y<d._mkBtn.y+d._mkBtn.h){
    SHOW_BRAWLERS=false;STATE="create";snd("select");return;
  }
  // Delete custom brawler
  if(d._delBtn&&x>=d._delBtn.x&&x<d._delBtn.x+d._delBtn.w&&y>=d._delBtn.y&&y<d._delBtn.y+d._delBtn.h){
    deleteCustomBrawler(d._delBtn.key);BRAWLER_SEL=Math.min(BRAWLER_SEL,BD.length-1);snd("select");return;
  }
}

    X.fillText("‹",tileAreaX-14,H/2);

  {

  drawUpgradeScreen._bpVisStart=visStart;

function handleUpgradeClick(x,y){
  const d=drawUpgradeScreen;

  // ── Brawl Pass is full-screen, handle separately ──
  if(UPGRADE_TAB===3){
    const vs=d._bpVisStart||0;
    const numCols=d._bpNumCols||5;
    const tW=d._bpTileW||120,tH=d._bpTileH||120;
    const taX=d._bpTileAreaX||228;
    const topH=52;
    // Back (top-left arrow or anywhere in top bar left side)
    if(y<topH&&x<80){STATE="home";snd("select");return}
    // QUESTS tab (top center right)
    if(y<topH&&x>W/2){/* quests - future */snd("select");return}
    // Free row tiles
    const row1Y=d._bpTileY||0;
    for(let i=0;i<numCols;i++){
      const t2=vs+i+1;
      const tx=taX+(i*(tW+5));
      if(x>=tx&&x<tx+tW&&y>=row1Y&&y<row1Y+tH){
        claimBPReward(t2,false);snd("coin");return;
      }
    }
    // Premium row tiles
    const row2Y=d._bpRow2Y||0;
    for(let i=0;i<numCols;i++){
      const t2=vs+i+1;
      const tx=taX+(i*(tW+5));
      if(x>=tx&&x<tx+tW&&y>=row2Y&&y<row2Y+tH){
        claimBPReward(t2,true);snd("coin");return;
      }
    }
    // Scroll arrows
    if(x<taX&&x>0){drawUpgradeScreen._bpVisStart=Math.max(0,vs-numCols);snd("select");return}
    if(x>W-50){drawUpgradeScreen._bpVisStart=Math.min(BP_TIERS-numCols,vs+numCols);snd("select");return}
    // Left card: buy premium
    if(x<taX&&!SAVE.brawlPassPremium){
      SAVE.brawlPassPremium=true;persist();snd("unlock");return;
    }
    return;
  }

  // ── Normal upgrade screen ──
  // Back
  if(x<90&&y<44){STATE="home";snd("select");return}
  // Tabs
  const tabW=(W-20)/5,tabY=54;
  for(let i=0;i<5;i++){const tx=10+i*tabW;if(x>=tx&&x<=tx+tabW-4&&y>=tabY&&y<=tabY+36){if(i===3)drawUpgradeScreen._bpVisStart=undefined;UPGRADE_TAB=i;snd("select");return}}

  if(UPGRADE_TAB===0&&d._upBtn?.canUp&&Math.abs(x-W/2)<120&&y>d._upBtn.y&&y<d._upBtn.y+44){
    if(doLevelUp(BD[SEL].key)){snd("unlock");burst(W/2,d._upBtn.y,BD[SEL].color,BD[SEL].dark,22,.9)}
    return;
  }
  if(UPGRADE_TAB===1&&d._gadgetToggle&&Math.abs(x-W/2)<80&&y>d._gadgetToggle.y&&y<d._gadgetToggle.y+44){
    SAVE.activeGadget[BD[SEL].key]=!SAVE.activeGadget[BD[SEL].key];persist();snd("select");return;
  }
  if(UPGRADE_TAB===2&&d._spToggle&&Math.abs(x-W/2)<80&&y>d._spToggle.y&&y<d._spToggle.y+44){
    SAVE.activeStarPower[BD[SEL].key]=!SAVE.activeStarPower[BD[SEL].key];persist();snd("select");return;
  }
  if(UPGRADE_TAB===4&&d._openBtn?.canOpen&&Math.abs(x-W/2)<110&&y>d._openBtn.y&&y<d._openBtn.y+44){
    startStarrDropScreen("upgrade");return;
  }
}

function initBrawlBall(){
  const mx=COLS*TS/2,my=ROWS*TS/2;
  BB_BALL={x:mx,y:my,vx:0,vy:0,r:16,lastOwner:null};
  BB_GOALS_BLUE=0;BB_GOALS_RED=0;BB_MATCH_TIMER=210;
  // 3 red defenders + 2 attackers
  ENM=[];
  const _bbEPool=MM_LINEUP?.redDef?.length?null:BD.map(b=>b.key).filter(k=>k!==PL.bdKey).sort(()=>Math.random()-.5);
  const _bbTypeMap={BULL:"tank",FRANK:"tank",ROSA:"tank",JACKY:"tank",EL_PRIMO:"tank",BROCK:"shooter",COLT:"shooter",PIPER:"shooter",DYNA:"shooter",TICK:"shooter",TARA:"aggressive",MORTIS:"aggressive",LEON:"agile",CROW:"agile",MAX:"agile",EDGAR:"aggressive"};
  const redDef=MM_LINEUP?.redDef||[_bbEPool[0]||"BULL",_bbEPool[1]||"FRANK",_bbEPool[2]||"ROSA"];
  const redAtt=MM_LINEUP?.redAtt||[_bbEPool[3]||"COLT",_bbEPool[4]||"BROCK"];
  const redSpawns=[[TS*22,TS*10],[TS*22,TS*12],[TS*20,TS*11],[TS*25,TS*9],[TS*25,TS*13]];
  for(let i=0;i<3;i++){const e=mkEnemy(redSpawns[i][0],redSpawns[i][1],redDef[i],"tank",4000,95);e.team=1;e._bbRole="def";ENM.push(e)}
  for(let i=0;i<2;i++){const e=mkEnemy(redSpawns[3+i][0],redSpawns[3+i][1],redAtt[i],"shooter",3000,110);e.team=1;e._bbRole="att";ENM.push(e)}
  // 2 blue allies
  const blueSpawns=[[TS*12,TS*10],[TS*12,TS*12]];
  const _bbPool=MM_LINEUP?.allies?.length?MM_LINEUP.allies:BD.map(b=>b.key).filter(k=>k!==PL.bdKey).sort(()=>Math.random()-.5);
  const blueKeys=[_bbPool[0]||"POCO",_bbPool[1]||"COLT"];
  for(let i=0;i<2;i++){const a=mkEnemy(blueSpawns[i][0],blueSpawns[i][1],blueKeys[i],"agile",3500,100);a.team=0;a.friendly=true;a._bbRole="att";ENM.push(a)}
  PL.x=TS*10;PL.y=TS*11;
}

function updateBrawlBall(){
  if(!BB_BALL||!PL)return;
  BB_MATCH_TIMER-=DT;
  if(BB_MATCH_TIMER<=0){endGame(BB_GOALS_BLUE>=BB_GOALS_RED);return}
  const b=BB_BALL;
  // Physics: friction + wall bounce
  b.x+=b.vx*DT;b.y+=b.vy*DT;
  b.vx*=1-DT*2.2;b.vy*=1-DT*2.2;
  // Wall bounce
  if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx)*.7}
  if(b.x>COLS*TS-b.r){b.x=COLS*TS-b.r;b.vx=-Math.abs(b.vx)*.7}
  if(b.y<b.r){b.y=b.r;b.vy=Math.abs(b.vy)*.7}
  if(b.y>ROWS*TS-b.r){b.y=ROWS*TS-b.r;b.vy=-Math.abs(b.vy)*.7}
  // Block collision (solid tiles)
  if(blocked(b.x+b.r,b.y)||blocked(b.x-b.r,b.y)){b.vx*=-0.65}
  if(blocked(b.x,b.y+b.r)||blocked(b.x,b.y-b.r)){b.vy*=-0.65}
  b.vx=Math.max(-700,Math.min(700,b.vx));b.vy=Math.max(-700,Math.min(700,b.vy));

  // Goals: left=blue goal (x<4*TS), right=red goal (x>28*TS), y in middle (rows 8-14)
  const goalY1=TS*8,goalY2=TS*14;
  if(b.x<4*TS&&b.y>goalY1&&b.y<goalY2){
    BB_GOALS_RED++;snd("win");burst(b.x,b.y,"#FF5555","#FF0000",30,1.2);
    WANNOUNCE=3;WTEXT=`🔴 TOR! ROT ${BB_GOALS_RED} : ${BB_GOALS_BLUE} BLAU`;
    resetBall();if(BB_GOALS_RED>=BB_GOAL_SCORE){setTimeout(()=>endGame(false),1200);return}
  }
  if(b.x>28*TS&&b.y>goalY1&&b.y<goalY2){
    BB_GOALS_BLUE++;snd("win");burst(b.x,b.y,"#4488FF","#0055FF",30,1.2);
    WANNOUNCE=3;WTEXT=`🔵 TOR! BLAU ${BB_GOALS_BLUE} : ${BB_GOALS_RED} ROT`;
    resetBall();if(BB_GOALS_BLUE>=BB_GOAL_SCORE){setTimeout(()=>endGame(true),1200);return}
  }

  // Player–ball collision: kick
  const plDist=dst(PL,b);
  if(plDist<PL.r+b.r+4){
    const ka=Math.atan2(b.y-PL.y,b.x-PL.x);
    const spd=280+Math.hypot(PL.vx,PL.vy)*.8;
    b.vx=Math.cos(ka)*spd;b.vy=Math.sin(ka)*spd;
    b.lastOwner="blue";snd("hit");SHK=.08;
  }
  // Bullet–ball collision: launch
  for(let i=BUL.length-1;i>=0;i--){
    const blt=BUL[i];if(dst(blt,b)<b.r+blt.r){
      const ka=Math.atan2(blt.vy,blt.vx);
      b.vx+=Math.cos(ka)*320;b.vy+=Math.sin(ka)*320;
      BUL.splice(i,1);spark(b.x,b.y,"#FFD700");
    }
  }
  // AI ball interaction
  for(const e of ENM){
    if(e.dead)continue;
    const ed=dst(e,b);
    if(ed<e.r+b.r+4){
      const ka=Math.atan2(b.y-e.y,b.x-e.x);
      const kickSpd=e.team===1?320:240;
      const target=e.team===1?{x:4*TS,y:ROWS*TS/2}:{x:28*TS,y:ROWS*TS/2};
      const ta=Math.atan2(target.y-e.y,target.x-e.x);
      const kickA=ta+(Math.random()-.5)*.5;
      b.vx=Math.cos(kickA)*(kickSpd+Math.random()*100);b.vy=Math.sin(kickA)*(kickSpd+Math.random()*100);
      b.lastOwner=e.team===1?"red":"blue";snd("hit");
    }
    // AI moves toward ball or goal
    if(e._bbRole==="att"){
      const target=e.team===1&&b.lastOwner!=="red"?b:(e.team===1?{x:4*TS,y:ROWS*TS/2}:b);
      const ddx=target.x-e.x,ddy=target.y-e.y,d=Math.hypot(ddx,ddy)||1;
      if(d>50){e.vx=(ddx/d)*e.spd;e.vy=(ddy/d)*e.spd;move(e)}
    }else{// defender stays near their goal
      const goalX=e.team===1?24*TS:8*TS,goalY=ROWS*TS/2;
      const ballNear=dst(b,{x:goalX,y:goalY})<300;
      const targetX=ballNear?b.x:goalX,targetY=ballNear?b.y:goalY;
      const ddx=targetX-e.x,ddy=targetY-e.y,d=Math.hypot(ddx,ddy)||1;
      if(d>40){e.vx=(ddx/d)*e.spd*.8;e.vy=(ddy/d)*e.spd*.8;move(e)}
    }
    if(e.vx||e.vy)e.walkT=(e.walkT||0)+DT*7;
    e.sTimer-=DT;
    if(e.sTimer<=0&&dst(e,PL)<280){e.sTimer=e.sCool;fireBul(e.x,e.y,Math.atan2(PL.y-e.y,PL.x-e.x),380,600,e.color,e.dark,"enemy",6,1.2,1.8)}
    if(e.hp<=0){e.dead=true;KILLS++;burst(e.x,e.y,e.color,e.dark,18,.8);snd("death");earnCoins(12,e.x,e.y-20,"⚔ +12");e._respawnT=4;}
    if(e._respawnT>0){e._respawnT-=DT;if(e._respawnT<=0&&e.dead){e.dead=false;e.hp=e.maxHp;e.deathT=0;e.invT=2;burst(e.x,e.y,e.color,e.dark,10,.5)}}
  }
}

function resetBall(){
  BB_BALL={x:COLS*TS/2,y:ROWS*TS/2,vx:(Math.random()-.5)*200,vy:(Math.random()-.5)*200,r:16,lastOwner:null};
  PL.x=TS*10;PL.y=TS*11;PL.vx=0;PL.vy=0;
}

function drawBrawlBall(){
  if(!BB_BALL)return;
  const b=BB_BALL;
  // Goal areas
  const goalY1=TS*8,goalY2=TS*14;
  // Blue goal (left) glow
  X.fillStyle="rgba(50,100,255,.12)";X.fillRect(0,goalY1,4*TS,goalY2-goalY1);
  X.strokeStyle="#4488FF";X.lineWidth=3;X.strokeRect(2,goalY1+2,4*TS-4,goalY2-goalY1-4);
  // Red goal (right)
  X.fillStyle="rgba(255,50,50,.12)";X.fillRect(28*TS,goalY1,4*TS,goalY2-goalY1);
  X.strokeStyle="#FF4444";X.lineWidth=3;X.strokeRect(28*TS+2,goalY1+2,4*TS-4,goalY2-goalY1-4);
  // Goal posts
  [goalY1,goalY2].forEach(gy=>{
    X.fillStyle="#CCCCCC";X.beginPath();X.arc(0,gy,8,0,6.28);X.fill();
    X.beginPath();X.arc(4*TS,gy,8,0,6.28);X.fill();
    X.beginPath();X.arc(28*TS,gy,8,0,6.28);X.fill();
    X.beginPath();X.arc(COLS*TS,gy,8,0,6.28);X.fill();
  });
  // Centre line + circle
  X.strokeStyle="rgba(255,255,255,.15)";X.lineWidth=2;
  X.beginPath();X.moveTo(COLS*TS/2,0);X.lineTo(COLS*TS/2,ROWS*TS);X.stroke();
  X.beginPath();X.arc(COLS*TS/2,ROWS*TS/2,80,0,6.28);X.stroke();
  // Shadow
  X.fillStyle="rgba(0,0,0,.25)";X.beginPath();X.ellipse(b.x+3,b.y+4,b.r,b.r*.5,0,0,6.28);X.fill();
  // Ball
  const ballSpin=(T*3)%6.28;
  gl("#FFF",14);
  const ballGr=X.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,1,b.x,b.y,b.r);
  ballGr.addColorStop(0,"#FFF");ballGr.addColorStop(.6,"#E0E8FF");ballGr.addColorStop(1,"#8899CC");
  X.fillStyle=ballGr;X.beginPath();X.arc(b.x,b.y,b.r,0,6.28);X.fill();
  // Soccer pattern
  X.strokeStyle="rgba(0,0,80,.25)";X.lineWidth=1.5;
  for(let i=0;i<5;i++){const a=ballSpin+i/5*6.28;X.beginPath();X.moveTo(b.x,b.y);X.lineTo(b.x+Math.cos(a)*b.r*.7,b.y+Math.sin(a)*b.r*.7);X.stroke()}
  X.beginPath();X.arc(b.x,b.y,b.r*.35,0,6.28);X.stroke();ng();
  // Shine
  X.fillStyle="rgba(255,255,255,.5)";X.beginPath();X.ellipse(b.x-b.r*.28,b.y-b.r*.28,b.r*.32,b.r*.22,-.5,0,6.28);X.fill();
}

function drawBrawlBallHUD(){
  if(MODE!=="brawlball"||!BB_BALL)return;
  // Score display
  const scW=260,scH=38,scX=W/2-scW/2,scY=12;
  X.fillStyle="rgba(0,0,0,.7)";rr(scX,scY,scW,scH,scH/2);X.fill();
  X.strokeStyle="rgba(255,255,255,.15)";X.lineWidth=1.5;rr(scX,scY,scW,scH,scH/2);X.stroke();
  // Blue side
  X.fillStyle="rgba(40,80,220,.6)";rr(scX+2,scY+2,scW/2-4,scH-4,scH/2-2);X.fill();
  gl("#4488FF",8);X.fillStyle="#88AAFF";X.font='bold 22px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
  X.fillText(BB_GOALS_BLUE,scX+scW/4,scY+scH/2+1);ng();
  // Red side
  X.fillStyle="rgba(200,40,40,.6)";rr(scX+scW/2+2,scY+2,scW/2-4,scH-4,scH/2-2);X.fill();
  gl("#FF4444",8);X.fillStyle="#FF8888";X.font='bold 22px "Lilita One"';X.textAlign="center";X.textBaseline="middle";
  X.fillText(BB_GOALS_RED,scX+scW*3/4,scY+scH/2+1);ng();
  // Colon separator
  X.fillStyle="#FFF";X.font='bold 14px "Lilita One"';X.textAlign="center";X.fillText(":",W/2,scY+scH/2+1);
  // Timer
  const mt=Math.max(0,BB_MATCH_TIMER);const mm=Math.floor(mt/60),ms=Math.floor(mt%60);
  const tc=mt<30?"#FF5555":mt<60?"#FFAA00":"rgba(255,255,255,.7)";
  X.fillStyle=tc;X.font='bold 11px "Lilita One"';X.textAlign="center";X.fillText(`${mm}:${ms<10?"0":""}${ms}`,W/2,scY+scH+8);
}

function update(){
  T+=DT;
  if(STATE==="home"||SHOW_NEWS)updateSkulls();
  if(STATE==="matchmaking")updateMatchmaking();
  if(STATE==="starrdrop")updateStarrDrop();
  if(STATE==="win"||STATE==="lose")END_SHOW_T+=DT;
  if(STATE==="play"){
    updatePlayer();if(PL)updateEnemies();updateBullets();updatePar();updateDmg();updateStealth();
    if(MODE==="showdown")updateShowdown();
    if(MODE==="gems")updateGemGrab();
    if(MODE==="knockout")updateKnockout();
    if(MODE==="heist")updateHeist();
    if(MODE==="brawlball")updateBrawlBall();
    if(SHK>0){SHK=Math.max(0,SHK-DT*3.5);SHX=(Math.random()-.5)*11*SHK;SHY=(Math.random()-.5)*11*SHK}else{SHX=0;SHY=0}
  }
}

function render(){
  X.clearRect(0,0,W,H);
  X.imageSmoothingEnabled=true;X.imageSmoothingQuality="high";
  if(STATE==="home"){
    drawHomeScreen();
    if(SHOW_BRAWLERS){drawBrawlerCollection();return}
    if(SHOW_NEWS){drawNewsScreen();return}
    return
  }
  if(STATE==="matchmaking"){drawMatchmaking();return}
  if(STATE==="starrdrop"){drawStarrDropScreen();return}
  if(STATE==="shop"){drawShopScreen();return}
  if(STATE==="create"){drawCreateScreen();return}
  if(STATE==="upgrade"){drawUpgradeScreen();return}
  // select state merged into home overlay
  if(STATE==="settings"){
    // draw the background state first
    if(SETTINGS_FROM==="home"){drawHomeScreen()}
    else if(SETTINGS_FROM==="play"&&PL){
      X.save();X.translate(SHX-Math.round(CAM_X),SHY-Math.round(CAM_Y));
      drawMap(T);drawBushes();drawShowdown();drawHeist();drawGems();drawPar();
      for(const e of ENM)if(e.dead&&e.deathT<.9){X.globalAlpha=Math.max(0,1-e.deathT*1.4);drawBrawler(e,false);X.globalAlpha=1}
      for(const e of ENM)if(!e.dead)drawBrawler(e,false);
      if(PL&&!PL.dead){if(PL.invT>0&&Math.floor(T*10)%2===0){}else drawBrawler(PL,true);}
      drawBullets();drawDmg();X.restore();drawHUD();
    }
    drawSettings();return;
  }
  X.save();X.translate(SHX-Math.round(CAM_X),SHY-Math.round(CAM_Y));
  drawMap(T);drawBushes();drawShowdown();drawHeist();drawGems();drawPar();
  if(MODE==="brawlball")drawBrawlBall();
  for(const e of ENM)if(e.dead&&e.deathT<.9){X.globalAlpha=Math.max(0,1-e.deathT*1.4);drawBrawler(e,false);X.globalAlpha=1}
  for(const e of ENM)if(!e.dead)drawBrawler(e,false);
  if(PL&&!PL.dead){if(PL.invT>0&&Math.floor(T*10)%2===0){}else drawBrawler(PL,true);}
  drawBullets();drawDmg();X.restore();
  drawHUD();
  if(MODE==="brawlball")drawBrawlBallHUD();
  if(STATE==="win")drawEnd(true);
  if(STATE==="lose")drawEnd(false);
  // DevTools overlay — always on top of everything
}
function loop(ts){
  DT=Math.min((ts-LT)/1000,.05);LT=ts;
  try{update()}catch(err){console.error("UPDATE CRASH:",err.message,"\nStack:",err.stack);if(!window._errShown){window._errShown=1;alert("Update error: "+err.message)}}
  try{render()}catch(err){console.error("RENDER CRASH:",err.message,"\nStack:",err.stack);if(!window._errShown){window._errShown=1;alert("Render error: "+err.message)}}
  requestAnimationFrame(loop)
}

const BRAWLER_IMGS={}; // key → Image object (loaded or loading)
let IMGS_LOADED=0,IMGS_TOTAL=0;

function preloadBrawlerImages(){
  const keys=Object.keys(BRAWLER_IMG_URLS);
  IMGS_TOTAL=keys.length;
  keys.forEach(key=>{
    const img=new Image();
    img.crossOrigin="anonymous";
    img.onload=()=>{BRAWLER_IMGS[key]=img;IMGS_LOADED++;};
    img.onerror=()=>{IMGS_TOTAL--;};// silently skip if unavailable
    img.src=BRAWLER_IMG_URLS[key];
    BRAWLER_IMGS[key]=img; // store immediately so we can check .complete
  });
}
preloadBrawlerImages();

// Draw portrait: use real image if loaded, fall back to canvas portrait
function drawBrawlerImage(b,cx,cy,r){
  const img=BRAWLER_IMGS[b.key];
  if(img&&img.complete&&img.naturalWidth>0){
    // Clip to circle
    X.save();
    X.beginPath();X.arc(cx,cy,r,0,6.28);X.clip();
    // Draw image centered and scaled to fit
    const scale=r*2/Math.min(img.naturalWidth,img.naturalHeight);
    const iw=img.naturalWidth*scale,ih=img.naturalHeight*scale;
    const offsetY=r*0.15; // shift down so face is centered in circle
    X.drawImage(img,cx-iw/2,cy-ih/2+offsetY,iw,ih);
    X.restore();
    // Border ring
    X.strokeStyle=ca(b.color,"CC");X.lineWidth=3;
    X.beginPath();X.arc(cx,cy,r,0,6.28);X.stroke();
  } else {
    // Fallback: canvas portrait
    drawBrawlerPortrait(b,cx,cy,r);
  }
}
