// Helper: add alpha to a color string (hex or hsl)
function ca(col, alphaHex) {
  const a = {'FF':1,'FA':0.98,'EE':0.93,'DD':0.87,'CC':0.80,'BB':0.73,'AA':0.67,'99':0.60,'88':0.53,'77':0.47,'66':0.40,'55':0.33,'44':0.27,'33':0.20,'22':0.13,'11':0.07,'30':0.19,'18':0.09}[alphaHex.toUpperCase()]||0.5;
  if(!col||typeof col!=='string')return 'rgba(128,128,128,'+a+')';
  if(col.startsWith('#')&&col.length===7){const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);return 'rgba('+r+','+g+','+b+','+a+')';}
  if(col.startsWith('hsl(')){return col.replace('hsl(','hsla(').replace(')',','+a+')');}
  if(col.startsWith('rgb(')){return col.replace('rgb(','rgba(').replace(')',','+a+')');}
  if(col.startsWith('rgba(')){return col.replace(/,\s*[\d.]+\s*\)$/,','+a+')');}
  return col;
}

/* ═══ POWER LEVEL SYSTEM ═══ */
// PP needed per level: 20,30,50,80,130,210,340,550,890,1440
const PP_NEEDED=[20,30,50,80,130,210,340,550,890,1440];
const PL_MULTIPLIERS=[1,1.05,1.1,1.15,1.2,1.25,1.3,1.35,1.4,1.45,1.5]; // index = powerLevel-1
function getPowerLevel(key){return SAVE.powerLevel[key]||1}
function getPowerPoints(key){return SAVE.powerPoints[key]||0}
function getPPNeeded(key){const pl=getPowerLevel(key);return pl>=11?null:PP_NEEDED[pl-1]}
function canLevelUp(key){const pl=getPowerLevel(key);if(pl>=11)return false;return getPowerPoints(key)>=PP_NEEDED[pl-1]&&SAVE.coins>=200*pl}
function doLevelUp(key){
  if(!canLevelUp(key))return false;
  const pl=getPowerLevel(key);
  SAVE.powerPoints[key]=(SAVE.powerPoints[key]||0)-PP_NEEDED[pl-1];
  SAVE.coins-=200*pl;
  SAVE.powerLevel[key]=pl+1;
  persist();return true;
}
function getBrawlerMultiplier(key){return PL_MULTIPLIERS[(getPowerLevel(key)||1)-1]}
// Gadget unlock at PL7, Star Power at PL9
function hasGadgetUnlocked(key){return getPowerLevel(key)>=7||(SAVE.gadgets[key]||false)}
function hasStarPowerUnlocked(key){return getPowerLevel(key)>=9||(SAVE.starPowers[key]||false)}

function getGadgetCooldown(key){return GADGETS[key]?.cooldown||6}
function applyGadget(){
  if(!PL||PL.dead||GADGET_CD>0)return;
  if(!hasGadgetUnlocked(PL.bdKey))return;
  if(!SAVE.activeGadget[PL.bdKey])return;
  const key=PL.bdKey,a=PL.angle;
  GADGET_CD=getGadgetCooldown(key);snd("super");
  if(key==="SHELLY"){for(let i=0;i<2;i++)setTimeout(()=>fireBul(PL.x,PL.y,a+(Math.random()-.5)*.3,500,PL.dmg*1.2,PL.color,PL.dark,"player",6,1.3,1.4),i*120)}
  else if(key==="COLT"){PL.ammo=Math.min(PL.maxAmmo,PL.ammo+2);spawnDmg(PL.x,PL.y-30,"RELOAD!","#FFD700")}
  else if(key==="BULL"){PL.hp=Math.min(PL.maxHp,PL.hp+1500);snd("heal");burst(PL.x,PL.y,PL.color,PL.dark,14,.7);spawnDmg(PL.x,PL.y-30,"+1500","#44FF88")}
  else if(key==="BROCK"){PL._rocketBoost=true;spawnDmg(PL.x,PL.y-30,"BOOST!","#FF8800")}
  else if(key==="DYNA"){for(let i=0;i<3;i++)fireBul(PL.x,PL.y,a+(i-1)*.4,300,PL.dmg*1.5,PL.color,PL.dark,"player",11,1.9,2.2,true,true)}
  else if(key==="PIPER"){PL._gadgetDmgBoost=PL.dmg+800;spawnDmg(PL.x,PL.y-30,"+800 DMG","#FF88CC")}
  else if(key==="POCO"){PL._healTick=3;spawnDmg(PL.x,PL.y-30,"HEALING!","#44FF88")}
  else if(key==="ROSA"){PL.hp=Math.min(PL.maxHp,PL.hp+1200);snd("heal");burst(PL.x,PL.y,"#44BB55","#33AA44",14,.7)}
  else if(key==="LEON"){PL._slowNext=true;spawnDmg(PL.x,PL.y-30,"SLOW!","#88AAFF")}
  else if(key==="SPIKE"){for(let i=0;i<8;i++)fireBul(PL.x,PL.y,i/8*6.28,360,PL.dmg,PL.color,PL.dark,"player",6,1.3,1.8)}
  else if(key==="TARA"){for(const e of ENM){if(e.dead)continue;const dx=PL.x-e.x,dy=PL.y-e.y,d=Math.hypot(dx,dy)||1;if(d<280){e.vx=dx/d*400;e.vy=dy/d*400}}}
  else if(key==="FRANK"){for(const e of ENM){if(e.dead)continue;if(dst(e,PL)<180){e._stunT=1;spawnDmg(e.x,e.y-30,"STUN!","#FF8800")}}SHK=.4}
  else if(key==="MORTIS"){PL.vx=Math.cos(a)*600;PL.vy=Math.sin(a)*600;for(let i=0;i<3;i++)setTimeout(()=>{if(PL&&!PL.dead)fireBul(PL.x,PL.y,PL.angle+(i-1)*.2,400,PL.dmg*1.1,PL.color,PL.dark,"player",10,1.6,1.2)},i*100)}
  else if(key==="JACKY"){PL._knockbackNext=2.2;spawnDmg(PL.x,PL.y-30,"KNOCKBACK!","#FF9944")}
  else if(key==="EMZ"){for(const e of ENM){if(e.dead)continue;if(dst(e,PL)<200){const pa=Math.atan2(e.y-PL.y,e.x-PL.x);e.vx=Math.cos(pa)*500;e.vy=Math.sin(pa)*500}}SHK=.2}
  else if(key==="CROW"){PL._blockNext=true;spawnDmg(PL.x,PL.y-30,"BLOCK!","#4DFFAA")}
  else if(key==="SANDY"){for(const e of ENM){if(e.dead)continue;if(dst(e,PL)<300){e._stunT=1.5;spawnDmg(e.x,e.y-30,"ZAP!","#FFEE44")}}burst(PL.x,PL.y,PL.color,PL.dark,18,.9)}
  else if(key==="LILY"){const nx=PL.x+Math.cos(a)*200,ny=PL.y+Math.sin(a)*200;if(!blocked(nx,ny)){PL.x=nx;PL.y=ny;burst(PL.x,PL.y,PL.color,PL.dark,12,.6)}}
  else if(key==="BIBI"){PL.hp=Math.min(PL.maxHp,PL.hp+2000);snd("heal");burst(PL.x,PL.y,"#FF6655","#BB2211",16,.8)}
  else if(key==="MAX"){PL.spdBoost=3;PL.stealth=2;spawnDmg(PL.x,PL.y-30,"STEALTH!","#FF3399")}
  else if(key==="MR_P"){const a2=a;for(let i=0;i<2;i++){setTimeout(()=>{const mx=PL.x+Math.cos(a2+i*.4)*80,my=PL.y+Math.sin(a2+i*.4)*80;if(!blocked(mx,my)){const m=mkEnemy(mx,my,"COLT","agile",800,220);m.team=0;m.friendly=true;m._ttl=6;ENM.push(m);burst(mx,my,PL.color,PL.dark,10,.5)}},i*200)}}

      gl(b.color,10);X.fillStyle=b.color;X.beginPath();X.arc(0,hY,hR,0,6.28);X.fill();ng();

      X.fillStyle="#FFF";X.beginPath();X.ellipse(-hR*.36,eY,eR,eR*.82,0,0,6.28);X.fill();

function handleShopClick(x,y){
  const d=drawShopScreen;
  // Back
  if(x<60&&y<52){STATE="home";SHOP_SCROLL=0;snd("select");return}
  // Tabs
  if(d._tabY&&y>=d._tabY&&y<=d._tabY+d._tabH){
    const i=Math.floor((x-8)/d._tabW);
    if(i>=0&&i<SHOP_TABS.length){SHOP_TAB=i;SHOP_SCROLL=0;snd("select");return}
  }
  // BP banner
  if(d._bpBanner&&y>=d._bpBanner.y){
    if(!SAVE.brawlPassPremium&&SAVE.gems>=169){SAVE.gems-=169;SAVE.brawlPassPremium=true;persist();snd("unlock");return}
    else if(SAVE.gems<169){/* not enough */snd("select")}
    return;
  }
  // Card buy buttons
  if(d._cards){
    for(const c of d._cards){
      const btnY=c.y+c.h-36,btnH=28;
      if(x>=c.x+10&&x<=c.x+c.w-10&&y>=btnY&&y<=btnY+btnH){
        const item=c.item;
        if(item.reward==="brawler"){
          if(isUnlocked(item.brawlerKey))return;
          if(item.currency==="coins"&&SAVE.coins>=item.price){SAVE.coins-=item.price;unlockBrawler(item.brawlerKey);snd("unlock");burst(x,y,item.color,item.dark||"#000",20,1)}
          else if(item.currency==="gems"&&SAVE.gems>=item.price){SAVE.gems-=item.price;unlockBrawler(item.brawlerKey);snd("unlock");burst(x,y,item.color,item.dark||"#000",20,1)}
        } else {
          const canAfford=(item.currency==="coins"&&SAVE.coins>=item.price)||(item.currency==="gems"&&SAVE.gems>=item.price);
          if(!canAfford){snd("select");return}
          if(item.currency==="coins")SAVE.coins-=item.price;
          else SAVE.gems-=item.price;
          if(item.reward==="coins")SAVE.coins+=item.val;
          else if(item.reward==="gems")SAVE.gems+=item.val;
          else if(item.reward==="pp"){const k=BD[SEL]?.key||"SHELLY";SAVE.powerPoints[k]=(SAVE.powerPoints[k]||0)+item.val}
          else if(item.reward==="drops")SAVE.starrDrops+=item.val;
          snd("coin");
          if(typeof COIN_TOASTS!=="undefined")COIN_TOASTS.push({x:c.x+c.w/2,y:c.y,amount:item.val,label:item.icon+" +"+item.val,life:2,maxL:2,vy:-50});
          burst(x,y,item.color||"#FFD700","#000",16,.8);
        }
        persist();return;
      }
    }
  }
  // Scroll via drag (simple: click bottom 20px = scroll down, top 20px = scroll up)
  if(y>H-20)SHOP_SCROLL=Math.min(SHOP_SCROLL+120,9999);
  if(y>52&&y<72)SHOP_SCROLL=Math.max(0,SHOP_SCROLL-120);
}

function getBPXPNeeded(tier){return 200+tier*50}
function addBrawlPassXP(xp){
  SAVE.brawlPassXP+=xp;
  let advanced=false;
  while(SAVE.brawlPassTier<BP_TIERS){
    const need=getBPXPNeeded(SAVE.brawlPassTier);
    if(SAVE.brawlPassXP>=need){
      SAVE.brawlPassXP-=need;SAVE.brawlPassTier++;advanced=true;
      // Show tier-up announcement in-game
      if(typeof WANNOUNCE!=="undefined"){
        WANNOUNCE=3.5;WTEXT=`🎫 BRAWL PASS STUFE ${SAVE.brawlPassTier}!`;
      }
    }else break;
  }
  if(advanced)persist();
}
function claimBPReward(tier,isPremiumRow){
  const allRw=BP_REWARDS.filter(r=>r.t===tier);
  const rw=isPremiumRow?allRw.find(r=>r.premium):allRw.find(r=>!r.premium)||allRw[0];
  if(!rw)return;
  if(!SAVE.brawlPassClaimed)SAVE.brawlPassClaimed=[];
  // Support both old plain-number keys and new "tier_f"/"tier_p" keys
  const claimKey=`${tier}_${isPremiumRow?'p':'f'}`;
  const alreadyClaimed=SAVE.brawlPassClaimed.includes(claimKey)||SAVE.brawlPassClaimed.includes(tier)||SAVE.brawlPassClaimed.includes(String(tier));
  if(alreadyClaimed)return;
  if(rw.premium&&!SAVE.brawlPassPremium)return;
  // All tiers up to and including current brawlPassTier are claimable
  const currentTier=SAVE.brawlPassTier||1;
  if(tier>currentTier)return;
  SAVE.brawlPassClaimed.push(claimKey);
  let toast='';
  if(rw.type==='coins'){SAVE.coins+=rw.value;toast=`🪙 +${rw.value}`}
  else if(rw.type==='gems'){SAVE.gems+=rw.value;toast=`💎 +${rw.value}`}
  else if(rw.type==='pp'){const k=BD[SEL]?.key||'SHELLY';SAVE.powerPoints[k]=(SAVE.powerPoints[k]||0)+rw.value;toast=`⚡ +${rw.value} PP`}
  else if(rw.type==='drop'){SAVE.starrDrops+=rw.value;toast=`📦 +${rw.value} Drop`}
  else if(rw.type==='brawler'&&rw.brawlerKey){unlockBrawler(rw.brawlerKey);toast=`🎯 ${rw.brawlerKey} freigeschaltet!`}
  if(toast&&typeof COIN_TOASTS!=='undefined')COIN_TOASTS.push({x:W/2,y:H/2-60,amount:0,label:toast,life:2,maxL:2,vy:-40});
  persist();
}

  RARE:       {name:"Rare",       col:"#3AA0FF", glow:"#88CCFF", chance:0.55},
  SUPER_RARE: {name:"Super Rare", col:"#3AFF7A", glow:"#88FFAA", chance:0.30},
  EPIC:       {name:"Epic",       col:"#B94EFF", glow:"#DD99FF", chance:0.12},
  MYTHIC:     {name:"Mythic",     col:"#FF4E4E", glow:"#FF9988", chance:0.025},
  LEGENDARY:  {name:"Legendary",  col:"#FFD700", glow:"#FFFAAA", chance:0.005},
};
const SD_RARITY_ORDER=["RARE","SUPER_RARE","EPIC","MYTHIC","LEGENDARY"];

let SD_STATE=null; // null | {rarity, scale, rot, wobble, wobbleV, phase, particles, flashAlpha, reward, _from}

function startStarrDropScreen(fromState){
  if(SAVE.starrDrops<=0)return;
  // Pick initial rarity
  const r=Math.random();
  let cum=0, rar="RARE";
  for(const k of SD_RARITY_ORDER){cum+=SD_RARITIES[k].chance;if(r<cum){rar=k;break;}}
  SD_STATE={rarity:rar,scale:0.01,rot:0,wobble:0,wobbleV:0,phase:"idle",particles:[],flashAlpha:0,reward:null,_from:fromState||"home",_popT:0};
  SAVE.starrDrops--;persist();
  STATE="starrdrop";
}

function upgradeStarrDropRarity(){
  const idx=SD_RARITY_ORDER.indexOf(SD_STATE.rarity);
  if(idx<SD_RARITY_ORDER.length-1)SD_STATE.rarity=SD_RARITY_ORDER[idx+1];
}

function openStarrDropReward(){
  const key=BD[SEL]?.key||'SHELLY';
  // Weighted reward pool based on rarity
  const rarIdx=SD_RARITY_ORDER.indexOf(SD_STATE.rarity);
  let reward;
  const r2=Math.random();
  if(rarIdx<=1){// Rare/Super Rare
    if(r2<0.40)reward={type:'coins',value:100+rarIdx*150};
    else if(r2<0.70)reward={type:'pp',value:20+rarIdx*30};
    else if(r2<0.88)reward={type:'gems',value:5+rarIdx*5};
    else if(r2<0.96)reward={type:'coins',value:500+rarIdx*250};
    else reward={type:'gadget'};
  } else if(rarIdx===2){// Epic
    if(r2<0.35)reward={type:'pp',value:100};
    else if(r2<0.60)reward={type:'gems',value:20};
    else if(r2<0.80)reward={type:'coins',value:1000};
    else if(r2<0.92)reward={type:'gadget'};
    else reward={type:'starpower'};
  } else {// Mythic / Legendary
    if(r2<0.30)reward={type:'gems',value:30+rarIdx*10};
    else if(r2<0.55)reward={type:'pp',value:200+rarIdx*100};
    else if(r2<0.75)reward={type:'starpower'};
    else reward={type:'coins',value:2000+rarIdx*1000};
  }
  // Apply reward
  let label='';
  if(reward.type==='coins'){SAVE.coins+=reward.value;label=`🪙 +${reward.value} Münzen`}
  else if(reward.type==='gems'){SAVE.gems+=reward.value;label=`💎 +${reward.value} Gems`}
  else if(reward.type==='pp'){SAVE.powerPoints[key]=(SAVE.powerPoints[key]||0)+reward.value;label=`⚡ +${reward.value} Power-Punkte`}
  else if(reward.type==='gadget'){SAVE.gadgets[key]=true;label=`🔧 ${GADGETS[key]?.nameDE||'Gadget'} freigeschaltet!`}
  else if(reward.type==='starpower'){SAVE.starPowers[key]=true;label=`⭐ ${STAR_POWERS[key]?.nameDE||'Star Power'} freigeschaltet!`}
  reward.label=label;
  SD_STATE.reward=reward;
  persist();snd("unlock");
  // Trigger particle explosion
  const rar=SD_RARITIES[SD_STATE.rarity];
  for(let i=0;i<60;i++){
    const a2=Math.random()*6.28,spd=120+Math.random()*220;
    const type=Math.random()<0.5?'coin':'gem';
    SD_STATE.particles.push({x:W/2,y:H/2,vx:Math.cos(a2)*spd,vy:Math.sin(a2)*spd-80,life:1.2+Math.random()*.8,maxLife:2,rot:Math.random()*6.28,type,col:type==='coin'?'#FFD700':rar.col});
  }
}

function updateStarrDrop(){
  if(!SD_STATE)return;
  const s=SD_STATE;
  // Pop-in
  if(s.scale<1){s.scale=Math.min(1,s.scale+DT*4);if(s.scale>=1)s.scale=1;}
  // Wobble physics
  s.wobbleV+=-s.wobble*18-s.wobbleV*5;s.wobble+=s.wobbleV*DT;
  s.rot+=s.wobble*DT;
  // Flash fade
  if(s.flashAlpha>0)s.flashAlpha=Math.max(0,s.flashAlpha-DT*3);
  // Particles
  for(let i=s.particles.length-1;i>=0;i--){
    const p=s.particles[i];p.x+=p.vx*DT;p.y+=p.vy*DT;p.vy+=320*DT;p.life-=DT;p.rot+=DT*5;
    if(p.life<=0)s.particles.splice(i,1);
  }
  // Pop-out after reward shown
  if(s.phase==="done"){s._popT=(s._popT||0)+DT;if(s._popT>1.8){STATE=s._from;SD_STATE=null;}}
}

function drawStarrDrop(rarity,scale,rotation){
  const rar=SD_RARITIES[rarity]||SD_RARITIES.RARE;
  X.save();
  X.translate(W/2,H/2);
  X.rotate(rotation);
  const wobble=SD_STATE?.wobble||0;
  const sx=scale*(1+wobble*0.15), sy=scale*(1-wobble*0.1);
  X.scale(sx,sy);
  // Outer glow
  const gGr=X.createRadialGradient(0,0,10,0,0,80);
  gGr.addColorStop(0,rar.col+'AA');gGr.addColorStop(1,'transparent');
  X.fillStyle=gGr;X.beginPath();X.arc(0,0,80,0,6.28);X.fill();
  // Box body
  const bw=90,bh=96,br=18;
  const boxGr=X.createLinearGradient(-bw/2,-bh/2,-bw/2,bh/2);
  boxGr.addColorStop(0,rar.col);boxGr.addColorStop(0.5,rar.glow);boxGr.addColorStop(1,rar.col);
  X.fillStyle=boxGr;rr(-bw/2,-bh/2,bw,bh,br);X.fill();
  // Shine
  X.fillStyle='rgba(255,255,255,0.22)';rr(-bw/2+6,-bh/2+6,bw-12,bh*.38,br-4);X.fill();
  // Border
  X.strokeStyle='rgba(255,255,255,0.55)';X.lineWidth=3;rr(-bw/2,-bh/2,bw,bh,br);X.stroke();
  // Star icon
  X.font='44px serif';X.textAlign='center';X.textBaseline='middle';X.fillText('⭐',0,-4);
  // Rarity label on box
  X.strokeStyle='rgba(0,0,0,0.7)';X.lineWidth=4;X.font=`bold 11px "Lilita One"`;X.textAlign='center';X.textBaseline='middle';
  X.strokeText(rar.name.toUpperCase(),0,bh/2-14);
  X.fillStyle='#FFF';X.fillText(rar.name.toUpperCase(),0,bh/2-14);
  X.restore();
}

function drawStarrDropScreen(){
  if(!SD_STATE)return;
  const s=SD_STATE;
  const rar=SD_RARITIES[s.rarity];
  // BG
  const bg=X.createRadialGradient(W/2,H/2,60,W/2,H/2,500);
  bg.addColorStop(0,'#1A1040');bg.addColorStop(1,'#060310');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  // Animated ring rays
  X.save();X.translate(W/2,H/2);
  for(let i=0;i<16;i++){
    const a2=i/16*6.28+T*.3;
    X.globalAlpha=0.06+Math.sin(T*2+i)*.03;
    X.strokeStyle=rar.col;X.lineWidth=2;
    X.beginPath();X.moveTo(0,0);X.lineTo(Math.cos(a2)*520,Math.sin(a2)*520);X.stroke();
  }
  X.globalAlpha=1;X.restore();
  // Particles
  for(const p of s.particles){
    const alpha=Math.min(1,p.life/0.4);
    X.save();X.globalAlpha=alpha;X.translate(p.x,p.y);X.rotate(p.rot);
    if(p.type==='coin'){X.fillStyle='#FFD700';X.beginPath();X.arc(0,0,7,0,6.28);X.fill();X.fillStyle='#AA8800';X.font='bold 8px serif';X.textAlign='center';X.textBaseline='middle';X.fillText('$',0,0);}
    else{X.fillStyle=p.col;X.beginPath();for(let i2=0;i2<6;i2++){const aa=i2/6*6.28;X.lineTo(Math.cos(aa)*8,Math.sin(aa)*8);}X.closePath();X.fill();}
    X.restore();
  }
  // Drop box
  drawStarrDrop(s.rarity,s.scale,s.rot);
  // Tap hint or reward text
  if(s.phase==="idle"&&s.scale>=0.98){
    const pulse=0.75+Math.sin(T*3)*.25;
    X.globalAlpha=pulse;
    X.strokeStyle='rgba(0,0,0,0.8)';X.lineWidth=5;X.font=`bold 18px "Lilita One"`;X.textAlign='center';X.textBaseline='middle';
    X.strokeText('Tippe um zu öffnen!',W/2,H/2+100);
    X.fillStyle='#FFFFFF';X.fillText('Tippe um zu öffnen!',W/2,H/2+100);
    X.globalAlpha=1;
    // Drop count badge
    const dc=SAVE.starrDrops||0;
    if(dc>0){
      X.fillStyle='rgba(0,0,0,0.5)';rr(W/2-40,H/2+122,80,24,12);X.fill();
      X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=1;rr(W/2-40,H/2+122,80,24,12);X.stroke();
      X.fillStyle='rgba(255,255,255,0.7)';X.font=`bold 11px "Lilita One"`;X.textAlign='center';X.textBaseline='middle';
      X.fillText(`📦 Noch ${dc} übrig`,W/2,H/2+134);
    }
  }
  if(s.phase==="done"&&s.reward){
    const alpha=Math.min(1,(s._popT||0)/0.3);
    X.globalAlpha=alpha;
    // Reward banner
    const bw=360,bh=70,bx=W/2-bw/2,by=H/2+112;
    const rewGr=X.createLinearGradient(bx,by,bx+bw,by);
    rewGr.addColorStop(0,rar.col+'44');rewGr.addColorStop(0.5,rar.col+'88');rewGr.addColorStop(1,rar.col+'44');
    X.fillStyle=rewGr;rr(bx,by,bw,bh,18);X.fill();
    X.strokeStyle=rar.col;X.lineWidth=2;rr(bx,by,bw,bh,18);X.stroke();
    X.strokeStyle='rgba(0,0,0,0.9)';X.lineWidth=5;X.font=`bold 22px "Lilita One"`;X.textAlign='center';X.textBaseline='middle';
    X.strokeText(s.reward.label,W/2,by+bh/2-8);
    X.fillStyle=rar.col;X.fillText(s.reward.label,W/2,by+bh/2-8);
    X.strokeStyle='rgba(0,0,0,0.6)';X.lineWidth=3;X.font=`bold 12px "Lilita One"`;
    X.strokeText('Tippe zum Schließen',W/2,by+bh/2+16);
    X.fillStyle='rgba(255,255,255,0.6)';X.fillText('Tippe zum Schließen',W/2,by+bh/2+16);
    X.globalAlpha=1;
  }
  // Full-screen flash on upgrade
  if(s.flashAlpha>0){
    X.globalAlpha=s.flashAlpha;X.fillStyle='#FFFFFF';X.fillRect(0,0,W,H);X.globalAlpha=1;
  }
  // Rarity label top
  X.strokeStyle='rgba(0,0,0,0.8)';X.lineWidth=5;X.font=`bold 16px "Lilita One"`;X.textAlign='center';X.textBaseline='middle';
  X.strokeText('STARR DROP',W/2,44);
  gl(rar.col,8);X.fillStyle=rar.col;X.fillText('STARR DROP',W/2,44);ng();
}

function handleStarrDropClick(){
  if(!SD_STATE)return;
  const s=SD_STATE;
  if(s.scale<0.95)return;
  if(s.phase==="done"){STATE=s._from;SD_STATE=null;return;}
  if(s.phase==="idle"){
    // Chance to upgrade rarity
    const curIdx=SD_RARITY_ORDER.indexOf(s.rarity);
    const upgradeRoll=Math.random();
    let upgraded=false;
    if(curIdx<SD_RARITY_ORDER.length-1){
      const upgradeChance=[0.35,0.25,0.15,0.08][curIdx]||0;
      if(upgradeRoll<upgradeChance){
        upgradeStarrDropRarity();
        s.flashAlpha=1;s.wobbleV=12;upgraded=true;snd("unlock");
        return; // let player tap again on upgraded rarity
      }
    }
    // Open!
    s.wobbleV=18;s.phase="opening";
    setTimeout(()=>{
      if(!SD_STATE)return;
      openStarrDropReward();
      SD_STATE.phase="done";SD_STATE._popT=0;
    },400);
  }
}

// Gain/loss tables per brawler-trophy bracket
// [minTrophies, gain, loss]
const TROPHY_TABLE=[
  [0,     8, 2],
  [200,   7, 3],
  [500,   7, 4],
  [800,   6, 4],
  [1100,  6, 5],
  [1500,  5, 5],
  [2000,  5, 6],  // Prestige 2 threshold
  [2600,  4, 6],
  [3300,  4, 7],
  [4200,  3, 7],
  [5500,  3, 8],
  [7000,  2, 8],
  [9000,  2, 9],
  [12000, 1, 9],
];
const PRESTIGE2_THRESHOLD=2000; // per-brawler trophies

function getTrophyRates(brawlerTrophies){
  let gain=8,loss=2;
  for(const [min,g,l] of TROPHY_TABLE){
    if(brawlerTrophies>=min){gain=g;loss=l;}
    else break;
  }
  return{gain,loss};
}

function isPrestige2(key){
  return(SAVE.brawlerTrophies[key]||0)>=PRESTIGE2_THRESHOLD;
}

function awardTrophies(won,kills,gems){
  const key=BD[SEL].key;
  if(!SAVE.brawlerTrophies[key])SAVE.brawlerTrophies[key]=0;
  if(!SAVE.winStreak[key])SAVE.winStreak[key]=0;
  const bt=SAVE.brawlerTrophies[key];
  const p2=isPrestige2(key);
  const{gain,loss}=getTrophyRates(bt);

  let delta=0;
  let bonusLabel="";

  if(MODE==="showdown"){
    // Placement-based: rank 1=+8, 2=+5, 3=+3, 4=+1, 5=0, 6=-1, 7=-2, 8=-3, 9=-4, 10=-5
    const sdGainTable=[8,5,3,1,0,-1,-2,-3,-4,-5];
    const rank=Math.max(1,Math.min(10,SD_RANK||10));
    delta=sdGainTable[rank-1];
    // Scale delta by trophy rate modifier
    const scl=Math.max(0.5,gain/8);
    delta=delta>0?Math.round(delta*scl):Math.round(delta*(loss/5));
    if(delta<0&&bt+delta<0)delta=-bt;
    SAVE.winStreak[key]=delta>0?(SAVE.winStreak[key]||0)+1:0;
  } else if(won){
    delta=gain;
    if(!p2){
      SAVE.winStreak[key]=Math.min((SAVE.winStreak[key]||0)+1,5);
      const streakBonus=Math.min(SAVE.winStreak[key]-1,3)*2;
      if(streakBonus>0){delta+=streakBonus;bonusLabel=`🔥×${SAVE.winStreak[key]}`;}
      const avgOpponent=bt*(0.9+Math.random()*0.4);
      if(bt<avgOpponent-150&&bt<1500){delta+=2;bonusLabel+=" 🏹";}
    }else{
      SAVE.winStreak[key]=0;
    }
  }else{
    delta=-loss;
    SAVE.winStreak[key]=0;
    if(bt+delta<0)delta=-bt;
  }

  SAVE.brawlerTrophies[key]=Math.max(0,bt+delta);
  SAVE.trophies=Object.values(SAVE.brawlerTrophies).reduce((s,v)=>s+(v||0),0);
  persist();
  window._trophyStreakLabel=bonusLabel;
  return delta;
}

/* ═══ RANK SYSTEM ═══ */
// Rank thresholds: index = rank-1, value = trophies needed
const RANK_THRESHOLDS=[0,50,100,200,350,550,800,1100,1500,2000,2600,3300,4100,5000,6000,7200,8500,10000,12000,15000,20000,25000,30000,35000,40000,50000,60000,70000,80000,100000];
const RANK_COLORS=["#AAAAAA","#44BB44","#44BB44","#4488FF","#4488FF","#AA44FF","#AA44FF","#FF4444","#FF4444","#FF8800","#FF8800","#FFD700","#FFD700","#FFD700","#00DDFF","#00DDFF","#FF44AA","#FF44AA","#FF44AA","#FF2200","#FF2200","#FF2200","#AAFFDD","#AAFFDD","#FFD700","#FFD700","#FF8800","#FF2200","#AA00FF","#FF00AA"];
function getRank(trophies){
  let rank=1;
  for(let i=0;i<RANK_THRESHOLDS.length;i++){if(trophies>=RANK_THRESHOLDS[i])rank=i+1;else break;}
  return Math.min(rank,RANK_THRESHOLDS.length);
}
function getRankColor(rank){return RANK_COLORS[Math.min(rank-1,RANK_COLORS.length-1)]||"#AAAAAA";}
function getRankProgress(trophies){
  const rank=getRank(trophies);
  if(rank>=RANK_THRESHOLDS.length)return 1;
  const lo=RANK_THRESHOLDS[rank-1],hi=RANK_THRESHOLDS[rank];
  return hi>lo?(trophies-lo)/(hi-lo):1;
}

// ── Draw a class icon as canvas paths (no emoji) ──
// cx,cy = center, sz = size (diameter), col = fill color
function drawClassIcon(iconKey,cx,cy,sz,col){
  X.save();
  X.translate(cx,cy);
  const s=sz/20; // base unit
  X.fillStyle=col||"#FFF";
  X.strokeStyle=col||"#FFF";
  X.lineCap="round";X.lineJoin="round";

  if(iconKey==="fist"){
    // Faust: vier Finger + Daumen
    X.lineWidth=s*2.2;
    // Knuckles (vier Finger-Kuppen)
    for(let i=0;i<4;i++){
      const kx=(i-1.5)*s*3.2,ky=-s*7;
      X.beginPath();X.arc(kx,ky,s*2.2,0,Math.PI*2);X.fill();
    }
    // Handrücken
    X.beginPath();
    X.roundRect(-s*7,-s*5,s*14,s*10,s*2);
    X.fill();
    // Daumen links
    X.beginPath();X.arc(-s*8,-s*1,s*2.2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(-s*10,s*2.5,s*2,0,Math.PI*2);X.fill();
  }
  else if(iconKey==="sword"){
    // Schwert: Klinge, Parierstange, Griff
    X.lineWidth=s*2;
    // Klinge
    X.beginPath();X.moveTo(0,-s*9);X.lineTo(s*1.5,s*2);X.lineTo(-s*1.5,s*2);X.closePath();X.fill();
    // Parierstange
    X.fillRect(-s*5,s*2,s*10,s*2.5);
    // Griff
    X.fillRect(-s*1.2,s*4.5,s*2.4,s*5);
    // Knauf
    X.beginPath();X.arc(0,s*9.5,s*2,0,Math.PI*2);X.fill();
  }
  else if(iconKey==="crosshair"){
    // Zielscheibe: Kreis + 4 Striche
    X.lineWidth=s*1.8;
    X.beginPath();X.arc(0,0,s*6,0,Math.PI*2);X.stroke();
    // 4 Striche außen
    const dirs=[[0,-1],[0,1],[1,0],[-1,0]];
    for(const[dx,dy] of dirs){
      X.beginPath();X.moveTo(dx*s*7.5,dy*s*7.5);X.lineTo(dx*s*10,dy*s*10);X.stroke();
    }
    // Kleiner Mittelpunkt
    X.beginPath();X.arc(0,0,s*1.5,0,Math.PI*2);X.fill();
  }
  else if(iconKey==="bomb"){
    // Bombe: runder Körper + Zündschnur + Funken
    // Körper
    X.beginPath();X.arc(0,s*2,s*7,0,Math.PI*2);X.fill();
    // Zündschnur (Kurve)
    X.lineWidth=s*1.8;
    X.strokeStyle=col||"#FFF";
    X.beginPath();X.moveTo(s*3.5,-s*4);X.quadraticCurveTo(s*8,-s*10,s*2,-s*9);X.stroke();
    // Funken oben
    X.lineWidth=s*1.4;
    const sparks=[[s*1,-s*10],[s*3,-s*11],[-s*1,-s*9]];
    for(const[sx2,sy2] of sparks){X.beginPath();X.moveTo(sx2,sy2);X.lineTo(sx2+s*1.2,sy2-s*2);X.stroke();}
    // Glanzpunkt auf Bombe
    X.fillStyle="rgba(255,255,255,0.3)";X.beginPath();X.arc(-s*2.5,s*0,s*2.5,0,Math.PI*2);X.fill();
  }
  else if(iconKey==="shield"){
    // Schild: Wappenform
    X.beginPath();
    X.moveTo(0,-s*9);
    X.lineTo(s*7,-s*6);
    X.lineTo(s*7,s*1);
    X.quadraticCurveTo(s*7,s*8,0,s*10);
    X.quadraticCurveTo(-s*7,s*8,-s*7,s*1);
    X.lineTo(-s*7,-s*6);
    X.closePath();X.fill();
    // Inneres Kreuz / Highlight
    X.fillStyle="rgba(255,255,255,0.2)";
    X.beginPath();
    X.moveTo(0,-s*7);X.lineTo(s*5,-s*4.5);X.lineTo(s*5,s*0.5);
    X.quadraticCurveTo(s*5,s*5,0,s*7.5);X.closePath();X.fill();
  }
  else if(iconKey==="plus"){
    // Pluszeichen (Arzt/Heilen)
    const arm=s*4,thick=s*3;
    X.beginPath();
    X.roundRect(-thick,-s*9,thick*2,s*18,s*1.5);X.fill();
    X.beginPath();
    X.roundRect(-s*9,-thick,s*18,thick*2,s*1.5);X.fill();
  }
  else if(iconKey==="hotspot"){
    // Hotspot/WLAN-Symbol: 3 Bögen + Punkt
    X.lineWidth=s*2;
    X.strokeStyle=col||"#FFF";
    // 3 konzentrische Bögen (Halbkreise nach oben)
    for(let i=0;i<3;i++){
      const r=(i+1)*s*3.2;
      X.beginPath();X.arc(0,s*3,r,Math.PI+0.35,Math.PI*2-0.35);X.stroke();
    }
    // Mittelpunkt
    X.beginPath();X.arc(0,s*3,s*1.5,0,Math.PI*2);X.fill();
  }

  X.restore();
}

let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC}
function snd(type){
  if(!SAVE.sound)return;
  try{
    const a=getAC(),g=a.createGain(),t=a.currentTime;g.connect(a.destination);
    function tone(f0,f1,tp,dur,vol){const o=a.createOscillator(),og=a.createGain();o.connect(og);og.connect(g);o.type=tp;
      if(f1){o.frequency.setValueAtTime(f0,t);o.frequency.exponentialRampToValueAtTime(f1,t+dur)}else o.frequency.setValueAtTime(f0,t);
      og.gain.setValueAtTime(vol,t);og.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur+.02)}
    if(type==="shoot"){g.gain.setValueAtTime(.5,t);tone(380,80,"sawtooth",.13,.18);tone(1100,220,"square",.07,.08)}
    else if(type==="hit"){g.gain.setValueAtTime(.42,t);tone(180,65,"square",.11,.35)}
    else if(type==="hitplayer"){g.gain.setValueAtTime(.6,t);tone(85,38,"sawtooth",.18,.55)}
    else if(type==="boom"){g.gain.setValueAtTime(.65,t);tone(120,28,"sawtooth",.55,.7);tone(220,40,"square",.4,.4)}
    else if(type==="gem"){[440,554,659,880].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type="sine";o.frequency.value=f;og.gain.setValueAtTime(.22,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.18);o.start();o.stop(a2.currentTime+.2)}catch{}},i*65))}
    else if(type==="death"){g.gain.setValueAtTime(.4,t);tone(420,28,"sawtooth",.5,.5)}
    else if(type==="super"){[220,330,440,660,880,1100].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type=i%2?"triangle":"sine";o.frequency.value=f;og.gain.setValueAtTime(.2,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.28);o.start();o.stop(a2.currentTime+.3)}catch{}},i*45))}
    else if(type==="win"){[523,659,784,1046,784,1046,1318].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type="sine";o.frequency.value=f;og.gain.setValueAtTime(.28,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.22);o.start();o.stop(a2.currentTime+.25)}catch{}},i*130))}
    else if(type==="lose"){[440,349,294,220,165].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type="triangle";o.frequency.value=f;og.gain.setValueAtTime(.26,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.25);o.start();o.stop(a2.currentTime+.28)}catch{}},i*165))}
    else if(type==="wave"){[261,329,392,523,659].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type="square";o.frequency.value=f;og.gain.setValueAtTime(.16,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.18);o.start();o.stop(a2.currentTime+.2)}catch{}},i*100))}
    else if(type==="ammo"){g.gain.setValueAtTime(.3,t);tone(750,null,"sine",.09,.14)}
    else if(type==="select"){g.gain.setValueAtTime(.35,t);tone(660,880,"sine",.18,.28)}
    else if(type==="coin"){[880,1100].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type="sine";o.frequency.value=f;og.gain.setValueAtTime(.25,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.14);o.start();o.stop(a2.currentTime+.16)}catch{}},i*85))}
    else if(type==="unlock"){[440,554,659,880,1100,1320].forEach((f,i)=>setTimeout(()=>{try{const a2=getAC(),o=a2.createOscillator(),og=a2.createGain();o.connect(og);og.connect(a2.destination);o.type=i%2?"triangle":"sine";o.frequency.value=f;og.gain.setValueAtTime(.3,a2.currentTime);og.gain.exponentialRampToValueAtTime(.001,a2.currentTime+.22);o.start();o.stop(a2.currentTime+.24)}catch{}},i*90))}
    else if(type==="heal"){g.gain.setValueAtTime(.35,t);tone(523,784,"sine",.3,.28)}
  }catch{}
}

function updateShowdown(){
  if(!PL||PL.dead)return;
  const mapW=COLS*TS,mapH=ROWS*TS,cx=mapW/2,cy=mapH/2;
  if(SD_POISON_R>0)SD_POISON_R=Math.max(0,SD_POISON_R-SD_POISON_SPEED*DT);
  const pdist=Math.hypot(PL.x-cx,PL.y-cy);
  if(pdist>SD_POISON_R&&SD_POISON_R<SD_POISON_MAX*.98){
    const dm=200*DT*(1+(SD_POISON_MAX-SD_POISON_R)/SD_POISON_MAX*3);
    PL.hp=Math.max(0,PL.hp-dm);
    if(Math.random()<DT*4)spark(PL.x+(Math.random()-.5)*30,PL.y+(Math.random()-.5)*30,"#44FF88");
  }
  for(const e of ENM){
    if(e.dead)continue;
    if(Math.hypot(e.x-cx,e.y-cy)>SD_POISON_R&&SD_POISON_R<SD_POISON_MAX*.98){
      e.hp=Math.max(0,e.hp-150*DT*(1+(SD_POISON_MAX-SD_POISON_R)/SD_POISON_MAX*2));
    }
  }
  for(const p of SD_POWERUPS){
    if(p.collected)continue;
    p.sc=Math.min(1,(p.sc||0)+DT*4);p.bob=(p.bob||0)+DT*3;
    if(dst(p,PL)<PL.r+18){
      p.collected=true;PL.maxHp+=p.val;PL.hp=Math.min(PL.maxHp,PL.hp+p.val);
      spawnDmg(p.x,p.y-20,"+"+p.val+" HP","#FFD700",1.3);
      burst(p.x,p.y,"#FFD700","#FF8800",12,.6);snd("gem");earnCoins(5,p.x,p.y-18,"+5");
    }
    for(const e of ENM){
      if(e.dead||p.collected||dst(p,e)>e.r+18)continue;
      p.collected=true;e.maxHp=(e.maxHp||e.hp)+p.val;
      e.hp=Math.min(e.maxHp,e.hp+p.val);e.powerups=(e.powerups||0)+1;
    }
  }
}

function updateGemGrab(){
  if(MODE!=="gems")return;
  // Match timer
  GG_MATCH_TIMER-=DT;
  if(GG_MATCH_TIMER<=0){
    // Time up: most gems wins
    endGame(totalGemsBlue()>=totalGemsRed());return;
  }
  // Gem mine: spawn gem every 7s if <15 on map and total <29
  if(!GEM||!BUL)return;
  const onMap=GEM.filter(g=>!g.collected).length;
  if(onMap<15&&(totalGemsBlue()+totalGemsRed()+onMap)<GG_MAX_GEMS){
    GG_MINE_TIMER-=DT;
    if(GG_MINE_TIMER<=0){
      GG_MINE_TIMER=7;
      // Mine is at map center
      const mx=TS*16+TS/2,my=TS*11+TS/2;
      const a=Math.random()*6.28,r=20+Math.random()*30;
      GEM.push({x:mx+Math.cos(a)*r,y:my+Math.sin(a)*r,collected:false,bob:Math.random()*6.28,sc:0,team:-1});
    }
  }
  // Friendly AI collects gems (team 0 allies)
  for(const e of ENM){
    if(e.dead||e.team!==0||!e.friendly)continue;
    for(const g of GEM){
      if(g.collected)continue;
      if(dst(g,e)<e.r+16){
        g.collected=true;e.gems=(e.gems||0)+1;GG_GEMS_BLUE++;
        burst(g.x,g.y,"#00FFAA","#00CC77",8,.5);
      }
    }
  }
  // Red enemy AI collects gems
  for(const e of ENM){
    if(e.dead||e.team!==1)continue;
    for(const g of GEM){
      if(g.collected)continue;
      if(dst(g,e)<e.r+16){
        g.collected=true;e.gems=(e.gems||0)+1;GG_GEMS_RED++;
        burst(g.x,g.y,"#FF4444","#AA0000",8,.5);
      }
    }
  }
  const blue=totalGemsBlue(),red=totalGemsRed();
  // Countdown logic
  if(blue>=10||red>=10){
    const leading=blue>red?0:red>blue?1:-1;
    if(leading>=0&&blue!==red){
      if(GG_LEADING_TEAM!==leading){GG_LEADING_TEAM=leading;GG_COUNTDOWN=15;}
      else{
        GG_COUNTDOWN-=DT;
        if(GG_COUNTDOWN<=0){endGame(leading===0);return;}
      }
    } else { GG_COUNTDOWN=-1;GG_LEADING_TEAM=-1; }
  } else { GG_COUNTDOWN=-1;GG_LEADING_TEAM=-1; }
}

function updateKnockout(){
  if(MODE!=="knockout")return;
  KO_ROUND_TIMER+=DT;
  // Check round end (grace period: don't check first 2s of round)
  const blueAlive=KO_ALIVE_BLUE,redAlive=KO_ALIVE_RED;
  if(KO_ROUND_TIMER>2.5&&(redAlive<=0||blueAlive<=0)){
    const blueWon=redAlive<=0;
    if(blueWon)KO_WINS_BLUE++;else KO_WINS_RED++;
    if(KO_WINS_BLUE>=2){endGame(true);return;}
    if(KO_WINS_RED>=2){endGame(false);return;}
    // Start next round
    KO_ROUND++;KO_ALIVE_BLUE=3;KO_ALIVE_RED=3;
    KO_POISON_ACTIVE=false;KO_POISON_R=0;KO_ROUND_TIMER=0;
    WANNOUNCE=3;WTEXT=t("roundAnn",KO_ROUND,KO_WINS_BLUE,KO_WINS_RED);
    // Respawn all with proper positions
    BUL=[];
    PL.dead=false;PL.hp=PL.maxHp;PL.gems=0;
    PL.x=TS*16+TS/2;PL.y=TS*17+TS/2; // bottom center
    PL.vx=0;PL.vy=0;PL.invT=3;PL.sup=0;PL.supCD=0;
    RESPAWN_T=0; // clear so respawn block doesn't re-trigger
    const redSpawns=[[TS*8+TS/2,TS*4+TS/2],[TS*24+TS/2,TS*4+TS/2],[TS*16+TS/2,TS*3+TS/2]];
    const blueSpawns=[[TS*13+TS/2,TS*17+TS/2],[TS*19+TS/2,TS*17+TS/2]];
    let ri=0,bi=0;
    for(const e of ENM){
      e.dead=false;e.hp=e.maxHp;e.deathT=0;e.invT=2;e.gems=0;e.vx=0;e.vy=0;
      if(e.team===1&&ri<redSpawns.length){e.x=redSpawns[ri][0];e.y=redSpawns[ri][1];ri++;}
      else if(e.friendly&&bi<blueSpawns.length){e.x=blueSpawns[bi][0];e.y=blueSpawns[bi][1];bi++;}
    }
    return;
  }
  // Tiebreaker: 1v1 or too long without ending → activate gas
  if(!KO_POISON_ACTIVE&&(KO_ROUND_TIMER>60||(blueAlive===1&&redAlive===1&&KO_ROUND_TIMER>20))){
    KO_POISON_ACTIVE=true;
    WANNOUNCE=2.5;WTEXT=t("gasWarning");
  }
  if(KO_POISON_ACTIVE){
    // Gas comes from top and bottom (not center ring)
    KO_POISON_R=Math.min(ROWS*TS/2,(KO_POISON_R||0)+DT*30);
    // Damage anyone in gas zone (top/bottom strips)
    const gasTop=KO_POISON_R,gasBot=ROWS*TS-KO_POISON_R;
    const gasDmg=180*DT;
    if(PL&&!PL.dead){
      if(PL.y<gasTop||PL.y>gasBot){
        PL.hp=Math.max(0,PL.hp-gasDmg);
        if(Math.random()<DT*3)spark(PL.x,PL.y,"#44FF88");
      }
    }
    for(const e of ENM){
      if(e.dead)continue;
      if(e.y<gasTop||e.y>gasBot){
        e.hp=Math.max(0,e.hp-gasDmg);
      }
    }
  }
}

function updateHeist(){
  if(MODE!=="heist")return;
  HS_TIMER-=DT;
  // Tick invuln + shake
  for(const s of[HS_BLUE,HS_RED]){
    if(s.invT>0)s.invT-=DT;
    if(s.shakeT>0)s.shakeT-=DT;
    if(s.pushT>0)s.pushT-=DT;
  }
  // Check bullet hits on vaults
  for(let i=BUL.length-1;i>=0;i--){
    const b=BUL[i];
    // Blue safe hit by red/enemy bullets
    if(b.owner!=="player"&&b.owner!=="ally"){
      if(HS_BLUE.invT<=0&&Math.hypot(b.x-HS_BLUE.x,b.y-HS_BLUE.y)<HS_BLUE.r+b.r){
        _hsHit(HS_BLUE,b.dmg*0.15,0);BUL.splice(i,1);
        spark(b.x,b.y,"#FF6644");continue;
      }
    }
    // Red safe hit by player/ally bullets
    if(b.owner==="player"||b.owner==="ally"){
      if(HS_RED.invT<=0&&Math.hypot(b.x-HS_RED.x,b.y-HS_RED.y)<HS_RED.r+b.r){
        _hsHit(HS_RED,b.dmg*0.15,1);BUL.splice(i,1);
        spark(b.x,b.y,"#4488FF");continue;
      }
    }
  }
  // Push entities near invincible vaults
  for(const s of[HS_BLUE,HS_RED]){
    if(s.pushT<=0)continue;
    const ents=MODE==="heist"?[PL,...ENM]:[];
    for(const e of ents){
      if(!e||e.dead)continue;
      const dx=e.x-s.x,dy=e.y-s.y,d=Math.hypot(dx,dy)||1;
      if(d<s.r+30){
        const f=1-d/(s.r+30);
        e.vx+=(dx/d)*f*600;e.vy+=(dy/d)*f*600;
        e.invT=Math.max(e.invT,.12);
        const dmg=80*DT;
        if(e===PL)e.hp=Math.max(0,e.hp-dmg);else e.hp=Math.max(0,e.hp-dmg);
      }
    }
  }
  // Vault destroyed? (only check after properly initialized)
  if(HS_RED.maxHp>0&&HS_RED.hp<=0){endGame(true);return;}
  if(HS_BLUE.maxHp>0&&HS_BLUE.hp<=0){endGame(false);return;}
  // Timer end
  if(HS_TIMER<=0&&HS_BLUE.maxHp>0){
    const bluePct=HS_BLUE.hp/HS_BLUE.maxHp;
    const redPct =HS_RED.hp /HS_RED.maxHp;
    if(Math.abs(bluePct-redPct)<0.001){HS_DRAW=true;endGame(false);}
    else endGame(bluePct>redPct);
  }
}
function _hsHit(safe,dmg,team){
  const prevPct=safe.hp/safe.maxHp;
  safe.hp=Math.max(0,safe.hp-dmg);
  const newPct=safe.hp/safe.maxHp;
  // Every 25% threshold crossed → invuln 3s + pushback
  const prev25=Math.floor(prevPct*4);
  const new25 =Math.floor(newPct*4);
  if(new25<prev25&&newPct>0){
    safe.invT=3;safe.shakeT=.4;safe.pushT=3;
    burst(safe.x,safe.y,team===0?"#5588FF":"#FF5544","#FFDD00",24,1.4);
    snd("boom");WANNOUNCE=2;WTEXT=team===0?t("blueSafe"):t("redSafe");
  }else{
    safe.shakeT=.18;
    spark(safe.x+(Math.random()-.5)*40,safe.y+(Math.random()-.5)*40,"#FFDD44");
  }
}

function updateStealth(){
  if(!PL||PL.dead){return}
  let inBush=false;
  for(const b of BUSHES){
    if(Math.abs(PL.x-b.x)<b.s/2&&Math.abs(PL.y-b.y)<b.s/2){inBush=true;break}
  }
  // Schießen macht kurzzeitig sichtbar
  PL.hidden=inBush&&PL.sTimer<=0;
  // Gegner verlieren Sichtkontakt wenn Spieler tief im Busch und weit weg
  for(const e of ENM){
    if(e.dead)continue;
    const dist=Math.hypot(PL.x-e.x,PL.y-e.y);
    e.targetVisible=!(PL.hidden&&dist>150);
  }
}

    }else{const k=tv+(dk?"d":"l");if(TC[k])X.drawImage(TC[k],x,y,TS,TS)}

/* CUSTOM BRAWLER SYSTEM — max 3 slots, saved in localStorage */
const MAX_CUSTOM=3,MAX_BRAWLERS=32;
function customBDEntry(cb){
  // Recover color from hue/sat/bri if direct color missing
  let col=cb.color||"#FF8800";
  let dark=cb.dark||col;
  if((!col||col==="#FF8800")&&cb.hue!==undefined){
    col=hslToHex(cb.hue,cb.sat||60,cb.bri||50);
    dark=hslToHex(cb.hue,cb.sat||60,Math.max(10,(cb.bri||50)-22));
  }
  return{
    key:cb.key, name:cb.name||"Custom", rarity:cb.rarity||"EPIC",
    color:col, dark:dark, body:col,
    hp:cb.hp||3000, spd:cb.spd||200, ammoMax:3, ammoR:1.4, sCool:.7,
    wType:cb.wType||"rifle", dmg:cb.dmg||600, rLife:1.5,
    sHp:Math.max(1,Math.round((cb.hp||3000)/2000)),
    sSp:Math.max(1,Math.round((cb.spd||200)/60)),
    sDm:Math.max(1,Math.round((cb.dmg||600)/600)), sRg:3,
    desc:"Dein eigener Brawler!",
    superDesc:cb.superDesc||"Eigene Super",
    isCustom:true,
    // Preserve original create params for re-editing
    hue:cb.hue, sat:cb.sat, bri:cb.bri,
  };
}
function loadCustomBrawlers(){
  if(!SAVE.customBrawlers||!Array.isArray(SAVE.customBrawlers))SAVE.customBrawlers=[];
  // Filter only valid entries
  SAVE.customBrawlers=SAVE.customBrawlers.filter(cb=>cb&&cb.key&&cb.name);
  SAVE.customBrawlers.forEach(cb=>{
    const entry=customBDEntry(cb);
    const idx=BD.findIndex(b=>b.key===cb.key);
    if(idx>=0)BD[idx]=entry;
    else if(BD.length<MAX_BRAWLERS)BD.push(entry);
    if(!SAVE.unlocked.includes(cb.key))SAVE.unlocked.push(cb.key);
  });
  // Remove stale old CUSTOM key if not in customBrawlers
  const oi=BD.findIndex(b=>b.key==="CUSTOM");
  if(oi>=0&&!SAVE.customBrawlers.find(cb=>cb.key==="CUSTOM")){
    BD.splice(oi,1);
    SAVE.unlocked=SAVE.unlocked.filter(k=>k!=="CUSTOM");
  }
  // Clamp SEL to valid range
  if(typeof SEL!=="undefined"&&SEL>=BD.length)SEL=Math.max(0,BD.length-1);
}
function saveCreatedBrawlerToSlot(bd){
  if(!SAVE.customBrawlers)SAVE.customBrawlers=[];
  const ex=SAVE.customBrawlers.findIndex(cb=>cb.key===bd.key);
  if(ex>=0)SAVE.customBrawlers[ex]=bd;
  else{if(SAVE.customBrawlers.length>=MAX_CUSTOM)SAVE.customBrawlers.shift();SAVE.customBrawlers.push(bd);}
  persist();loadCustomBrawlers();
}
function deleteCustomBrawler(key){
  if(!SAVE.customBrawlers)return;
  SAVE.customBrawlers=SAVE.customBrawlers.filter(cb=>cb.key!==key);
  SAVE.unlocked=SAVE.unlocked.filter(k=>k!==key);
  const idx=BD.findIndex(b=>b.key===key);if(idx>=0)BD.splice(idx,1);
  if(SEL>=BD.length)SEL=BD.length-1;persist();
}
(function(){
  if(SAVE.customBrawler&&!(SAVE.customBrawlers||[]).find(cb=>cb.key==="CUSTOM")){
    if(!SAVE.customBrawlers)SAVE.customBrawlers=[];
    SAVE.customBrawlers.push(Object.assign({},SAVE.customBrawler,{key:"CUSTOM"}));
    SAVE.customBrawler=null;persist();
  }
  loadCustomBrawlers();
})();

function isUnlocked(key){return SAVE.unlocked.includes(key)}
function unlockBrawler(key){
  if(!isUnlocked(key)){SAVE.unlocked.push(key);persist();snd("unlock")}
}
function tryUnlock(idx){
  const bd=BD[idx];
  if(isUnlocked(bd.key))return false;
  const r=RARITY[bd.rarity];
  if(SAVE.coins>=r.cost&&SAVE.gems>=r.gems){
    SAVE.coins-=r.cost;SAVE.gems-=r.gems;unlockBrawler(bd.key);persist();
    showUnlockAnim(bd);return true;
  }
  return false;
}

C.addEventListener("touchstart",e=>{

  for(const t of e.changedTouches){
    if(STATE!=="play"&&!SHOW_SELECT)continue; // all UI handled in touchend
    const s=screenXY(t); // always screen coords
    if(Math.hypot(s.x-SUPER_BTN.x,s.y-SUPER_BTN.y)<SUPER_BTN.r+14)continue; // super on touchend
    if(s.x<W/2&&LTOUCH_ID===null){
      // Left joystick — store SCREEN coords
      LTOUCH_ID=t.identifier;TOUCH.left={x:s.x,y:s.y,sx:s.x,sy:s.y}

      // Check if in super zone (top-right quadrant of right half)
      const inSuperZone=s.y<H*.55&&s.x>W*.7;
      if(inSuperZone&&SUPER_JOY_ID===null){

    if(t.identifier===RTOUCH_ID&&TOUCH.right){TOUCH.right.x=s.x;TOUCH.right.y=s.y}

},{passive:false});
C.addEventListener("touchend",e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const _sxy=screenXY(t),_wxy=canvasXY(t);
    const{x,y}=STATE==="play"?_wxy:_sxy;
    // ── Non-play state UI buttons ──
    if(STATE==="home")    {
      if(SHOW_BRAWLERS){handleBrawlerCollectionClick(x,y);continue}

        if(x<60&&y<(drawNewsScreen._topH||52)){SHOW_NEWS=false;snd("select");}
        continue;
      }
      handleHomeTap(x,y);continue
    }
    if(STATE==="shop")    {handleShopClick(x,y);continue}
    if(STATE==="matchmaking"){handleMatchmakingClick(x,y);continue}
    if(STATE==="create")  {const ss2=screenXY(t);handleCreateTap(ss2.x,ss2.y);continue}
    if(STATE==="upgrade") {handleUpgradeClick(x,y);continue}
    if(STATE==="select"){handleSelectTap(x,y);continue}
    if(STATE==="settings"){handleSettingsClick(x,y);continue}
    if(STATE==="win"||STATE==="lose"){handleEndClick(x,y);continue}
    if(STATE==="starrdrop"){handleStarrDropClick();continue}
    // ── In-game gear icon ──
    if(STATE==="play"&&Math.hypot(_sxy.x-(W-22),_sxy.y-22)<22){
      SETTINGS_FROM="play";STATE="settings";snd("select");continue;
    }
    // ── Super button tap ──
    if(STATE==="play"&&Math.hypot(_sxy.x-SUPER_BTN.x,_sxy.y-SUPER_BTN.y)<SUPER_BTN.r+14){
      if(PL&&PL.sup>=PL.supMax&&PL.supCD<=0){fireSuper();}
      continue;
    }
    // ── Joystick / super release ──
    if(t.identifier===LTOUCH_ID){LTOUCH_ID=null;TOUCH.left=null}
    if(t.identifier===RTOUCH_ID){RTOUCH_ID=null;TOUCH.right=null;MB=false}
    if(t.identifier===SUPER_JOY_ID){
      SUPER_JOY_ID=null;SUPER_JOY.active=false;
      // Fire super on release if dragged enough
      const sdx=SUPER_JOY.x-SUPER_JOY.sx,sdy=SUPER_JOY.y-SUPER_JOY.sy;

        fireSuper();
      }else if(PL&&(PL.sup<PL.supMax||PL.supCD>0)){snd("locked");}
    }
    if(Math.hypot(x-SUPER_BTN.x,y-SUPER_BTN.y)<SUPER_BTN.r+14)TOUCH.sup=false;
  }

C.addEventListener("mouseleave",()=>MB=false);
C.addEventListener("click",e=>{
  const r=C.getBoundingClientRect();const x=(e.clientX-r.left)/SCL+(STATE==="play"?CAM_X:0),y=(e.clientY-r.top)/SCL+(STATE==="play"?CAM_Y:0);
  getAC();
  if(STATE==="home"){
    if(SHOW_BRAWLERS){handleBrawlerCollectionClick(x,y);return}
    if(SHOW_NEWS){
      if(x<60&&y<(drawNewsScreen._topH||52)){SHOW_NEWS=false;snd("select");return}
      return;
    }
    handleHomeTap(x,y);
  }
  else if(STATE==="shop")handleShopClick(x,y);
  else if(STATE==="matchmaking")handleMatchmakingClick(x,y);
  else if(STATE==="create")handleCreateTap(x,y);
  else if(STATE==="upgrade")handleUpgradeClick(x,y);
  else if(STATE==="select")handleSelectTap(x,y);
  else if(STATE==="settings")handleSettingsClick(x,y);
  else if(STATE==="win"||STATE==="lose"){handleEndClick(x,y)}
  else if(STATE==="starrdrop"){handleStarrDropClick()}
  else if(STATE==="play"){
    // Gear icon in-game
    if(Math.hypot(x-(W-22),y-22)<20){SETTINGS_FROM="play";STATE="settings";snd("select")}
  }
  // else: no bare init() — all entry points check isUnlocked
});

addEventListener("keydown",e=>{
  // DevTools intercepts all keystrokes when open
  K[e.key.toLowerCase()]=true;
  if(["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key.toLowerCase()))e.preventDefault();
  if(e.key.toLowerCase()==="e")Ekey=true;

  if(STATE==="select"){
    if((STATE==="home"||STATE==="select")&&e.key==="ArrowRight"&&SEL<BD.length-1){SEL++;snd("select")}
    if((STATE==="home"||STATE==="select")&&e.key==="ArrowLeft"&&SEL>0){SEL--;snd("select")}
    if((STATE==="home"||STATE==="select")&&e.key==="ArrowDown"&&SEL+CARD.cols<BD.length){SEL+=CARD.cols;snd("select")}
    if((STATE==="home"||STATE==="select")&&e.key==="ArrowUp"&&SEL-CARD.cols>=0){SEL-=CARD.cols;snd("select")}
    if([" ","enter"].includes(e.key.toLowerCase())){
      if(STATE==="select"){if(isUnlocked(BD[SEL].key))init();else tryUnlock(SEL);}
    }
    return;
  }
  if(e.key==="Escape"){
    if(STATE==="matchmaking"){STATE="home";snd("select");return}
    if(STATE==="home"&&SHOW_BRAWLERS){SHOW_BRAWLERS=false;return}
    if(STATE==="settings"){STATE=SETTINGS_FROM;return}
    if(STATE==="create"){STATE="home";return}
    if(STATE==="play"){SETTINGS_FROM="play";STATE="settings";return}
    if(STATE==="select"){STATE="home";return}
  }
  if([" ","enter"].includes(e.key.toLowerCase())&&STATE!=="play"){
    if(STATE==="win"||STATE==="lose")STATE="home";
    else if(STATE==="home"){/* no-op */}
    else if(STATE==="settings"){}
    else if(STATE==="select"||STATE==="home"){
      if(isUnlocked(BD[SEL].key))init();else{tryUnlock(SEL)||snd("hit")}
    }
  }
});
addEventListener("keyup",e=>{K[e.key.toLowerCase()]=false;if(e.key.toLowerCase()==="e")Ekey=false});

// Layout mirrors Brawl Stars: top bar, left sidebar, center spotlight, bottom bar, right events
const HOME={
  topH:58,
  sideW:88,
  rightW:140,
  bottomH:86,
  sideSlots:5,
  closeX:W-40,closeY:0,
  // Play button - computed from layout constants (must match drawHomeScreen)
  get playX(){return W-this.rightW*.6},
  get playY(){return H-this.bottomH/2},
  get playW(){return this.rightW-20},
  get playH(){return this.bottomH-18},
  // Mode cards start X
  get modeStartX(){
    const areaW=W-this.sideW-this.rightW;
    const mcTotalW=2*(170+10)-10;
    return this.sideW+(areaW-mcTotalW)/2-40;
  },
};

function handleHomeTap(x,y){
  EDITING_NAME=false;
  // Name click (top bar)
  if(x>=8&&x<=8+200&&y>=8&&y<=8+42){EDITING_NAME=true;return}
  // Settings / hamburger menu (top right)
  if(x>W-80&&y<58){SETTINGS_FROM="home";STATE="settings";snd("select");return}
  // Left sidebar buttons
  const lbtns=[{label:"SHOP",y:78},{label:"BRAWLERS",y:158},{label:"NEWS",y:238}];
  for(const btn of lbtns){
    if(x>=10&&x<=118&&y>=btn.y&&y<=btn.y+70){
      if(btn.label==="BRAWLERS"){SHOW_BRAWLERS=true;BRAWLER_SEL=SEL;BRAWLER_SCROLL=0;snd("select")}
      else if(btn.label==="SHOP"){STATE="shop";snd("select")}
      else if(btn.label==="NEWS"){SHOW_NEWS=true;NEWS_SCROLL=0;snd("select")}
      else snd("select");return;
    }
  }
  // Right sidebar buttons (FRIENDS, CLUB, BRAWL MAKER, UPGRADES)
  const RBTN_W2=108,rbtnDefs=[
    {label:"FRIENDS",     y:58+20},
    {label:"CLUB",        y:58+95},
    {label:"BRAWL MAKER", y:58+170, action:"create"},
    {label:"UPGRADES",    y:58+245, action:"upgrade"},
  ];
  for(const btn of rbtnDefs){
    if(x>=W-RBTN_W2-10&&x<=W-10&&y>=btn.y&&y<=btn.y+RBTN_W2*.66){
      if(btn.action==="create"){STATE="create";snd("select")}
      else if(btn.action==="upgrade"){STATE="upgrade";UPGRADE_TAB=0;snd("select")}
      else snd("select");
      return;
    }
  }
  // Center brawler → open brawler collection
  if(x>120&&x<W-120&&y>58&&y<H-110){
    SHOW_BRAWLERS=true;BRAWLER_SEL=SEL;BRAWLER_SCROLL=0;snd("select");return;
  }
  // Brawl Pass button (bottom left)
  if(HOME._bpBtn&&x>=HOME._bpBtn.x&&x<=HOME._bpBtn.x+HOME._bpBtn.w&&y>=HOME._bpBtn.y&&y<=HOME._bpBtn.y+HOME._bpBtn.h){
    STATE="upgrade";UPGRADE_TAB=3;drawUpgradeScreen._bpVisStart=undefined;snd("select");return;
  }
  // PLAY button → start game directly
  if(HOME._plBtn&&x>=HOME._plBtn.x&&x<=HOME._plBtn.x+HOME._plBtn.w&&y>=HOME._plBtn.y&&y<=HOME._plBtn.y+HOME._plBtn.h){
    MODE=MODES[MODE_SEL].key;startMatchmaking();snd("select");return;
  }
  // Bottom center event banner → cycle mode
  const bbY=H-110;
  if(y>bbY&&x>210&&x<W-170){
    MODE_SEL=(MODE_SEL+1)%MODES.length;MODE=MODES[MODE_SEL].key;snd("select");return;
  }
}

addEventListener("keydown",function createKey(e){
  if(STATE!=="create")return;
  if(CREATE.activeField==="name"){
    if(e.key==="Escape"){CREATE.activeField=null;return}
    if(e.key==="Backspace"){CREATE.name=CREATE.name.slice(0,-1);return}
    if(e.key.length===1&&CREATE.name.length<14)CREATE.name+=e.key;
  }
});
addEventListener("keydown",function homeKey(e){
  if(!EDITING_NAME)return;
  if(e.key==="Enter"||e.key==="Escape"){EDITING_NAME=false;persist();return}
  if(e.key==="Backspace"){SAVE.name=SAVE.name.slice(0,-1);persist();return}
  if(e.key.length===1&&SAVE.name.length<16){SAVE.name+=e.key;persist()}
});

function move(e){
  // cr=0.52*r → 10.9px for r=21, fits through 1-tile corridors (48px wide, need <24px)
  const cr=e.r*.52,nx=e.x+e.vx*DT,ny=e.y+e.vy*DT;let bx=false,by=false;
  // 4 cardinal + 2 reduced diagonals (avoid corner-catching)
  const pts=[[0,-cr],[0,cr],[-cr,0],[cr,0],[-cr*.55,-cr*.55],[cr*.55,-cr*.55],[-cr*.55,cr*.55],[cr*.55,cr*.55]];
  for(const[ox,oy]of pts){if(blocked(nx+ox,e.y+oy))bx=true;if(blocked(e.x+ox,ny+oy))by=true}
  if(!bx)e.x=nx;if(!by)e.y=ny;
}
function dst(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

/* ═══ UPDATE PLAYER ═══ */
function updatePlayer(){
  // ── Respawn timer — must run even while dead ──
  if(RESPAWN_T>0){RESPAWN_T-=DT;if(RESPAWN_T<=0){
    const spawnPts=[[TS*16+TS/2,TS*11+TS/2],[TS*3+TS/2,TS*2+TS/2],[TS*28+TS/2,TS*2+TS/2],[TS*3+TS/2,TS*19+TS/2],[TS*28+TS/2,TS*19+TS/2]];
    let bestPt=spawnPts[0],bestDist=0;
    for(const[sx,sy]of spawnPts){
      const minD=ENM.filter(e=>!e.dead).reduce((m,e)=>Math.min(m,Math.hypot(e.x-sx,e.y-sy)),9999);
      if(minD>bestDist){bestDist=minD;bestPt=[sx,sy]}
    }
    PL.dead=false;PL.hp=PL.maxHp*.75;
    PL.x=bestPt[0];PL.y=bestPt[1];
    PL.vx=0;PL.vy=0;
    PL.invT=3.5;PL.shield=0;
    PL.ammo=PL.maxAmmo;
    burst(PL.x,PL.y,PL.color,PL.dark,22,.9);
    snd("wave");
    RESPAWN_T=0;
  }}
  if(PL.dead)return;
  let dx=0,dy=0;
  if(TOUCH.left){const jdx=TOUCH.left.x-TOUCH.left.sx,jdy=TOUCH.left.y-TOUCH.left.sy,jm=Math.hypot(jdx,jdy);const JRS=JR*SCL;if(jm>8*SCL){dx=jdx/Math.max(jm,JRS);dy=jdy/Math.max(jm,JRS)}}
  else{if(K["a"]||K["arrowleft"])dx--;if(K["d"]||K["arrowright"])dx++;if(K["w"]||K["arrowup"])dy--;if(K["s"]||K["arrowdown"])dy++;if(dx&&dy){dx*=.707;dy*=.707}}
  if(TOUCH.right){
    const jdx=TOUCH.right.x-TOUCH.right.sx,jdy=TOUCH.right.y-TOUCH.right.sy,jm=Math.hypot(jdx,jdy);
    if(jm>14*SCL){MX=PL.x+(jdx/SCL)*200;MY=PL.y+(jdy/SCL)*200;MB=true}
    else{
      // Auto-aim: snap to nearest visible enemy within 380px
      let best=null,bd2=999;
      for(const e of ENM){if(e.dead||e.hidden)continue;const ed=dst(e,PL);if(ed<380&&ed<bd2){bd2=ed;best=e}}
      if(best){MX=best.x;MY=best.y;MB=true}else MB=false;
    }
  }
  const spd=185+(PL.spdBoost>0?135:0);
  PL.vx=dx*spd;PL.vy=dy*spd;
  if(dx||dy)PL.walkT+=DT*8;
  PL.angle=Math.atan2(MY-PL.y,MX-PL.x);
  move(PL);
  // Camera: smoothly follow player, clamped to map bounds
  const mapW=COLS*TS,mapH=ROWS*TS;
  const tarX=PL.x-W/2, tarY=PL.y-H/2;
  const clampX=Math.max(0,Math.min(mapW-W,tarX));
  const clampY=Math.max(0,Math.min(mapH-H,tarY));
  CAM_X+=(clampX-CAM_X)*Math.min(1,DT*10);
  CAM_Y+=(clampY-CAM_Y)*Math.min(1,DT*10);

/* ═══ UPDATE ENEMIES ═══ */
function updateEnemies(){
  if(!ENM||!Array.isArray(ENM))return;
  // Brawl Ball enemies are handled in updateBrawlBall
  if(MODE==="brawlball")return;
  let alive=0;
  for(const e of ENM){
    if(e.dead){
      e.deathT+=DT;
      // TTL for spawned minions
      if(e._ttl!==undefined){e._ttl-=DT;if(e._ttl<=0){e.dead=true;continue}}
      // Gem Grab ally respawn
      if(MODE==="gems"&&e.friendly&&e._respawnT>0){
        e._respawnT-=DT;
        if(e._respawnT<=0){e.dead=false;e.hp=e.maxHp;e.deathT=0;e.invT=2;e.vx=0;e.vy=0;
          e.x=TS*16+TS/2+(e.friendly?(-Math.random()*100):0);e.y=TS*17+TS/2;
          burst(e.x,e.y,e.color,e.dark,12,.7);e._respawnT=0;}
      }
      continue;
    }
    // ── Stun ──
    if(e._stunT>0){e._stunT-=DT;e.vx*=.5;e.vy*=.5;e.flashT=.05;continue}
    // ── Slow ──
    const slowMult=(e._slowT>0)?(e._slowT-=DT,.4):1;
    if(e.invT>0)e.invT-=DT;if(e.flashT>0)e.flashT-=DT;
    const ddx=PL.x-e.x,ddy=PL.y-e.y,d=Math.hypot(ddx,ddy)||1;
    // Lost-target when player is hidden in bush and far away
    if(e.friendly&&!e.dead){
      // Ally: move toward nearest red enemy, or vault in heist
      const reds=ENM.filter(r=>!r.dead&&r.team===1);
      // In heist: if no red enemies near, rush red vault
      if(MODE==="heist"){
        const vdx=HS_RED.x-e.x,vdy=HS_RED.y-e.y,vd=Math.hypot(vdx,vdy)||1;
        const nearRed=reds.find(r=>Math.hypot(r.x-e.x,r.y-e.y)<350);
        if(!nearRed&&HS_RED.invT<=0){
          e.vx=(vdx/vd)*e.spd;e.vy=(vdy/vd)*e.spd;move(e);
          e.angle=Math.atan2(vdy,vdx);e.sTimer-=DT;
          if(e.sTimer<=0&&vd<360){e.sTimer=e.sCool;const _b2=fireBul(e.x,e.y,e.angle,380,e.dmg||400,e.color,e.dark,"ally",6,1.2,1.8);if(_b2)_b2.ownerRef=e;}

        }
      }
      if(reds.length){
        const nr=reds.reduce((a,b2)=>dst(a,e)<dst(b2,e)?a:b2);
        const dd=Math.hypot(nr.x-e.x,nr.y-e.y)||1;
        if(dd>80){e.vx=(nr.x-e.x)/dd*e.spd;e.vy=(nr.y-e.y)/dd*e.spd;move(e);}
        else{e.vx*=.7;e.vy*=.7;}
        e.angle=Math.atan2(nr.y-e.y,nr.x-e.x);
        e.sTimer-=DT;
        if(e.sTimer<=0&&dd<350){e.sTimer=e.sCool;fireBul(e.x,e.y,e.angle,380,e.dmg||400,e.color,e.dark,"ally",6,1.2,1.8);}
        if(e.vx||e.vy)e.walkT=(e.walkT||0)+DT*7;
      }
      if(e.hp<=0){e.dead=true;KILLS++;burst(e.x,e.y,e.color,e.dark,16,.8);snd("death");}
      continue;
    }
    if(e.team===1&&e.targetVisible===false){
      // Patrol: slow random drift — Spieler im Busch unsichtbar
      if(!e._lostAngle)e._lostAngle=Math.random()*6.28;
      e._lostAngle+=(Math.random()-.5)*.5;
      e.vx=Math.cos(e._lostAngle)*e.spd*.3;e.vy=Math.sin(e._lostAngle)*e.spd*.3;
      move(e);if(e.vx||e.vy)e.walkT=(e.walkT||0)+DT*4;
      e.sTimer=Math.max(e.sTimer,.5);// schießen nicht während Sichtverlust
      if(e.hp<=0){e.dead=true;KILLS++;burst(e.x,e.y,e.color,e.dark,26,1.15);snd("death");KFEED.unshift({name:e.name,t:3.5,color:e.color});if(KFEED.length>4)KFEED.pop();earnCoins(15,e.x,e.y-28,"⚔ +15");const n=2+Math.floor(Math.random()*3);for(let i=0;i<n;i++){const a2=Math.random()*6.28,r2=20+Math.random()*45;GEM.push({x:e.x+Math.cos(a2)*r2,y:e.y+Math.sin(a2)*r2,collected:false,bob:Math.random()*6.28,sc:0})}}
      continue;
    }
    e._lostAngle=null;
    // Showdown bots target nearest entity
    let _ddx=ddx,_ddy=ddy,_d=d;
    // Heist red enemies: rush vault when player far or dead
    if(MODE==="heist"&&e.team===1&&(_d>380||PL.dead)){
      const vdx=HS_BLUE.x-e.x,vdy=HS_BLUE.y-e.y,vd=Math.hypot(vdx,vdy)||1;
      _ddx=vdx;_ddy=vdy;_d=vd;
    }
    if(e.team===-1){
      let nearD=d;
      for(const o of ENM){
        if(o===e||o.dead)continue;
        const od=Math.hypot(o.x-e.x,o.y-e.y);

      }
    }
    e.angle=Math.atan2(_ddy,_ddx);

    const coverThreshold=0.3+Math.min((e._diff||1)-1,1)*0.15; // 0.30 → 0.45
    if(e.hp/e.maxHp<coverThreshold&&!e._coverTarget&&Math.random()<DT*2.5){
      const angles=[0,.785,1.57,2.355,3.14,3.925,4.71,5.5];
      let bestCover=null,bestScore=-1;
      for(const ang of angles){
        const tx=e.x+Math.cos(ang)*100,ty=e.y+Math.sin(ang)*100;
        if(blocked(tx,ty))continue;
        const distFromPlayer=Math.hypot(tx-PL.x,ty-PL.y);
        if(distFromPlayer>bestScore){bestScore=distFromPlayer;bestCover={x:tx,y:ty};}
      }
      if(bestCover){e._coverTarget=bestCover;e._coverT=2.5}
    }
    if(e._coverTarget){
      e._coverT=(e._coverT||0)-DT;
      if(e._coverT<=0||e.hp/e.maxHp>0.55){e._coverTarget=null}
      else{
        const cvdx=e._coverTarget.x-e.x,cvdy=e._coverTarget.y-e.y,cvd=Math.hypot(cvdx,cvdy)||1;
        if(cvd>30){e.vx=(cvdx/cvd)*e.spd*slowMult;e.vy=(cvdy/cvd)*e.spd*slowMult;move(e)}
        else e._coverTarget=null;
        if(e.vx||e.vy)e.walkT=(e.walkT||0)+DT*6;

      case"shooter":{

        else if(_d>idealMax){e.vx=(_ddx/_d)*e.spd*slowMult;e.vy=(_ddy/_d)*e.spd*slowMult}
        else{e.strT-=DT;if(e.strT<=0){e.strT=0.9+Math.random()*.7;e.strDir*=-1}e.vx=perpX*e.spd*.8*e.strDir*slowMult;e.vy=perpY*e.spd*.8*e.strDir*slowMult;}
        break;
      }
      case"aggressive":e.vx=(_ddx/_d)*e.spd*1.35*slowMult+perpX*e.spd*.3*slowMult;e.vy=(_ddy/_d)*e.spd*1.35*slowMult+perpY*e.spd*.3*slowMult;break;
      case"agile":{e.strT-=DT;if(e.strT<=0){e.strT=.5+Math.random()*.6;e.strDir*=-1}const fwd=_d>140?0.78:0;e.vx=(_ddx/_d)*e.spd*fwd*slowMult+perpX*e.spd*(0.65+Math.max(0,1-_d/260)*.35)*e.strDir*slowMult;e.vy=(_ddy/_d)*e.spd*fwd*slowMult+perpY*e.spd*(0.65+Math.max(0,1-_d/260)*.35)*e.strDir*slowMult;break;}
      case"mortar":if(d<240){e.vx=-(ddx/d)*e.spd*.9*slowMult;e.vy=-(ddy/d)*e.spd*.9*slowMult}else if(_d>410){e.vx=(ddx/d)*e.spd*.65*slowMult;e.vy=(ddy/d)*e.spd*.65*slowMult}else{e.vx*=.88;e.vy*=.88}break;
    }}
    if(e.vx||e.vy)e.walkT=(e.walkT||0)+DT*7;
    move(e);
    const _fireRange=320+Math.min((e._diff||1)*80,220); // 320–540 px depending on difficulty
    if(e.sTimer<=0&&_d<_fireRange&&(e.team===-1||(!PL.dead&&e.targetVisible!==false))){
      e.sTimer=e.sCool;
      // Aim prediction: lead the target proportional to difficulty
      const leadFactor=Math.min((e._diff||1)-1,1.0)*0.55;
      const bspd=e.type==="tank"?270:e.type==="mortar"?320:400;
      const travelT=_d/bspd*leadFactor;
      const predX=(PL.vx||0)*travelT, predY=(PL.vy||0)*travelT;
      const a=e.angle;
      const aimA=Math.atan2(_ddy+predY,_ddx+predX);
      const spread=Math.max(0,0.18-(e._diff||1)*0.05);
      const jitter=(Math.random()-.5)*spread*2;
      const fa=aimA+jitter;
      // owner tag: showdown bots use "showdown_bot" so they can't hit each other's ownerRef
      const _owner=e.team===-1?"enemy":"enemy";
      function _eb(angle,spd,dmg,r,sc,life,ignWalls=false){
        const _bul=fireBul(e.x,e.y,angle,spd,dmg,e.color,e.dark,_owner,r,sc,life,ignWalls);
        if(_bul)_bul.ownerRef=e; // always set ownerRef so self-hit check works

      burst(e.x+Math.cos(a)*26,e.y+Math.sin(a)*26,e.color,e.dark,5,.2);

    const _superRange=240+Math.min((e._diff||1)*50,160);

      else if(e.type==="aggressive"){e.vx=(_ddx/_d)*550;e.vy=(_ddy/_d)*550;for(let i=0;i<3;i++)setTimeout(()=>{if(!e.dead){const _ba=fireBul(e.x,e.y,e.angle,400,700*(e._diff||1),e.color,e.dark,"enemy",7,1.3,1.8);if(_ba)_ba.ownerRef=e;}},i*150)}
      else if(e.type==="shooter"){for(let i=0;i<5;i++){const sa=e.angle+(i-2)*.14;const _bsh=fireBul(e.x,e.y,sa,420,550*(e._diff||1),e.color,e.dark,"enemy",6,1.1,1.9);if(_bsh)_bsh.ownerRef=e;}}

/* ═══ BULLETS ═══ */
function fireBul(x,y,angle,spd,dmg,color,glow,owner,r,sc=1,life=1.8,ignWalls=false,isRocket=false,heals=false,sniper=false){
  const _b={x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,dmg,color,glow,owner,r,sc,life,ignWalls,isRocket,heals,sniper,trail:[]};
  BUL.push(_b);return _b;
}
function updateBullets(){
  for(let i=BUL.length-1;i>=0;i--){
    const b=BUL[i];
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>9)b.trail.shift();
    b.x+=b.vx*DT;b.y+=b.vy*DT;b.life-=DT;
    const wallHit=!b.ignWalls&&blocked(b.x,b.y);
    if(b.life<=0||wallHit){
        if(wallHit&&MODE==="showdown"){// damage breakable crate
          const cr=Math.floor(b.y/TS),cc=Math.floor(b.x/TS);const ck=sdCrateKey(cr,cc);
          if(SD_CRATE_HP[ck]!==undefined&&SD_CRATE_HP[ck]>0){SD_CRATE_HP[ck]-=b.dmg*.5;
            spark(b.x,b.y,"#AA7733");
            if(SD_CRATE_HP[ck]<=0){burst(b.x,b.y,"#CC8833","#FF8800",10,.5);snd("hit");
              const drops=1+Math.floor(Math.random()*2);
              for(let _i=0;_i<drops;_i++){const _a=Math.random()*6.28,_r=15+Math.random()*25;
                SD_POWERUPS.push({x:cc*TS+TS/2+Math.cos(_a)*_r,y:cr*TS+TS/2+Math.sin(_a)*_r,sc:0,bob:Math.random()*6.28,val:80+Math.floor(Math.random()*120),collected:false});}
            }
          }
        }
        if(b.isRocket)rocketExplode(b);else wallSpark(b.x,b.y,b.color);BUL.splice(i,1);continue}
    if(b.owner==="ally"){
      // Ally bullets damage red team
      let hit2=false;
      for(const e of ENM){if(e.dead||e.invT>0||e.team!==1)continue;if(dst(b,e)<e.r+b.r){
        e.hp-=b.dmg;e.invT=.1;e.flashT=.07;
        spark(e.x,e.y,"#FFAA22");BUL.splice(i,1);hit2=true;break;}}
      if(hit2)continue;
    }
    if(b.owner==="enemy"){
      if(!PL.dead&&PL.invT<=0&&PL.shield<=0&&dst(b,PL)<PL.r+b.r){
        // Block gadget (CROW)
        if(PL._blockNext){PL._blockNext=false;PL.invT=1;PL.flashT=.1;burst(PL.x,PL.y,"#4DFFAA","#00FF88",12,.5);spawnDmg(PL.x,PL.y-30,"BLOCKED!","#4DFFAA");BUL.splice(i,1);continue}
        let d2=b.dmg;PL.hp-=d2;PL.invT=.22;PL.flashT=.07;FLASH=.45;SHK=.25;
        // Star Power: EDGAR Fisticuffs — charge super when hit
        if(PL.hasStarPower&&PL.bdKey==="EDGAR"){PL.sup=Math.min(PL.supMax,PL.sup+18);spark(PL.x,PL.y,"#8888FF");}
        spark(PL.x,PL.y,"#FF4444");spawnDmg(PL.x+(Math.random()-.5)*28,PL.y-30,`-${Math.round(d2)}`,"#FF5555");snd("hitplayer");BUL.splice(i,1);
      }
      // Also damage blue allies OR in showdown damage other bots
      else{
        for(const ae of ENM){
          if(ae.dead||ae.invT>0)continue;
          // In showdown: hit any other entity; in team modes: only hit team 0 allies
          if(MODE!=="showdown"&&ae.team!==0)continue;
          if(MODE==="showdown"&&b.ownerRef&&ae===b.ownerRef)continue; // no self-hit
          if(dst(b,ae)<ae.r+b.r){
            ae.hp-=b.dmg;ae.invT=.15;ae.flashT=.07;
            spark(ae.x,ae.y,"#FF6644");spawnDmg(ae.x,ae.y-28,`-${Math.round(b.dmg)}`,"#FF9955");
            BUL.splice(i,1);break;
          }
        }
      }
    }else{
      let hit=false;
      for(const e of ENM){if(e.dead||e.invT>0)continue;if(MODE!=="showdown"&&e.team===0)continue;if(dst(b,e)<e.r+b.r){
        let d2=b.dmg;
        if(b.sniper)d2*=Math.min(2,Math.hypot(e.x-b.x,e.y-b.y)/200+.5);
        // ── Gadget effects on hit ──
        if(PL._gadgetDmgBoost){d2+=800;PL._gadgetDmgBoost=0;spark(e.x,e.y,"#FF88CC");spawnDmg(e.x,e.y-40,"BONUS!","#FF88CC")}
        if(PL._rocketBoost&&b.isRocket){d2*=2.2;PL._rocketBoost=false;spawnDmg(e.x,e.y-40,"2× BOOST!","#FF8800")}
        if(PL._knockbackNext){const ka2=Math.atan2(b.vy,b.vx);e.vx+=Math.cos(ka2)*(PL._knockbackNext*400);e.vy+=Math.sin(ka2)*(PL._knockbackNext*400);PL._knockbackNext=0;spark(e.x,e.y,"#FF9944");spawnDmg(e.x,e.y-35,"KNOCK!","#FF9944")}
        if(PL._slowNext){e._slowT=2.5;PL._slowNext=false;spark(e.x,e.y,"#88AAFF");spawnDmg(e.x,e.y-35,"SLOW!","#88AAFF")}
        // Star Power: FRANK stun on regular attack
        if(PL.hasStarPower&&PL.bdKey==="FRANK"&&Math.random()<0.3){e._stunT=0.5;spawnDmg(e.x,e.y-35,"STUN!","#FFD700")}
        // Star Power: CROW extra toxic — apply slow with poison
        if(PL.hasStarPower&&PL.bdKey==="CROW"){e._slowT=Math.max(e._slowT||0,1.5)}
        // Star Power: MORTIS lifesteal on kill prep
        if(PL.hasStarPower&&PL.bdKey==="MORTIS"&&e.hp-d2<=0){PL.hp=Math.min(PL.maxHp,PL.hp+500)}
        e.hp-=d2;e.invT=.1;e.flashT=.07;PL.sup=Math.min(PL.supMax,PL.sup+10);PL.supDecayT=3;
        // Block gadget: CROW blocks next hit
        if(PL._blockNext){PL._blockNext=false;PL.invT=1;PL.flashT=.1;spawnDmg(PL.x,PL.y-30,"BLOCKED!","#4DFFAA");BUL.splice(i,1);hit=true;break}
        // Knockback: push enemy away from bullet direction
        const kba=Math.atan2(b.vy,b.vx),kbs=55+b.dmg*.015;
        e.vx+=Math.cos(kba)*kbs;e.vy+=Math.sin(kba)*kbs;
        if(b.heals)PL.hp=Math.min(PL.maxHp,PL.hp+(PL.hasStarPower&&PL.bdKey==="EDGAR"?98:65));
        if(b.isRocket)rocketExplode(b);
        spark(e.x,e.y,"#FFAA22");spawnDmg(e.x+(Math.random()-.5)*22,e.y-32,`${Math.round(d2)}`,"#FFEE44");snd("hit");BUL.splice(i,1);hit=true;break;
      }}
    }
  }
}
function rocketExplode(b){
  snd("boom");SHK=Math.max(SHK,.35);burst(b.x,b.y,b.color||"#FF8800","#FFFF00",28,1.0);
  // Destroy nearby breakable walls in Showdown
  if(MODE==="showdown"){
    const cr=Math.floor(b.y/TS),cc=Math.floor(b.x/TS);
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const ck=sdCrateKey(cr+dr,cc+dc);
      if(SD_CRATE_HP[ck]!==undefined&&SD_CRATE_HP[ck]>0){
        SD_CRATE_HP[ck]=0;burst((cc+dc)*TS+TS/2,(cr+dr)*TS+TS/2,"#CC8833","#FF8800",8,.4);}
    }
  }
  for(const e of ENM){if(e.dead)continue;if(dst(b,e)<95){e.hp-=b.dmg*.6;e.invT=.12;spark(e.x,e.y,"#FF8800")}}
}

/* ═══ PARTICLES ═══ */
function burst(x,y,col,glow,n,dur){for(let i=0;i<n;i++){const a=Math.random()*6.28,s=60+Math.random()*200;PAR.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:dur*(.5+Math.random()),maxL:dur,col,glow,r:3+Math.random()*7})}}
function spark(x,y,col){for(let i=0;i<8;i++){const a=Math.random()*6.28,s=45+Math.random()*110;PAR.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.28,maxL:.28,col,glow:col,r:2+Math.random()*4})}}
function wallSpark(x,y,col){for(let i=0;i<4;i++){const a=Math.random()*6.28,s=20+Math.random()*55;PAR.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.2,maxL:.2,col,glow:col,r:2+Math.random()*3})}}
function updatePar(){for(let i=PAR.length-1;i>=0;i--){const p=PAR[i];p.x+=p.vx*DT;p.y+=p.vy*DT;p.vx*=.88;p.vy=p.vy*.88+70*DT;p.life-=DT;if(p.life<=0)PAR.splice(i,1)}}
function spawnDmg(x,y,text,color,size=1){DNUM.push({x,y,text,color,life:1.1,maxL:1.1,vy:-75,size})}
function updateDmg(){for(let i=DNUM.length-1;i>=0;i--){const d=DNUM[i];d.y+=d.vy*DT;d.vy*=.92;d.life-=DT;if(d.life<=0)DNUM.splice(i,1)}}
function earnGems(n){SAVE.gems+=n;persist()}
function endGame(won){
  STATE=won?"win":"lose";END_SHOW_T=0;snd(won?"win":"lose");
  const trophiesWon=awardTrophies(won,KILLS,PL?PL.gems:0);window._trophiesWon=trophiesWon;
  // Check for rank up
  const oldRank=getRank(SAVE.trophies-trophiesWon);
  const newRank=getRank(SAVE.trophies);
  if(newRank>oldRank){window._rankUp=newRank;window._rankUpCol=getRankColor(newRank);}
  else{window._rankUp=0;}
  // Award Brawl Pass XP — balanced: ~10-15 matches per tier
  const bpXP=won?(30+KILLS*3):(10+KILLS*1);
  addBrawlPassXP(bpXP);
  // Award power points for active brawler
  const ppGain=won?(8+KILLS*2):(2+KILLS);
  const bkey=BD[SEL]?.key||'SHELLY';
  SAVE.powerPoints[bkey]=(SAVE.powerPoints[bkey]||0)+ppGain;
  window._ppGained=ppGain;
  // Award Starr Drop every 3 wins
  if(won){
    SAVE.totalWins++;
    if(SAVE.totalWins%3===0){SAVE.starrDrops++;window._gotDrop=true}else{window._gotDrop=false}
  }
  if(won){
    earnCoins(300,W/2,H/2-60,"🏆 +300");
    const gemsWon=3+KILLS;earnGems(gemsWon);
    setTimeout(()=>COIN_TOASTS.push({x:W/2,y:H/2-90,amount:gemsWon,label:`💎 +${gemsWon}`,life:2,maxL:2,vy:-40}),400);
    persist();
  }
}

/* ═══ DRAW HELPERS ═══ */
function rr(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.closePath()}

/* ═══ SVG ICON SYSTEM ═══ */
// Draw icons as canvas paths — no emoji dependency
function svgIcon(name,cx,cy,sz,col){
  X.save();X.translate(cx,cy);const s=sz/16;X.scale(s,s);
  X.fillStyle=col||"#FFF";X.strokeStyle=col||"#FFF";
  if(name==="heart"){
    // ❤ heart
    X.beginPath();X.moveTo(0,4);X.bezierCurveTo(-1,0,-8,-1,-8,4);
    X.bezierCurveTo(-8,9,0,14,0,14);X.bezierCurveTo(0,14,8,9,8,4);
    X.bezierCurveTo(8,-1,1,0,0,4);X.closePath();X.fill();
  }else if(name==="skull"){
    // 💀 skull
    X.beginPath();X.arc(0,-2,7,0,Math.PI*2);X.fill();
    X.fillStyle="#000";X.beginPath();X.arc(-3,0,2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(3,0,2,0,Math.PI*2);X.fill();
    X.fillStyle=col||"#FFF";
    X.fillRect(-5,5,3,4);X.fillRect(-1,5,3,4);X.fillRect(3,5,3,4);
    X.fillRect(-4,9,10,3);
  }else if(name==="gem"){
    // 💎 diamond
    X.beginPath();X.moveTo(0,-8);X.lineTo(8,-2);X.lineTo(8,2);
    X.lineTo(0,10);X.lineTo(-8,2);X.lineTo(-8,-2);X.closePath();X.fill();
    X.fillStyle="rgba(255,255,255,.4)";
    X.beginPath();X.moveTo(-2,-8);X.lineTo(4,-2);X.lineTo(-2,0);X.closePath();X.fill();
  }else if(name==="trophy"){
    // 🏆 trophy cup
    X.fillRect(-2,10,4,4);X.fillRect(-5,13,10,2);
    X.beginPath();X.moveTo(-6,2);X.quadraticCurveTo(-6,10,0,10);
    X.quadraticCurveTo(6,10,6,2);X.lineTo(6,-4);X.lineTo(-6,-4);X.closePath();X.fill();
    // handles
    X.strokeStyle=col||"#FFF";X.lineWidth=2;
    X.beginPath();X.moveTo(-6,0);X.quadraticCurveTo(-10,0,-10,4);X.quadraticCurveTo(-10,8,-6,8);X.stroke();
    X.beginPath();X.moveTo(6,0);X.quadraticCurveTo(10,0,10,4);X.quadraticCurveTo(10,8,6,8);X.stroke();
    // star on cup
    X.fillStyle="rgba(255,255,100,.9)";X.font="12px serif";X.textAlign="center";X.textBaseline="middle";
    X.fillText("★",0,2);
  }else if(name==="coin"){
    // 🪙 coin
    X.beginPath();X.arc(0,0,7,0,Math.PI*2);X.fill();
    X.fillStyle="rgba(0,0,0,.25)";X.beginPath();X.arc(2,1,7,0,Math.PI*2);X.fill();
    X.fillStyle=col||"#FFD700";X.beginPath();X.arc(0,0,7,0,Math.PI*2);X.fill();
    X.fillStyle="rgba(255,255,255,.35)";X.beginPath();X.arc(-2,-2,4,0,Math.PI*2);X.fill();
    X.strokeStyle="rgba(0,0,0,.3)";X.lineWidth=1;X.beginPath();X.arc(0,0,7,0,Math.PI*2);X.stroke();
  }else if(name==="bolt"){
    // ⚡ lightning bolt (super/energy)
    X.beginPath();X.moveTo(4,-10);X.lineTo(-2,0);X.lineTo(2,0);
    X.lineTo(-4,10);X.lineTo(6,0);X.lineTo(2,0);X.lineTo(8,-10);X.closePath();X.fill();
  }else if(name==="bullet"){
    // ammo bullet
    X.beginPath();X.ellipse(0,0,3,6,0,0,Math.PI*2);X.fill();
    X.fillStyle="rgba(255,255,255,.4)";X.beginPath();X.ellipse(-1,-2,1.5,2.5,-.3,0,Math.PI*2);X.fill();
  }else if(name==="wave"){
    // wave indicator
    X.lineWidth=2.5;X.strokeStyle=col||"#FFF";X.lineCap="round";
    X.beginPath();X.moveTo(-8,0);
    X.bezierCurveTo(-4,-6,0,-6,4,0);X.bezierCurveTo(8,6,12,6,8,0);X.stroke();
  }else if(name==="shield"){
    X.beginPath();X.moveTo(0,-8);X.lineTo(7,-4);X.lineTo(7,2);
    X.quadraticCurveTo(7,8,0,10);X.quadraticCurveTo(-7,8,-7,2);
    X.lineTo(-7,-4);X.closePath();X.fill();
  }else if(name==="gear"){
    // ⚙ gear
    const ir=5,or2=8,teeth=8;
    for(let i=0;i<teeth;i++){
      const a=i/teeth*Math.PI*2,a2=a+Math.PI/teeth*.5;
      X.beginPath();X.arc(0,0,or2,a,a2);
      X.lineTo(Math.cos((a+a2)/2)*ir*1.4,Math.sin((a+a2)/2)*ir*1.4);
      X.closePath();X.fill();
    }
    X.beginPath();X.arc(0,0,ir,0,Math.PI*2);X.fill();
    X.fillStyle="#000";X.beginPath();X.arc(0,0,ir*.5,0,Math.PI*2);X.fill();
  }else if(name==="star"){
    // ★ star
    X.beginPath();
    for(let i=0;i<5;i++){
      const a=i/5*Math.PI*2-Math.PI/2;
      const ai=a+Math.PI/5;
      if(i===0)X.moveTo(Math.cos(a)*8,Math.sin(a)*8);
      else X.lineTo(Math.cos(a)*8,Math.sin(a)*8);
      X.lineTo(Math.cos(ai)*3.5,Math.sin(ai)*3.5);
    }
    X.closePath();X.fill();
  }else if(name==="plant"){
    // 🌿 bush/plant indicator
    X.fillStyle=col||"#88FF66";
    X.beginPath();X.arc(-4,-2,5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(4,-2,5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(0,-5,5,0,Math.PI*2);X.fill();
    X.fillStyle="rgba(255,255,255,.2)";
    X.beginPath();X.arc(-5,-3,2.5,0,Math.PI*2);X.fill();
    X.strokeStyle=col||"#44AA22";X.lineWidth=1.5;
    X.beginPath();X.moveTo(0,8);X.lineTo(0,0);X.stroke();
  }else if(name==="sword"){
    // kill feed icon
    X.lineWidth=2;X.strokeStyle=col||"#FFF";X.lineCap="round";
    X.beginPath();X.moveTo(-6,-6);X.lineTo(6,6);X.stroke();
    X.beginPath();X.moveTo(-2,-8);X.lineTo(2,-4);X.stroke();
  }
  X.restore();
}

function lc(hex,a,alpha){const n=parseInt(hex.slice(1),16);const r=Math.min(255,((n>>16)&255)+a),g=Math.min(255,((n>>8)&255)+a),b=Math.min(255,(n&255)+a);return alpha!==undefined?`rgba(${r},${g},${b},${alpha})`:`rgb(${r},${g},${b})`}
function gl(col,b){X.shadowColor=col;X.shadowBlur=b*DPR}function ng(){X.shadowBlur=0}

/* ═══ BRAWLER PORTRAIT ═══ */
// Draws a rich brawler portrait centered at (cx,cy) with radius r
// Each brawler has unique features based on their key
function drawBrawlerPortrait(b,cx,cy,r){
  const k=b.key,col=b.color,dark=b.dark;
  const s=r/28; // scale unit
  X.save();X.translate(cx,cy);

  // ── Body shadow ──
  X.fillStyle="rgba(0,0,0,.25)";X.beginPath();X.ellipse(0,r*.7,r*.6,r*.18,0,0,6.28);X.fill();

  // ── Body ──
  const bodyGr=X.createRadialGradient(-r*.15,-r*.1,r*.1,0,0,r*.72);
  bodyGr.addColorStop(0,lc(col,55));bodyGr.addColorStop(.6,col);bodyGr.addColorStop(1,dark);
  X.fillStyle=bodyGr;

  // Body shape varies by weapon type
  const wt=b.wType||"rifle";
  if(wt==="hammer"||wt==="blades"){
    // Stocky / wide body
    X.beginPath();X.ellipse(0,r*.2,r*.38,r*.48,0,0,6.28);X.fill();
  } else if(wt==="sniper"){
    // Tall slim body
    X.beginPath();X.ellipse(0,r*.22,r*.28,r*.5,0,0,6.28);X.fill();
  } else {
    // Standard body
    X.beginPath();X.ellipse(0,r*.2,r*.32,r*.46,0,0,6.28);X.fill();
  }

  // Clothing detail stripe
  X.fillStyle=ca(dark,"CC");
  X.beginPath();X.ellipse(0,r*.32,r*.28,r*.12,0,0,6.28);X.fill();
  // Shine on body
  X.fillStyle="rgba(255,255,255,.18)";
  X.beginPath();X.ellipse(-r*.08,-r*.05,r*.18,r*.1,-.3,0,6.28);X.fill();

  // ── Arms ──
  X.fillStyle=lc(col,20);
  // Left arm
  X.save();X.translate(-r*.35,r*.05);X.rotate(-.4);
  X.beginPath();X.ellipse(0,r*.22,r*.1,r*.22,0,0,6.28);X.fill();X.restore();
  // Right arm (holding weapon)
  X.save();X.translate(r*.35,r*.02);X.rotate(.35);
  X.beginPath();X.ellipse(0,r*.22,r*.1,r*.22,0,0,6.28);X.fill();X.restore();

  // ── Weapon visual ──
  X.save();X.translate(r*.42,r*.12);
  if(wt==="shotgun"){
    X.fillStyle=dark;rr(-r*.06,-r*.04,r*.35,r*.08,r*.03*s);X.fill();
    X.fillStyle=lc(dark,30);rr(-r*.06,-r*.04,r*.12,r*.08,r*.02*s);X.fill();
  } else if(wt==="rifle"){
    X.fillStyle=dark;rr(-r*.04,-r*.03,r*.38,r*.06,r*.02*s);X.fill();
  } else if(wt==="sniper"){
    X.fillStyle=dark;rr(-r*.03,-r*.025,r*.46,r*.05,r*.02*s);X.fill();
    X.fillStyle=lc(dark,40);rr(r*.28,-r*.035,r*.08,r*.07,r*.02*s);X.fill();
  } else if(wt==="hammer"){
    X.fillStyle=dark;rr(-r*.04,-r*.14,r*.08,r*.28,r*.03*s);X.fill();
    X.fillStyle=lc(dark,20);rr(-r*.12,-r*.16,r*.28,r*.1,r*.03*s);X.fill();
  } else if(wt==="rocket"){
    X.fillStyle=dark;rr(-r*.04,-r*.04,r*.3,r*.08,r*.04*s);X.fill();
    X.fillStyle="#FF8800";rr(r*.22,-r*.06,r*.08,r*.12,r*.03*s);X.fill();
  } else if(wt==="thrower"){
    X.fillStyle=dark;rr(-r*.04,-r*.04,r*.22,r*.08,r*.04*s);X.fill();
    X.fillStyle="#44AAFF";X.beginPath();X.arc(r*.26,0,r*.08,0,6.28);X.fill();
  } else if(wt==="blades"){
    for(let i=-1;i<=1;i+=2){X.save();X.rotate(i*.4);X.fillStyle=lc(dark,30);
      rr(r*.05,-r*.15,r*.08,r*.32,r*.03*s);X.fill();X.restore();}
  } else if(wt==="healer"){
    X.fillStyle="#44FF88";X.beginPath();X.arc(r*.18,0,r*.1,0,6.28);X.fill();
    X.fillStyle="#FFF";X.fillRect(r*.14,-r*.025,r*.08,r*.05);X.fillRect(r*.155,-r*.04,r*.05,r*.08);
  }
  X.restore();

  // ── Head ──
  const headY=-r*.38;
  const headR=r*(wt==="hammer"?0.31:wt==="sniper"?0.26:0.29);

  headGr.addColorStop(0,"rgba(255,210,160,.9)");headGr.addColorStop(.7,"rgba(220,170,120,.9)");
  headGr.addColorStop(1,ca(dark,"88"));
  gl(dark,headR*.6);
  X.fillStyle=headGr;X.beginPath();X.arc(0,headY,headR,0,6.28);X.fill();ng();

  // ── Unique hair / hat per brawler ──
  const hairCol=lc(col,30);
  switch(k){
    case"SHELLY":
      // Cowboy hat
      X.fillStyle=dark;X.beginPath();X.ellipse(0,headY-headR*.5,headR*1.3,headR*.3,0,0,6.28);X.fill();
      X.fillRect(-headR*.6,headY-headR*1.3,headR*1.2,headR*.85);
      X.fillStyle=lc(dark,30);X.beginPath();X.ellipse(0,headY-headR*1.35,headR*.55,headR*.2,0,0,6.28);X.fill();
      // Hat band
      X.strokeStyle="#FF8800";X.lineWidth=2*s;X.beginPath();X.moveTo(-headR*.6,headY-headR*.48);X.lineTo(headR*.6,headY-headR*.48);X.stroke();
      break;

      X.fillStyle=hairCol;X.beginPath();X.ellipse(0,headY-headR*.7,headR*.7,headR*.45,0,0,Math.PI);X.fill();
      X.fillStyle="#FFD700";X.font=`bold ${r*.22}px serif`;X.textAlign="center";X.textBaseline="middle";
      X.fillText("★",headR*.55,headY-headR*.1);
      break;
    case"BULL":
      // Bull horns
